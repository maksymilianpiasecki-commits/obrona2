// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  // Ctrl+K / Cmd+K opens search anywhere
  if ((e.ctrlKey || e.metaKey) && e.code === 'KeyK') {
    e.preventDefault();
    openSearchModal();
    return;
  }

  // Escape closes modals
  if (e.code === 'Escape') {
    if (searchModalOpen) { closeSearchModal(); return; }
    const modal = document.querySelector('.modal-backdrop');
    if (modal) {
      state.onboardingDone = true;
      saveState();
      modal.remove();
      return;
    }
  }

  // Skip if focused on input
  if (document.activeElement && (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA')) return;

  if (currentView === 'flashcards') {
    if (e.code === 'Space') {
      e.preventDefault();
      const fc = document.getElementById('flashcard');
      if (fc) { flashcardFlipped = !flashcardFlipped; fc.classList.toggle('flipped', flashcardFlipped); }
    } else if (e.code === 'ArrowRight') {
      const skipBtn = document.querySelector('[data-skip]');
      if (skipBtn) skipBtn.click();
    } else if (e.code === 'ArrowLeft') {
      const prevBtn = document.querySelector('[data-prev]');
      if (prevBtn && !prevBtn.disabled) prevBtn.click();
    } else if (flashcardFlipped && /^Digit[0-5]$/.test(e.code)) {
      const n = e.code.slice(-1);
      const btn = document.querySelector(`[data-conf="${n}"]`);
      if (btn) btn.click();
    }
  } else if (currentView === 'defense') {
    if (e.code === 'Space') {
      e.preventDefault();
      const btn = document.getElementById('def-start');
      if (btn) btn.click();
    } else if (e.code === 'ArrowRight') {
      const btn = document.getElementById('def-skip');
      if (btn) btn.click();
    } else if (e.code === 'Enter') {
      const btn = document.getElementById('def-reveal');
      if (btn) btn.click();
    }
  }
});

// ============================================================
// POMODORO TIMER
// ============================================================
let pomoTimer = null;
let pomoStartTime = 0;
let pomoPhase = 'idle';  // 'idle' | 'work' | 'break'
let pomoPausedRemaining = null;

function ensurePomoDay() {
  const today = new Date().toISOString().slice(0, 10);
  if (state.pomodoro.lastResetDate !== today) {
    state.pomodoro.completedToday = 0;
    state.pomodoro.lastResetDate = today;
    saveState();
  }
}

function pomoStart(phase) {
  pomoPhase = phase;
  pomoStartTime = Date.now();
  pomoPausedRemaining = null;
  const duration = (phase === 'work' ? state.pomodoro.workMin : state.pomodoro.breakMin) * 60;

  if (pomoTimer) clearInterval(pomoTimer);
  pomoTimer = setInterval(() => {
    const elapsed = Math.floor((Date.now() - pomoStartTime) / 1000);
    const remaining = duration - elapsed;
    if (remaining <= 0) {
      clearInterval(pomoTimer); pomoTimer = null;
      // Auto-transition
      if (phase === 'work') {
        ensurePomoDay();
        state.pomodoro.completedToday++;
        saveState();
        // Try to play a soft beep
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.frequency.value = 880; gain.gain.value = 0.1;
          osc.start(); setTimeout(() => { osc.stop(); ctx.close(); }, 300);
        } catch (e) {}
        // Browser notification
        if (Notification && Notification.permission === 'granted') {
          new Notification('Pomodoro - czas na przerwę!', { body: `${state.pomodoro.breakMin} min przerwy. Wstań, rozciągnij się.` });
        }
        renderPomoWidget();
        // Auto-start break after 1.5s
        setTimeout(() => pomoStart('break'), 1500);
      } else {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.frequency.value = 660; gain.gain.value = 0.1;
          osc.start(); setTimeout(() => { osc.stop(); ctx.close(); }, 300);
        } catch (e) {}
        if (Notification && Notification.permission === 'granted') {
          new Notification('Przerwa skończona - wracaj do nauki!', { body: `${state.pomodoro.workMin} min skupienia.` });
        }
        pomoPhase = 'idle';
        renderPomoWidget();
      }
      return;
    }
    renderPomoWidget(remaining);
  }, 500);
  renderPomoWidget(duration);
}

function pomoPause() {
  if (!pomoTimer) return;
  const elapsed = Math.floor((Date.now() - pomoStartTime) / 1000);
  const duration = (pomoPhase === 'work' ? state.pomodoro.workMin : state.pomodoro.breakMin) * 60;
  pomoPausedRemaining = duration - elapsed;
  clearInterval(pomoTimer); pomoTimer = null;
  renderPomoWidget(pomoPausedRemaining);
}

function pomoResume() {
  if (pomoPausedRemaining == null) return;
  const duration = (pomoPhase === 'work' ? state.pomodoro.workMin : state.pomodoro.breakMin) * 60;
  pomoStartTime = Date.now() - (duration - pomoPausedRemaining) * 1000;
  pomoPausedRemaining = null;
  pomoTimer = setInterval(() => {
    const elapsed = Math.floor((Date.now() - pomoStartTime) / 1000);
    const remaining = duration - elapsed;
    if (remaining <= 0) {
      clearInterval(pomoTimer); pomoTimer = null;
      if (pomoPhase === 'work') {
        ensurePomoDay();
        state.pomodoro.completedToday++;
        saveState();
        renderPomoWidget();
        setTimeout(() => pomoStart('break'), 1500);
      } else {
        pomoPhase = 'idle';
        renderPomoWidget();
      }
      return;
    }
    renderPomoWidget(remaining);
  }, 500);
}

function pomoStop() {
  if (pomoTimer) clearInterval(pomoTimer);
  pomoTimer = null;
  pomoPhase = 'idle';
  pomoPausedRemaining = null;
  renderPomoWidget();
}

function togglePomodoroWidget() {
  state.pomodoro.enabled = !state.pomodoro.enabled;
  if (!state.pomodoro.enabled) {
    pomoStop();
    const w = document.getElementById('pomo-widget');
    if (w) w.remove();
  } else {
    renderPomoWidget();
    // Ask notification permission
    if (Notification && Notification.permission === 'default') {
      Notification.requestPermission();
    }
  }
  saveState();
  // Update badge
  const badge = document.getElementById('badge-pomo');
  if (badge) badge.textContent = state.pomodoro.enabled ? 'on' : 'off';
}

function renderPomoWidget(remaining) {
  if (!state.pomodoro.enabled) return;
  ensurePomoDay();

  let widget = document.getElementById('pomo-widget');
  if (!widget) {
    widget = document.createElement('div');
    widget.className = 'pomodoro-widget';
    widget.id = 'pomo-widget';
    document.body.appendChild(widget);
  }

  const duration = (pomoPhase === 'work' ? state.pomodoro.workMin : pomoPhase === 'break' ? state.pomodoro.breakMin : state.pomodoro.workMin) * 60;
  const displayTime = remaining != null ? remaining : duration;
  const isPaused = pomoPausedRemaining != null && !pomoTimer;

  let stateLabel;
  let stateClass = '';
  if (pomoPhase === 'work') { stateLabel = isPaused ? '◐ Pauza' : '◐ Skupienie'; stateClass = 'working'; }
  else if (pomoPhase === 'break') { stateLabel = isPaused ? '◑ Pauza' : '◑ Przerwa'; stateClass = 'breaking'; }
  else { stateLabel = '◐ Pomodoro'; }

  const dots = Math.min(state.pomodoro.completedToday, 8);

  widget.innerHTML = `
    <div class="pomodoro-state ${stateClass}">${stateLabel}</div>
    <div class="pomodoro-time">${formatTime(displayTime)}</div>
    <div class="pomodoro-actions">
      ${pomoPhase === 'idle' ? `
        <button class="primary" data-pomo-start="work">Start</button>
      ` : isPaused ? `
        <button class="primary" data-pomo-resume>Wznów</button>
        <button data-pomo-stop>Stop</button>
      ` : `
        <button data-pomo-pause>Pauza</button>
        <button data-pomo-stop>Stop</button>
      `}
    </div>
    <div class="pomodoro-counter">
      ${Array.from({length: 8}, (_, i) => `<div class="pomodoro-dot ${i < dots ? 'done' : ''}"></div>`).join('')}
      <span style="margin-left: 4px;">${state.pomodoro.completedToday}/8 dziś</span>
    </div>
  `;

  const sb = widget.querySelector('[data-pomo-start]');
  if (sb) sb.addEventListener('click', () => pomoStart('work'));
  const pb = widget.querySelector('[data-pomo-pause]');
  if (pb) pb.addEventListener('click', pomoPause);
  const rb = widget.querySelector('[data-pomo-resume]');
  if (rb) rb.addEventListener('click', pomoResume);
  const stb = widget.querySelector('[data-pomo-stop]');
  if (stb) stb.addEventListener('click', pomoStop);
}

// ============================================================
// GLOBAL SEARCH (Ctrl+K)
// ============================================================
let searchModalOpen = false;
let searchResults = [];
let searchActiveIdx = 0;

function openSearchModal() {
  if (searchModalOpen) return;
  searchModalOpen = true;
  const modal = document.createElement('div');
  modal.className = 'search-modal';
  modal.id = 'search-modal';
  modal.innerHTML = `
    <div class="search-box">
      <div class="search-input-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="search-input" placeholder="Szukaj w pytaniach, definicjach, erracie, słowniczku..." autofocus>
        <span class="search-kbd">Esc aby zamknąć</span>
      </div>
      <div class="search-results" id="search-results">
        <div class="search-empty">Zacznij pisać - wyniki pojawią się od razu.</div>
      </div>
    </div>
  `;
  document.body.appendChild(modal);

  const input = modal.querySelector('#search-input');
  setTimeout(() => input.focus(), 50);

  input.addEventListener('input', (e) => doSearch(e.target.value));
  input.addEventListener('keydown', (e) => {
    if (e.code === 'ArrowDown') { e.preventDefault(); searchActiveIdx = Math.min(searchActiveIdx + 1, searchResults.length - 1); refreshSearchActive(); }
    else if (e.code === 'ArrowUp') { e.preventDefault(); searchActiveIdx = Math.max(searchActiveIdx - 1, 0); refreshSearchActive(); }
    else if (e.code === 'Enter') {
      e.preventDefault();
      if (searchResults[searchActiveIdx]) {
        const r = searchResults[searchActiveIdx];
        closeSearchModal();
        navigateToSearchResult(r);
      }
    }
  });

  // Click outside closes
  modal.addEventListener('click', (e) => {
    if (e.target === modal) closeSearchModal();
  });
}

function closeSearchModal() {
  searchModalOpen = false;
  searchResults = [];
  searchActiveIdx = 0;
  const m = document.getElementById('search-modal');
  if (m) m.remove();
}

function doSearch(query) {
  const q = query.toLowerCase().trim();
  searchResults = [];
  searchActiveIdx = 0;
  const container = document.getElementById('search-results');
  if (!container) return;

  if (!q) {
    container.innerHTML = '<div class="search-empty">Zacznij pisać - wyniki pojawią się od razu.</div>';
    return;
  }

  // Search in questions
  for (const qq of DATA.questions) {
    let matched = false;
    let snippet = '';
    if (qq.title.toLowerCase().includes(q)) { matched = true; snippet = qq.title; }
    else if (qq.definition && qq.definition.toLowerCase().includes(q)) { matched = true; snippet = qq.definition; }
    else if (qq.short && qq.short.toLowerCase().includes(q)) { matched = true; snippet = qq.short; }
    else if (qq.answer && qq.answer.some(p => p.toLowerCase().includes(q))) { matched = true; snippet = qq.answer.find(p => p.toLowerCase().includes(q)); }

    if (matched) {
      searchResults.push({
        type: 'question',
        title: `Pytanie ${qq.id}: ${qq.title}`,
        subtitle: snippet.length > 120 ? snippet.slice(0, 120) + '...' : snippet,
        typeLabel: 'PYTANIE',
        action: () => render('overview', { qId: qq.id })
      });
    }
  }

  // Helper: extract plain text from blocks
  function blocksToText(blocks) {
    if (!blocks) return '';
    return blocks.map(b => b.text || '').join(' ').replace(/<[^>]+>/g, '');
  }

  // Search in errata
  for (const e of DATA.errata) {
    const errataText = e.content || blocksToText(e.blocks);
    if (e.title.toLowerCase().includes(q) || errataText.toLowerCase().includes(q)) {
      searchResults.push({
        type: 'errata',
        title: e.title,
        subtitle: errataText.slice(0, 120) + '...',
        typeLabel: 'ERRATA',
        action: () => render('errata')
      });
    }
  }

  // Search in deepenings
  for (const d of DATA.deepenings) {
    const deepText = d.content || blocksToText(d.blocks);
    if (d.title.toLowerCase().includes(q) || deepText.toLowerCase().includes(q)) {
      searchResults.push({
        type: 'deep',
        title: d.title,
        subtitle: deepText.slice(0, 120) + '...',
        typeLabel: 'POGŁĘBIENIE',
        action: () => render('deep')
      });
    }
  }

  // Search in glossary
  for (const g of DATA.glossary) {
    if (g.term.toLowerCase().includes(q) || g.definition.toLowerCase().includes(q)) {
      searchResults.push({
        type: 'glossary',
        title: g.term,
        subtitle: g.definition,
        typeLabel: 'SKRÓT',
        action: () => render('glossary')
      });
    }
  }

  // Limit
  searchResults = searchResults.slice(0, 30);

  if (searchResults.length === 0) {
    container.innerHTML = '<div class="search-empty">Brak wyników dla "' + escapeHtml(query) + '"</div>';
    return;
  }

  container.innerHTML = searchResults.map((r, i) => `
    <div class="search-result ${i === 0 ? 'active' : ''}" data-idx="${i}">
      <div class="search-result-icon">${r.typeLabel.slice(0, 1)}</div>
      <div class="search-result-content">
        <div class="search-result-title">${escapeHtml(r.title)}</div>
        <div class="search-result-subtitle">${escapeHtml(r.subtitle)}</div>
      </div>
      <div class="search-result-type">${r.typeLabel}</div>
    </div>
  `).join('');

  container.querySelectorAll('[data-idx]').forEach(el => {
    el.addEventListener('mouseenter', () => {
      searchActiveIdx = parseInt(el.dataset.idx);
      refreshSearchActive();
    });
    el.addEventListener('click', () => {
      const r = searchResults[parseInt(el.dataset.idx)];
      closeSearchModal();
      navigateToSearchResult(r);
    });
  });
}

function refreshSearchActive() {
  document.querySelectorAll('.search-result').forEach((el, i) => {
    el.classList.toggle('active', i === searchActiveIdx);
  });
  // Scroll active into view
  const active = document.querySelector('.search-result.active');
  if (active) active.scrollIntoView({ block: 'nearest' });
}

function navigateToSearchResult(r) {
  r.action();
}

// Initial render
render('dashboard');

// Show onboarding on first launch
if (!state.onboardingDone) {
  setTimeout(() => showOnboarding(), 200);
}
</script>
