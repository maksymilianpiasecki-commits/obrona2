robni klienci - tylko monitoruj). **(2) Wysokie zainteresowanie + niski wpływ → Keep informed** (informuj regularnie - np. pracownicy w sprawach niestrategicznych). **(3) Niskie zainteresowanie + wysoki wpływ → Keep satisfied** (utrzymuj zadowolonych - np. media, regulatorzy). **(4) Wysokie zainteresowanie + wysoki wpływ → Manage closely** (kluczowi - intensywna komunikacja, partnerstwa - np. duzi klienci, akcjonariusze)."},{"q":"Wymień źródła konfliktów organizacyjnych.","a":"**(1) Strukturalne** - walka o ograniczone zasoby (budżet, ludzie, czas, sprzęt). **(2) Komunikacyjne** - złe interpretacje, brak informacji, nadmiar informacji, błędne kanały. **(3) Interpersonalne** - różnice osobowości, antypatie, style komunikacji, kulturowe. **(4) Wartości** - różne przekonania, etyka, priorytety życiowe (work-life balance vs awans). **(5) Procesowe/proceduralne** - niejasne role (RACI), nakładające się odpowiedzialności, dwuwładza w macierzy. **(6) Emocjonalne** - stres, wypalenie, frustracja, lęk przed zmianą. **(7) Międzygrupowe** - silosy działowe, konkurencja między zespołami (sprzedaż vs operacje). **(8) Kulturowe** - różnorodność pokoleniowa, narodowa, religijna."},{"q":"Opisz model pięciu faz konfliktu.","a":"**Model Pondy'ego** (Louis Pondy, 1967) - 5 etapów rozwoju konfliktu: **(1) Konflikt utajony** (latent) - istnieją warunki sprzyjające konfliktowi (ograniczone zasoby, sprzeczne cele), ale strony jeszcze tego nie odczuwają. **(2) Konflikt postrzegany** (perceived) - strony **zauważają** napięcie, ale jeszcze nie reagują emocjonalnie. **(3) Konflikt odczuwany** (felt) - pojawia się **stres, frustracja, gniew**. Emocje wchodzą w grę. **(4) Konflikt jawny/manifest** (manifest) - **otwarte zachowania konfliktowe**: kłótnie, sabotaż, eskalacja, włączanie wyższych szczebli. **(5) Następstwa konfliktu** (aftermath) - rozwiązanie (konstruktywne lub destruktywne) wpływa na **przyszłe relacje**. Konstruktywne rozwiązanie wzmacnia zespół; destruktywne zostawia bliznę."},{"q":"Wymień modele decyzyjne (racjonalny, ograniczonej racjonalności, inne).","a":"**(1) Klasyczny racjonalny** (normative) - decydent ma pełną informację, ocenia wszystkie opcje, wybiera optymalną. Idealizacja, rzadko stosowane w praktyce. **(2) Ograniczonej racjonalności** (Herbert Simon, 1947, Nobla 1978) - decydent ma ograniczoną informację, czas, zdolności kognitywne. Stosuje **satisficing** (good enough, nie optymalne). **(3) Inkrementalny** (Lindblom 1959) - 'science of muddling through' - małe stopniowe decyzje zamiast rewolucji. **(4) Garbage can / Kosz na śmieci** (Cohen-March-Olsen 1972) - chaotyczne organizacje: problemy, rozwiązania, decydenci krążą niezależnie, decyzje powstają przypadkowo. **(5) Polityczny** - decyzje wynik gry interesów, koalicji, władzy. **(6) Współczesne**: behawioralne (Kahneman), bazujące na danych (data-driven), oparte na intuicji eksperckiej (Klein)."},{"q":"Co to jest heurystyka i bias w decyzjach?","a":"**Heurystyki** (Kahneman & Tversky) - **mentalne skróty**, zasady kciuka, którymi mózg upraszcza złożone decyzje. Szybkie i efektywne, ale prowadzą do błędów. **Przykłady**: **availability heuristic** (oceniam prawdopodobieństwo po tym, jak łatwo przychodzi mi do głowy - po medialnym wypadku boimy się latać, choć jest bezpieczniej niż jechać autem); **representativeness** (oceniam po podobieństwie do stereotypu); **anchoring** (zakotwiczenie - pierwsza informacja wpływa na późniejsze oceny). **Biasy** (błędy poznawcze) - wynik heurystyk. **200+ udokumentowanych biasów**: confirmation bias, sunk cost fallacy, hindsight bias, dunning-kruger, overconfidence, loss aversion. **System 1** (szybki, intuicyjny) vs **System 2** (wolny, analityczny) - Kahneman 2011. **Konsekwencje biznesowe**: złe decyzje strategiczne, zatrudnienia, inwestycje. Sposób walki: świadomość, devil's advocate, dane > intuicja."},{"q":"Wyjaśnij różnicę: ryzyko, niepewność, niejednoznaczność (Knight).","a":"**Frank Knight** ('Risk, Uncertainty, and Profit' 1921) - klasyczna typologia. **Ryzyko** (risk) - **znane prawdopodobieństwa** możliwych wyników. Można matematycznie modelować, ubezpieczać. Przykład: rzut kostką, statystyka pożarów. **Niepewność** (uncertainty) - **nieznane prawdopodobieństwa**, ale znane scenariusze. Brak danych do obliczenia. Przykład: wejście na nowy rynek, sukces nowego produktu, wojna. **Niejednoznaczność** (ambiguity) - **nieznane nawet scenariusze** ('unknown unknowns' - Rumsfeld). Czarne łabędzie (Taleb). Przykład: pandemia COVID przed 2020, AI Generative (ChatGPT). **Wniosek Knighta**: prawdziwy **zysk przedsiębiorcy** pochodzi z niepewności (nie z ryzyka, które można ubezpieczyć). Współcześnie: VUCA, BANI."},{"q":"Co to jest proces i jakie są jego składowe (wejście, wyjście, etc.)?","a":"**Proces** - **sekwencja powiązanych działań** przekształcająca wejścia w wyjścia dające wartość klientowi. ISO 9000: 'zbiór wzajemnie powiązanych działań'. **Składowe** (model SIPOC): **(1) Dostawca** (Supplier) - źródło wejść. **(2) Wejście** (Input) - materiały, informacje, zlecenia. **(3) Działania** (Process) - sama transformacja, 5-7 kroków. **(4) Zasoby** - ludzie, sprzęt, IT, czas, kapitał. **(5) Sterowanie** (Control) - procedury, regulaminy, KPI. **(6) Wyjście** (Output) - produkt, usługa, raport, decyzja. **(7) Klient** (Customer) - wewnętrzny (inny dział) lub zewnętrzny. **Cechy procesu**: cel, właściciel, granice (start-stop), KPI (czas, koszt, jakość), powtarzalność. **Typy**: główne (core - dają wartość klientowi), pomocnicze (support), zarządcze."},{"q":"Wyjaśnij STP: segmentacja, targeting, pozycjonowanie.","a":"**STP** to fundament współczesnego marketingu strategicznego. **(1) Segmentation** (segmentacja) - **podział rynku** na homogeniczne grupy klientów. Kryteria B2C: demograficzne (wiek, dochód), geograficzne, psychograficzne (styl życia, wartości), behawioralne (okazje, lojalność). Kryteria B2B: branża, wielkość firmy, lokalizacja. **(2) Targeting** - **wybór segmentów docelowych**. 4 strategie: niezróżnicowana (cały rynek - Coca-Cola), zróżnicowana (kilka segmentów z różnymi ofertami - Volkswagen Group), skoncentrowana (1 nisza - Ferrari), micromarketing (1 do 1 - luksusowe usługi). **(3) Positioning** (pozycjonowanie) - **miejsce w głowie klienta**. Czym się różnimy od konkurencji. Mapa pozycjonowania (perceptual map). Klasyczny przykład: Volvo = bezpieczeństwo."},{"q":"Jakie są kryteria segmentacji rynku (geograficzne, demograficzne, psychograficzne, behawioralne)?","a":"**Geograficzne**: kraj, region, miasto, wieś, klimat, gęstość zaludnienia, kultura lokalna. Np. piwo Heineken inaczej sprzedawane w Niemczech, inaczej w Chinach. **Demograficzne**: wiek, płeć, dochód, wykształcenie, zawód, status rodzinny (LAT, single, dzieci, empty nest), narodowość, religia. Najczęściej używane, łatwo dostępne dane. **Psychograficzne**: **styl życia** (model VALS: Innovators, Thinkers, Achievers, etc.), **wartości** (rodzina, sukces, ekologia), **osobowość** (Big Five), zainteresowania, postawy. Trudniejsze do zmierzenia, ale silniejsze predykcyjnie. **Behawioralne**: **okazja zakupu** (rutyna vs święta), **poszukiwane korzyści** (cena, jakość, status), **lojalność**, **status użytkownika** (regular/okazjonalny/ex), **gotowość do zakupu**, intensywność użycia (light/medium/heavy users). Najsilniejsze, bo bazuje na **rzeczywistym zachowaniu**."}],"przekrojowe":[{"q":"Jakie jest powiązanie między macierzą BCG a cyklem życia produktu?","a":"**Mocne powiązanie**: 4 fazy cyklu życia produktu **odpowiadają 4 polom BCG**. **(1) Wprowadzenie** = **Znak Zapytania** (wysoki wzrost rynku, niski udział - dopiero wchodzimy). **(2) Wzrost** = **Gwiazda** (wysoki wzrost, rosnący udział - inwestujemy by zostać liderem). **(3) Dojrzałość** = **Dojna Krowa** (niski wzrost, wysoki udział - generujemy gotówkę). **(4) Schyłek** = **Pies** (niski wzrost, malejący udział - decyzja o wyjściu). Zatem produkt **przechodzi przez 4 pola BCG** w trakcie swojego życia. Strategia portfela: balansować pola, używać gotówki Krów do inwestowania w Gwiazdy i wybrane Znaki Zapytania. Klasyczny błąd: za dużo Psów = stagnacja firmy."},{"q":"Jak zarządzanie procesowe wiąże się z TQM i lean?","a":"Wszystkie trzy podejścia są **zorientowane procesowo i na klienta**. **TQM** (Total Quality Management) - kompleksowe zarządzanie jakością w **procesach**, ciągłe doskonalenie (kaizen, PDCA), zaangażowanie wszystkich pracowników. **Lean Management** - eliminacja **muda (marnotrawstwa) w procesach**, koncentracja na wartości dla klienta, JIT, kanban. **Zarządzanie procesowe** (BPM) - **mapowanie i optymalizacja procesów end-to-end**, BPMN, automatyzacja. **Wspólne fundamenty**: (1) klient jest celem; (2) procesy ważniejsze niż struktura; (3) decyzje oparte na danych; (4) ciągłe doskonalenie; (5) zaangażowanie ludzi. **Praktyka**: firmy często łączą wszystkie 3 - **Lean Six Sigma** wewnątrz BPM, z elementami TQM. Toyota Production System = wszystko razem."},{"q":"Jak strategia Portera różnicowania wpływa na politykę cenową firmy?","a":"**Strategia różnicowania** (differentiation) zakłada, że produkt jest **unikalny i wartościowy** dla klienta, więc firma może żądać **premium price** (cena premium). Polityka cenowa: **(1) Wysoka cena** uzasadniona unikalną wartością - klient płaci za jakość, markę, design, doświadczenie. **(2) Marża wyższa niż konkurencji** (Apple: 30-40% marża operacyjna vs 5-8% Samsung). **(3) Brak konkurencji cenowej** - firma nie schodzi z ceny w wyścigu do dna. **(4) Sztywność cenowa** - ceny stabilne, rzadkie promocje (osłabiłyby pozycjonowanie premium). **(5) Skimming pricing** na nowych produktach - wysokie ceny dla early adopters. **Przykłady**: Apple, Tesla, Rolex, BMW. **Kluczowe**: trzeba **utrzymać unikalność** (R&D, marka), inaczej premium price zniknie."},{"q":"Jakie są powiązania między FMEA a zarządzaniem ryzykiem?","a":"**FMEA** to **specyficzne narzędzie zarządzania ryzykiem operacyjnym** - szczególnie ryzyk technicznych w produktach i procesach produkcyjnych. **Powiązania**: **(1)** Oba używają wymiarów **prawdopodobieństwa × skutku** (FMEA: O × S; zarządzanie ryzykiem: P × I). FMEA dodaje **Detection** (trudność wykrycia) → RPN = S×O×D. **(2)** Oba **priorytetyzują** ryzyka (FMEA: RPN; ZR: macierz ryzyka, heat map). **(3)** Oba kończą się **action plan** (FMEA: actions dla wysokich RPN; ZR: 4T - tolerate/treat/transfer/terminate). **(4)** Oba są **iteracyjne** - powtarza się ocenę po wdrożeniu działań. **Różnice**: FMEA = mikroskopia (konkretny produkt, proces), ZR = mapa całej firmy. Standardy: FMEA - IATF 16949 (automotive); ZR - **ISO 31000**."},{"q":"Jak biznesplan uwzględnia analizę interesariuszy?","a":"Biznesplan **wielokrotnie odwołuje się do interesariuszy**: **(1) Sekcja 'Rynek'** - analizuje **klientów** (segmenty, potrzeby, behawiory). **(2) 'Analiza konkurencji'** - bezpośredni i pośredni konkurenci jako interesariusze rynkowi. **(3) 'Plan operacyjny'** - **dostawcy** (kluczowi partnerzy, łańcuch dostaw, kontrakty). **(4) 'Organizacja i zarządzanie'** - **pracownicy** (struktura, kompetencje, kultura). **(5) 'Plan finansowy'** - **inwestorzy/banki** (jakie zwroty, jakie ryzyka). **(6) 'Aspekty prawne'** - **regulatorzy** (zgody, licencje, podatki). **(7) 'Analiza ryzyka'** - **NGO, społeczność lokalna, media** (ryzyka reputacyjne). **(8) Sekcja ESG/CSR** (coraz częściej obowiązkowa) - **środowisko, społeczność** jako interesariusze. **Macierz Mendelowa** jako narzędzie analityczne wspomagające biznesplan."},{"q":"W jaki sposób CSR wpływa na strategię marki i marketing relacji?","a":"**CSR jako element strategii marki**: **(1)** Wzmacnia **wartości marki** - klienci, szczególnie pokolenia Y i Z, kupują od firm zgodnych z ich wartościami (76% klientów wg badań Edelman). **(2) Budowa zaufania** i lojalności - długoterminowe relacje > krótkoterminowe transakcje. **(3) Differentiation** - CSR jako element pozycjonowania (Patagonia, The Body Shop, Toms - 1 buy = 1 give). **(4) Premium price** - klienci skłonni płacić więcej za 'fair trade', 'eco-friendly'. **(5) Talent acquisition** - młodzi pracownicy wybierają wartościowe firmy. **Marketing relacji**: CSR wzmacnia **emocjonalną więź** z klientem ('marka, która coś znaczy'). Ale **uwaga na greenwashing** - klienci szybko wykryją fałsz. Trend: ESG-driven marketing, transparency, raporty wpływu."},{"q":"Jak paradygmaty zarządzania ewoluowały wraz z rozwojem technologii?","a":"**Rewolucja przemysłowa I (parowa)** → **klasyczne paradygmaty**: Taylor (1911) - normy czasowe, masowa produkcja; Fayol - administracja; Ford - taśma. **Rewolucja II (elektryczność)** → **behawioralny**: Mayo (Hawthorne) - zauważono czynnik ludzki. **III (informatyka, lata 50.-70.)** → **systemowy** (Bertalanffy), **sytuacyjny**: organizacja jako otwarty system. **IV (komputery osobiste, 80.-90.)** → **strategiczny** (Porter), **zasobowy** (Barney), **TQM, BPR**. **V (internet, 90.-00.)** → **sieciowy**, **wiedzy** (Drucker, Nonaka), **lean startup**. **VI (smartfony, social, big data, 10.-20.)** → **agile/zwinny**, **turkusowy** (Laloux), **lean enterprise**. **VII (AI, 2020+)** → **człowiek+AI**, **augmentacja decyzji**, **algorytmiczne zarządzanie**, hybrydowe modele pracy. **Trend**: od kontroli do autonomii, od hierarchii do sieci."},{"q":"Jak różne pokolenia wpływają na style przywództwa i motywowanie?","a":"**Boomers**: oczekują **transakcyjnego przywództwa** (jasne KPI, hierarchia), motywują ich: status, bezpieczeństwo, awans, lojalność firmy. **Pokolenie X**: lubią **delegujący/demokratyczny** styl, motywują ich: autonomia, work-life balance, rozwój kompetencji, finansowa stabilność. **Pokolenie Y (Millennials)**: oczekują **transformacyjnego/coachingowego** stylu, częstego feedbacku. Motywują ich: **purpose** (sens pracy), rozwój, elastyczność, technologia, DEI. **Pokolenie Z**: chcą **servant leadership** (lider jako mentor), autentyczność, transparentność. Motywują ich: dobrostan (mental health), wartości (klimat, równość), krótkie projekty, tech tools, side hustles. **Wniosek dla lidera**: nie można zarządzać 'jednym stylem dla wszystkich' - **przywództwo sytuacyjne pokoleniowo**. Reverse mentoring, zróżnicowane benefit packages, indywidualizacja."},{"q":"Jakie są powiązania między kompetencjami menedżerskimi a podejmowaniem decyzji w warunkach niepewności?","a":"W **VUCA/BANI** klasyczne kompetencje **techniczne** (Katz) tracą znaczenie (AI je zastępuje), a rosną: **(1) Koncepcyjne** (systemowe myślenie) - widzenie wzorców w chaosie, łączenie kropek. **(2) EQ** (Goleman) - radzenie sobie z stresem i emocjami zespołu w niepewności. **(3) Adaptywność** - zmiana kierunku przy nowych informacjach (agile). **(4) Decyzyjność pod presją** - zamiast czekać na pełną informację (paraliż analizy), decydować z 70% danych (zasada Jeffa Bezosa). **(5) Krytyczne myślenie** - rozpoznawanie biasów (Kahneman), heurystyk, fałszywych narracji. **(6) Komunikacja kryzysowa** - jasno mówić zespołowi co wiemy/nie wiemy. **(7) Resilience** - odporność na porażki, uczenie się z błędów. **(8) Ciekawość i lifelong learning** - bo świat zmienia się szybciej niż wiedza w głowach. Top WEF Future Skills 2025 to głównie te kompetencje."},{"q":"Jak STP wspiera strategię Portera różnicowania/koncentracji?","a":"**STP umożliwia obie strategie** Portera (różnicowanie i koncentracja). **Strategia różnicowania** wymaga STP: (1) **Segmentacja** identyfikuje grupy, dla których unikalność produktu ma wartość; (2) **Targeting** - wybieramy segmenty skłonne zapłacić premium za różnice; (3) **Positioning** - **kluczowy element** - tworzymy unikalne miejsce w głowie klienta. Bez positioningu różnicowanie jest niewidzialne. Apple: różnicowanie + STP na 'creative professionals'. **Strategia koncentracji** (focus) **JEST W ZASADZIE STP** dla 1 niszy: (1) Segmentacja **bardzo wąska**; (2) Targeting **jednego segmentu** (focus); (3) Pozycjonowanie 'najlepsi dla tej niszy'. Może być **focus cost** (najtańsi w niszy - Ryanair w Europie) lub **focus differentiation** (najwyższa jakość w niszy - Ferrari). **Wniosek**: STP to **operacyjne wdrożenie** strategii konkurencyjnej Portera."}]},"bibliography":[{"category":"Klasycy ogólni (kanon)","items":["Peter F. Drucker - 'Praktyka zarządzania' (1954), 'Zarządzanie XXI wieku - wyzwania' (1999). Ojciec nowoczesnego zarządzania.","Henri Fayol - 'Administracja przemysłowa i ogólna' (1916). 14 zasad zarządzania, 5 funkcji kierowniczych.","Frederick W. Taylor - 'Zasady naukowego zarządzania' (1911). Szkoła naukowa.","Max Weber - typy autorytetu i biurokracja.","Elton Mayo - eksperymenty Hawthorne, szkoła relacji międzyludzkich.","Henry Mintzberg - role menedżera, 5P strategii, typologie struktur."]},{"category":"Strategia","items":["Michael E. Porter - 'Competitive Strategy' (1980), 'Competitive Advantage' (1985), 'What is Strategy' (HBR 1996). 5 sił, strategie generyczne, łańcuch wartości.","H. Igor Ansoff - 'Corporate Strategy' (1965). Macierz Ansoffa (penetracja/rozwój produktu/rozwój rynku/dywersyfikacja).","W. Chan Kim, Renee Mauborgne - 'Blue Ocean Strategy' (2005).","Jay Barney - RBV (Resource-Based View), analiza VRIO (1991).","Alexander Osterwalder, Yves Pigneur - 'Business Model Generation' (2010). Business Model Canvas.","Alfred D. Chandler - 'Strategy and Structure' (1962). Klasyczna definicja strategii.","Treacy i Wiersema - 'The Discipline of Market Leaders' (1995)."]},{"category":"Jakość i procesy","items":["W. Edwards Deming - 14 zasad, cykl PDCA/PDSA, 'Out of the Crisis' (1986).","Joseph M. Juran - trylogia jakości (planowanie, kontrola, doskonalenie).","Philip B. Crosby - 'Quality is Free' (1979), koszty jakości, 4 absoluty.","Kaoru Ishikawa - 7 narzędzi jakości, diagram rybiej ości.","Walter A. Shewhart - karty kontrolne (1924), 'Economic Control of Quality' (1931).","Taiichi Ohno - 'Toyota Production System' (1978). 7 marnotrawstw, JIT, kanban.","James Womack, Daniel Jones - 'Lean Thinking' (1996). Synteza lean na Zachodzie.","Michael Hammer, James Champy - 'Reengineering the Corporation' (1993).","Eliyahu Goldratt - Teoria Ograniczeń (Theory of Constraints), 'Cel' (1984)."]},{"category":"CSR i interesariusze","items":["Howard R. Bowen - 'Social Responsibilities of the Businessman' (1953). Ojciec CSR.","Archie B. Carroll - 4 poziomy CSR (1979), piramida CSR (1991).","R. Edward Freeman - 'Strategic Management: A Stakeholder Approach' (1984). Teoria interesariuszy.","Milton Friedman - 'The Social Responsibility of Business is to Increase its Profits' (New York Times Magazine, 1970). Teoria akcjonariuszy.","John Elkington - 'Cannibals with Forks' (1997). Triple Bottom Line.","Klaus Schwab - 'Stakeholder Capitalism' (2021). Davos."]},{"category":"Przywództwo i motywacja","items":["Abraham Maslow - 'A Theory of Human Motivation' (1943), 'Motivation and Personality' (1954).","Frederick Herzberg - 'The Motivation to Work' (1959). Teoria dwuczynnikowa.","Douglas McGregor - 'The Human Side of Enterprise' (1960). Teoria X i Y.","Victor Vroom - 'Work and Motivation' (1964). Teoria oczekiwań.","Edwin Locke - teoria wyznaczania celów (1968). Podstawa SMART.","Edward Deci, Richard Ryan - teoria samodeterminacji (1985).","Daniel Pink - 'Drive' (2009). Autonomia, mistrzostwo, cel.","Kurt Lewin - style przywództwa (1939): autokratyczny, demokratyczny, laissez-faire.","Paul Hersey, Ken Blanchard - przywództwo sytuacyjne (1969).","Fred Fiedler - model kontyngencji (1967).","James M. Burns - 'Leadership' (1978). Transformacyjne vs transakcyjne.","Bernard Bass - rozwinięcie przywództwa transformacyjnego (1985).","Robert Greenleaf - 'Servant Leadership' (1977).","Daniel Goleman - 'Emotional Intelligence' (1995), 'Primal Leadership' (2002).","Stephen Covey - '7 nawyków skutecznego działania' (1989).","Frederic Laloux - 'Reinventing Organizations' (2014). Turkusowe organizacje.","Peter Senge - 'Piąta Dyscyplina' (1990). Organizacja ucząca się."]},{"category":"Marketing","items":["Philip Kotler - 'Marketing Management' (od 1967). Klasyk marketingu.","Leonard Berry - marketing relacji (1983).","Theodore Levitt - 'Marketing Myopia' (HBR 1960), cykl życia produktu.","Fred Reichheld - 'The Loyalty Effect' (1996), NPS (HBR 2003).","Everett Rogers - 'Diffusion of Innovations' (1962). Innowatorzy i early adopters.","E. Jerome McCarthy - 4P marketingu (1960)."]},{"category":"Finanse i ryzyko","items":["Edward I. Altman - Z-score (1968), 'Financial Ratios, Discriminant Analysis' JoF.","Harry Markowitz - Modern Portfolio Theory (1952), Nobel.","Frank Knight - 'Risk, Uncertainty and Profit' (1921). Rozróżnienie ryzyko vs niepewność.","Nassim Taleb - 'The Black Swan' (2007), 'Antifragile' (2012)."]},{"category":"Przedsiębiorczość i small business","items":["Joseph Schumpeter - 'Theorie der wirtschaftlichen Entwicklung' (1912). Twórcza destrukcja.","Peter Drucker - 'Innovation and Entrepreneurship' (1985).","Eric Ries - 'The Lean Startup' (2011). MVP, build-measure-learn.","Steve Blank - customer development, 'The Four Steps to the Epiphany' (2005).","Clayton Christensen - 'The Innovator's Dilemma' (1997). Innowacje przełomowe."]},{"category":"Polscy autorzy (mogą być w skrypcie twojej uczelni)","items":["Andrzej K. Koźmiński - 'Zarządzanie. Teoria i praktyka' (z D. Jemielniakiem), 'Koniec świata menedżerów' (2008).","Bogdan Nogalski - zarządzanie strategiczne, struktury organizacyjne.","Rafał Krupski - zarządzanie strategiczne, zmiana organizacyjna.","Bogdan Wawrzyniak - strategia przedsiębiorstwa.","Jerzy Penc - strategie zarządzania, style kierowania.","Stefan Kwiatkowski - przedsiębiorczość intelektualna.","Mieczysław Moszkowicz - strategia konkurencji.","Marian Gorynia - międzynarodowa konkurencyjność, MŚP.","Wiesław M. Grudzewski, Irena K. Hejduk - zarządzanie wiedzą, zrównoważone przedsiębiorstwo.","Jan Jeżak - nadzór korporacyjny, Ład korporacyjny."]},{"category":"Podręczniki akademickie (typowa lektura zarządzania)","items":["Ricky W. Griffin - 'Podstawy zarządzania organizacjami'. Klasyczny podręcznik, bardzo popularny w Polsce.","Stoner, Freeman, Gilbert - 'Kierowanie'.","Jemielniak, Koźmiński - 'Zarządzanie od podstaw'.","Robbins, DeCenzo, Coulter - 'Fundamentals of Management'."]}],"tactics":[{"id":"5.1","title":"Struktura każdej odpowiedzi (30-60 sekund)","blocks":[{"type":"bullet","text":"Definicja (1 zdanie): co to jest."},{"type":"bullet","text":"Autor / pochodzenie (1 zdanie): kto i kiedy."},{"type":"bullet","text":"Istota / struktura (2-3 zdania): z czego się składa."},{"type":"bullet","text":"Zastosowanie / przykład (1-2 zdania): jak to działa w praktyce."},{"type":"bullet","text":"Ograniczenia / krytyka (jeśli padnie dopytanie, 1 zdanie)."}]},{"id":"5.2","title":"Co robić gdy nie pamiętasz","blocks":[{"type":"bullet","text":"NIE zmyślaj. Lepiej powiedzieć 'nie pamiętam szczegółów, ale wiem, że koncepcja pochodzi z...' niż wymyślać."},{"type":"bullet","text":"Buduj od ogólnego do szczegółowego. Jeśli nie pamiętasz autora, zacznij od definicji i kontekstu."},{"type":"bullet","text":"Powiąż z czymś pokrewnym co znasz. 'Ta koncepcja jest zbliżona do X, który wspomniałem wcześniej...'"},{"type":"bullet","text":"Użyj przykładu. Nawet jeśli teoria ucieka, dobry przykład pokazuje zrozumienie."}]},{"id":"5.3","title":"Typowe pułapki komisji","blocks":[{"type":"bullet","text":"'Proszę podać jeszcze jeden przykład' - przygotuj po 2-3 przykłady dla każdej teorii."},{"type":"bullet","text":"'Jakie są ograniczenia tej koncepcji?' - każda teoria ma wady, warto je znać (np. BCG upraszcza, Maslow brak badań empirycznych)."},{"type":"bullet","text":"'Jak to zastosowałby Pan/Pani w swojej firmie?' - przygotuj LockerRoom.pl jako stały case."},{"type":"bullet","text":"'Jaka jest różnica między X i Y?' - klasyka (stakeholder vs shareholder, CSR vs ESG, transformacyjne vs transakcyjne, strategia vs taktyka, ryzyko vs niepewność)."},{"type":"bullet","text":"'Jak to się ma do Pana/Pani pracy magisterskiej?' - powiąż 2-3 pytania z tematem pracy."}]},{"id":"5.4","title":"Dzień obrony - praktyczne wskazówki","blocks":[{"type":"bullet","text":"Śpij co najmniej 7 godzin przed obroną. Wypoczęty mózg jest lepszy niż zmęczony z przerobionym materiałem."},{"type":"bullet","text":"Nie ucz się w dniu obrony. Co najwyżej przejrzyj skróty."},{"type":"bullet","text":"Jedz coś lekkostrawnego, bez cukru - unikaj spadków energii."},{"type":"bullet","text":"Przyjdź 15 minut wcześniej. Rozejrzyj się w sali."},{"type":"bullet","text":"Mów wyraźnie, powoli, z kontaktem wzrokowym z pytającym członkiem komisji."},{"type":"bullet","text":"Jeśli nie rozumiesz pytania - poproś o powtórzenie lub doprecyzowanie. To NIE jest minus."},{"type":"bullet","text":"Postawa: wyprostuj się, nie krzyżuj rąk, nie baw się długopisem."},{"type":"bullet","text":"Traktuj obronę jak rozmowę ekspertów, nie jak egzamin - komisja to koledzy po fachu, którzy chcą poznać Twoje myślenie."}]},{"id":"5.5","title":"Finalne słowo","blocks":[{"type":"callout","label":null,"text":"Pamiętaj: komisja to nie wrogowie. Chcą dać Ci zdać. Większość pytań dodatkowych to zaproszenie do pokazania wiedzy, nie łapanka na błędzie. Odpowiadaj spokojnie, z pewnością siebie, ale z pokorą wobec granic własnej wiedzy. Powodzenia!"}]}],"glossary":[{"term":"BATNA","definition":"Best Alternative To a Negotiated Agreement - najlepsza alternatywa wobec wynegocjowanego porozumienia (Harvard Negotiation Project)."},{"term":"BEP (Break-even Point)","definition":"Próg rentowności - poziom sprzedaży, przy którym przychody pokrywają koszty (zysk = 0)."},{"term":"BPMN","definition":"Business Process Model and Notation - standardowa notacja do mapowania procesów biznesowych."},{"term":"BSC (Balanced Scorecard)","definition":"Zrównoważona Karta Wyników - 4 perspektywy: finansowa, klienta, procesów, rozwoju (Kaplan, Norton)."},{"term":"CBA","definition":"Cost-Benefit Analysis - analiza kosztów i korzyści."},{"term":"CLV","definition":"Customer Lifetime Value - wartość klienta w cyklu jego życia."},{"term":"CMMI","definition":"Capability Maturity Model Integration - 5-poziomowy model dojrzałości procesowej."},{"term":"CSR / ESG","definition":"Corporate Social Responsibility / Environmental, Social, Governance - społeczna odpowiedzialność / wymiar środowiskowy, społeczny i ładu korporacyjnego."},{"term":"CVP","definition":"Cost-Volume-Profit Analysis - analiza koszt-wolumen-zysk (powiązana z BEP)."},{"term":"FMEA","definition":"Failure Mode and Effects Analysis - analiza rodzajów i skutków możliwych wad. RPN = S x O x D."},{"term":"JIT","definition":"Just in Time - produkcja dokładnie na czas (Toyota)."},{"term":"KPI","definition":"Key Performance Indicator - kluczowy wskaźnik efektywności."},{"term":"Lean Management","definition":"Filozofia eliminacji marnotrawstwa (muda) i tworzenia wartości dla klienta. 7 strat Ohno."},{"term":"MŚP","definition":"Małe i Średnie Przedsiębiorstwa - <250 pracowników, obrót <50 mln EUR."},{"term":"NPV / IRR","definition":"Net Present Value / Internal Rate of Return - wartość bieżąca netto / wewnętrzna stopa zwrotu (ocena inwestycji)."},{"term":"OKR","definition":"Objectives and Key Results - cele i kluczowe wyniki (popularne w Google, startupach)."},{"term":"PDCA","definition":"Plan-Do-Check-Act - cykl Deminga, podstawa ciągłego doskonalenia."},{"term":"RACI","definition":"Macierz odpowiedzialności: Responsible, Accountable, Consulted, Informed."},{"term":"RPN","definition":"Risk Priority Number we FMEA - iloczyn znaczenia, częstości i wykrywalności wady."},{"term":"SIPOC","definition":"Suppliers - Inputs - Process - Outputs - Customers - narzędzie mapowania procesu."},{"term":"SMART","definition":"Cele: Specific, Measurable, Achievable, Relevant, Time-bound."},{"term":"SPC","definition":"Statistical Process Control - statystyczna kontrola procesu (karty Shewharta)."},{"term":"STP","definition":"Segmentation - Targeting - Positioning - klasyczny proces marketingu strategicznego."},{"term":"SWOT","definition":"Strengths, Weaknesses, Opportunities, Threats - analiza mocnych/słabych stron i szans/zagrożeń."},{"term":"TQM","definition":"Total Quality Management - kompleksowe zarządzanie przez jakość."},{"term":"USP","definition":"Unique Selling Proposition - unikalna cecha sprzedażowa."},{"term":"VaR","definition":"Value at Risk - miara ryzyka finansowego."},{"term":"VRIO","definition":"Valuable, Rare, Inimitable, Organized - analiza zasobów strategicznych (Barney)."},{"term":"VUCA / BANI","definition":"Volatility-Uncertainty-Complexity-Ambiguity / Brittle-Anxious-Non-linear-Incomprehensible - charakterystyki współczesnego otoczenia."}]}</script>

    completedToday: 0,
    lastResetDate: null,
  },
  mockExam: null,         // { questions: [qId], current: 0, startTime, results: [] } - active mock exam
  mockExamStats: {        // History

let state = defaultState();

function loadState() {
  try {
    const raw = localStorage.getItem(STATE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      const defaults = defaultState();
      // Deep merge for nested objects
      state = {
        ...defaults,
        ...parsed,
        stats: { ...defaults.stats, ...(parsed.stats || {}) },
        settings: { ...defaults.settings, ...(parsed.settings || {}) },
        pomodoro: { ...defaults.pomodoro, ...(parsed.pomodoro || {}) },
        mockExamStats: { ...defaults.mockExamStats, ...(parsed.mockExamStats || {}) },
      };
    }
  } catch (e) { console.warn('state load failed', e); }
}

function saveState() {
  try {
    localStorage.setItem(STATE_KEY, JSON.stringify(state));
  } catch (e) { console.warn('state save failed', e); }
}

// SM-2 algorithm
// quality: 0-5 (0=blackout, 5=perfect)
// returns updated card { ef, interval, reps, dueDate }
function sm2(card, quality) {
  card = card || { ef: 2.5, interval: 0, reps: 0 };
  let { ef, interval, reps } = card;

  if (quality < 3) {
    reps = 0;
    interval = 1;
  } else {
    reps += 1;
    if (reps === 1) interval = 1;
    else if (reps === 2) interval = 6;
    else interval = Math.round(interval * ef);
  }

  ef = Math.max(1.3, ef + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02)));

  const dueDate = new Date();
  dueDate.setDate(dueDate.getDate() + interval);
  dueDate.setHours(0, 0, 0, 0);

  return { ef, interval, reps, dueDate: dueDate.toISOString(), lastReviewed: new Date().toISOString() };
}

function getCardStatus(qId) {
  const c = state.cards[qId];
  if (!c) return 'new';
  if (c.reps === 0) return 'new';
  if (c.reps < 3) return 'learning';
  if (c.reps < 6) return 'known';
  return 'mastered';
}

function getDueCards() {
  const now = new Date();
  const out = [];
  for (const q of DATA.questions) {
    const c = state.cards[q.id];
    if (!c) continue;
    const due = new Date(c.dueDate);
    if (due <= now) out.push(q);
  }
  return out;
}

function recordReview(qId, quality) {
  state.cards[qId] = sm2(state.cards[qId], quality);
  state.cards[qId].confidenceHistory = (state.cards[qId].confidenceHistory || []).concat(quality);
  state.stats.totalReviews++;
  updateStreak();
  saveState();
}

function updateStreak() {
  const today = new Date().toISOString().slice(0, 10);
  if (state.stats.lastSessionDate !== today) {
    if (state.stats.lastSessionDate) {
      const last = new Date(state.stats.lastSessionDate);
      const diff = (new Date(today) - last) / 86400000;
      if (diff <= 1.5) state.stats.streakDays = (state.stats.streakDays || 0) + 1;
      else state.stats.streakDays = 1;
    } else {
      state.stats.streakDays = 1;
    }
    state.stats.lastSessionDate = today;
  }
}

function el(tag, props = {}, children = []) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(props)) {
    if (k === 'class') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'dataset') Object.assign(e.dataset, v);
    else if (v !== null && v !== undefined) e.setAttribute(k, v);
  }
  if (typeof children === 'string') e.textContent = children;
  else for (const c of children) if (c) e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  return e;
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Render answer text with **bold** markdown converted to <strong>
function renderFollowUpAnswer(text) {
  if (!text) return '';
  // Escape first, then convert **X** to <strong>X</strong>
  let html = escapeHtml(text);
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  return html;
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Days between today and defense date
function daysToDefense() {
  if (!state.defenseDate) return null;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const dd = new Date(state.defenseDate);
  dd.setHours(0, 0, 0, 0);
  return Math.round((dd - today) / 86400000);
}

// Build day-by-day study plan based on days available
// Returns array of { dayNum, daysBefore, title, desc, time, isToday, isPast }
// Map a plan task title to the most appropriate view to open
function planTaskTarget(title) {
  const t = title.toLowerCase();

  // Specific reading tasks - Overview
  if (t.includes('przegląd cz') || t.includes('przegląd wszystkich')) {
    // Try to extract question range, e.g. "pyt. 1-8" or "pyt. 16-25"
    const rangeMatch = title.match(/pyt\.?\s*(\d+)-(\d+)/i);
    if (rangeMatch) {
      return { view: 'overview', label: 'Otwórz pytanie ' + rangeMatch[1] + ' →', params: { qId: parseInt(rangeMatch[1]) } };
    }
    return { view: 'overview', label: 'Otwórz Przegląd →' };
  }

  // Errata + pogłębienia
  if (t.includes('errata') && t.includes('pogłębieni')) {
    return { view: 'errata', label: 'Otwórz Erratę →', secondary: { view: 'deep', label: 'Pogłębienia →' } };
  }
  if (t.includes('errata')) return { view: 'errata', label: 'Otwórz Erratę →' };
  if (t.includes('pogłębieni')) return { view: 'deep', label: 'Otwórz Pogłębienia →' };

  // Fiszki
  if (t.includes('fiszki')) {
    if (t.includes('ogólne') || t.includes('1-15')) return { view: 'flashcards', label: 'Otwórz Fiszki (ogólne) →', params: { mode: 'ogolne', reset: true } };
    if (t.includes('kierunkowe') || t.includes('16-40')) return { view: 'flashcards', label: 'Otwórz Fiszki (kierunkowe) →', params: { mode: 'kierunkowe', reset: true } };
    return { view: 'flashcards', label: 'Otwórz Fiszki →', params: { mode: 'all', reset: true } };
  }

  // SM-2 / Powtórki
  if (t.includes('sm-2') || t.includes('powtórki')) return { view: 'spaced', label: 'Otwórz Powtórki SM-2 →' };

  // Recall
  if (t.includes('recall')) return { view: 'recall', label: 'Otwórz Recall test →' };

  // Quiz
  if (t.includes('quiz')) return { view: 'quiz', label: 'Otwórz Quiz →' };

  // Defense mode
  if (t.includes('tryb obronny') || t.includes('obronny')) return { view: 'defense', label: 'Otwórz Tryb obronny →' };

  // Taktyka
  if (t.includes('taktyka')) return { view: 'tactics', label: 'Otwórz Taktykę obrony →' };

  // Skróty
  if (t.includes('skróty') || t.includes('tylko skróty')) return { view: 'overview', label: 'Otwórz Przegląd (skróty) →' };

  // Bibliografia / słowniczek
  if (t.includes('bibliografia') || t.includes('słowniczek')) return { view: 'glossary', label: 'Otwórz Słowniczek →', secondary: { view: 'biblio', label: 'Bibliografia →' } };

  // Obrona dzień
  if (t.includes('obrona')) return { view: 'tactics', label: 'Przeczytaj taktykę obrony →' };

  // Default - return null and we'll show generic "next stage" button
  return null;
}

function formatPolishDate(d) {
  const days = ['nd', 'pn', 'wt', 'śr', 'cz', 'pt', 'sb'];
  const months = ['sty', 'lut', 'mar', 'kwi', 'maj', 'cze', 'lip', 'sie', 'wrz', 'paź', 'lis', 'gru'];

function showTipBanner(viewName, root, title, text) {
  if (state.hintsSeen[viewName]) return;
  const banner = document.createElement('div');
  banner.className = 'tip-banner';
  banner.innerHTML = `
    <div class="tip-banner-icon">✦</div>
    <div class="tip-banner-content">
      <div class="tip-banner-title">${escapeHtml(title)}</div>
      <div class="tip-banner-text">${text}</div>
    </div>
    <button class="tip-banner-close" title="Zamknij wskazówkę">×</button>
  `;
  banner.querySelector('.tip-banner-close').addEventListener('click', () => {
    state.hintsSeen[viewName] = true;
    saveState();
    banner.remove();
  });
  // Insert after view header if exists, else at top

  if (header) header.parentNode.insertBefore(banner, header.nextSibling);

}

// Apply current settings (theme, mode, fontSize) to document root
function applySettings() {
  const html = document.documentElement;
  html.dataset.theme = state.settings.theme;
  html.dataset.mode = state.settings.mode;
  html.dataset.fs = state.settings.fontSize;
}

// Log a session - called when starting a learning view
function logSession(viewName) {
  const today = new Date().toISOString().slice(0, 10);
  // De-duplicate by viewName+date - only one log per view per day for the bar chart
  if (!state.sessionLog) state.sessionLog = [];
  state.sessionLog.push({ date: new Date().toISOString(), view: viewName });
  // Keep only last 200
  if (state.sessionLog.length > 200) state.sessionLog = state.sessionLog.slice(-200);
  saveState();
}

// Activity count per day for last N days
function activityForDays(daysCount) {
  const counts = {};
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  for (let i = daysCount - 1; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    counts[d.toISOString().slice(0, 10)] = 0;
  }
  for (const entry of (state.sessionLog || [])) {
    const day = entry.date.slice(0, 10);
    if (counts[day] != null) counts[day]++;
  }
  return Object.entries(counts).map(([date, count]) => ({ date, count }));
}

// Export/import state
function exportState() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const today = new Date().toISOString().slice(0, 10);
  a.download = `obrona-postepy-${today}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importStateFromFile(file, callback) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!parsed.cards && !parsed.stats) throw new Error('Nieprawidłowy plik postępów.');
      const defaults = defaultState();
      state = {
        ...defaults,
        ...parsed,
        stats: { ...defaults.stats, ...(parsed.stats || {}) },
        settings: { ...defaults.settings, ...(parsed.settings || {}) },
        pomodoro: { ...defaults.pomodoro, ...(parsed.pomodoro || {}) },
        mockExamStats: { ...defaults.mockExamStats, ...(parsed.mockExamStats || {}) },
      };
      saveState();
      applySettings();
      callback(true, null);
    } catch (err) {
      callback(false, err.message);
    }
  };
  reader.onerror = () => callback(false, 'Błąd odczytu pliku.');
  reader.readAsText(file);
}

  if (!state.tags[qId]) state.tags[qId] = {};
  state.tags[qId][tag] = !state.tags[qId][tag];
  saveState();
}
function hasTag(qId, tag) {
  return !!(state.tags[qId] && state.tags[qId][tag]);
}

// Note helpers
function saveNote(qId, text) {
  if (text && text.trim()) state.notes[qId] = text;
  else delete state.notes[qId];
  saveState();
}

  else root.innerHTML = '<p>View not found: ' + viewName + '</p>';
  // close mobile sidebar
  document.getElementById('sidebar').classList.remove('mobile-open');

  document.getElementById('badge-due').textContent = getDueCards().length;
}

          <div class="faq-a">
            Active recall to aktywne przypominanie sobie informacji z pamięci, w przeciwieństwie do biernego czytania.
            Roediger i Karpicke pokazali w 2006 roku, że studenci którzy <strong>testowali się</strong> z materiału
            zapamiętywali znacznie więcej niż ci którzy go <strong>czytali</strong> wielokrotnie. Każde wymuszenie

        <div class="faq-item">
          <div class="faq-q">Jak działa algorytm SM-2?
            <span class="faq-q-arrow">›</span>

          <div class="faq-a">
            SM-2 (SuperMemo, Piotr Woźniak, lata 80.) to algorytm spaced repetition - ten sam, na którym opiera się Anki.
            Po każdej fiszce oceniasz 0-5 jak Ci poszło. Jeśli słabo (0-2), karta wraca jutro. Jeśli dobrze (4-5),
            odstęp rośnie wykładniczo: 1 dzień → 6 dni → 2 tygodnie → miesiąc → 2,5 miesiąca. Dzięki temu nie marnujesz

        <div class="faq-item">

            30-60 minut. Pełen przegląd pytań - 1-2 godziny. Lepiej krócej a codziennie, niż 6 godzin raz w tygodniu.
            Mózg konsoliduje pamięć w trakcie snu, więc rozkład na wiele dni jest dużo skuteczniejszy niż jeden

        <div class="faq-item">

          <div class="faq-a">

          </div>
        </div>

        <div class="faq-item">
          <div class="faq-q">Czy postępy zapisują się gdzieś?
            <span class="faq-q-arrow">›</span>
          </div>
          <div class="faq-a">
            Tak - lokalnie w przeglądarce (localStorage). Działa offline, nie wymaga konta, nie wysyła nic do internetu.

          </div>
        </div>

        <div class="faq-item">
          <div class="faq-q">Czy ta aplikacja gwarantuje zdanie na 5?
            <span class="faq-q-arrow">›</span>
          </div>
          <div class="faq-a">
            Żadna aplikacja nie gwarantuje 5. Ale: <strong>materiały są bardzo solidne</strong> (40 pytań rozpisanych
            z definicjami, odpowiedziami, przykładami, skrótami, plus errata, pogłębienia, 209 pytań follow-up i
            bibliografia), <strong>metody nauki są najlepiej udokumentowane w psychologii poznawczej</strong>
            (active recall + spaced repetition to nie moda, to konsensus naukowy), a komisja zazwyczaj <strong>chce
            dać zdać</strong> - większość pytań dodatkowych to zaproszenie do pokazania wiedzy, nie pułapka.
            Jeśli przerobisz większość materiału tymi metodami, mówisz spokojnie i strukturalnie (definicja → istota

        <div class="faq-item">

            Patrz sekcja <strong>Taktyka obrony</strong> - punkt 5.2. W skrócie: nie zmyślaj. Powiedz to co wiesz,

            Użyj przykładu - nawet jeśli teoria ucieka, dobry przykład pokazuje, że temat rozumiesz. Jeśli nie znasz
            szczegółu, powiedz "nie pamiętam dokładnej daty, ale wiem że koncepcja pochodzi od..." - to jest OK,

          </div>
        </div>

        <div class="faq-item">

          </div>
        </div>

        <div class="faq-item">
          <div class="faq-q">Dlaczego mam czasem 209, a czasem mniej pytań w quizie?

            nie wpadniesz w rutynę odpowiadania na blok pytań z jednego tematu.
          </div>
        </div>
      </div>

// ============================================================
// VIEW: OVERVIEW (lista wszystkich pytań)
// ============================================================
views.overview = (root, params = {}) => {
  if (params.qId) {
    renderSingleQuestion(root, params.qId);
    return;
  }

  let activeFilter = params.filter || 'all';

  const partitions = {
    ogolne: DATA.questions.filter(q => q.id <= 15),
    kierunkowe: DATA.questions.filter(q => q.id > 15),
  };

  function buildItem(q) {
    const status = getCardStatus(q.id);
    const statusLabels = { new: 'Nowe', learning: 'Uczenie', known: 'Znane', mastered: 'Opanowane' };
    return `
      <button class="q-list-item" data-qid="${q.id}">
        <span class="q-list-item-num">${String(q.id).padStart(2, '0')}</span>
        <span class="q-list-item-title">${escapeHtml(q.title)}${q.isNew ? ' <span class="new-badge new-badge-sm">NOWE</span>' : ''}</span>
        <span class="q-list-item-status status-${status}">${statusLabels[status]}</span>
      </button>
    `;
  }

  function passes(q) {
    if (activeFilter === 'all') return true;
    if (activeFilter === 'new') return getCardStatus(q.id) === 'new';
    if (activeFilter === 'learning') return getCardStatus(q.id) === 'learning';
    if (activeFilter === 'known') return ['known', 'mastered'].includes(getCardStatus(q.id));
    if (activeFilter === 'ogolne') return q.id <= 15;
    if (activeFilter === 'kierunkowe') return q.id > 15;
    return true;
  }

  function refresh() {
    const ogList = partitions.ogolne.filter(passes).map(buildItem).join('');
    const kiList = partitions.kierunkowe.filter(passes).map(buildItem).join('');

    root.innerHTML = `
      <div class="view-header">
        <div class="view-eyebrow">Etap 1 · Czytanie</div>
        <h1 class="view-title">Przegląd materiału</h1>
        <p class="view-subtitle">Wszystkie 40 pytań z definicjami, pełnymi odpowiedziami, przykładami i skrótami. Najpierw przeczytaj wszystko od deski do deski, dopiero potem przejdź do fiszek.</p>
      </div>

      <div class="filter-chips">
        ${['all','new','learning','known','ogolne','kierunkowe'].map(f => {
          const labels = {all: 'Wszystkie', new: 'Nowe', learning: 'W trakcie', known: 'Znane', ogolne: 'Kształcenie ogólne', kierunkowe: 'Kształcenie kierunkowe'};
          return `<button class="chip ${activeFilter === f ? 'active' : ''}" data-filter="${f}">${labels[f]}</button>`;
        }).join('')}
      </div>

      ${(activeFilter !== 'kierunkowe' && ogList) ? `
        <div class="section-divider">CZĘŚĆ I · Kształcenie ogólne (pytania 1-15)</div>
        <div class="q-list">${ogList}</div>
      ` : ''}

      ${(activeFilter !== 'ogolne' && kiList) ? `
        <div class="section-divider">CZĘŚĆ II · Kształcenie kierunkowe (pytania 16-40)</div>
        <div class="q-list">${kiList}</div>
      ` : ''}

      ${(!ogList && !kiList) ? '<div class="empty"><div class="empty-icon">⌀</div><div class="empty-title">Brak pytań</div><p>Spróbuj zmienić filtr.</p></div>' : ''}
    `;

    root.querySelectorAll('[data-qid]').forEach(b => b.addEventListener('click', () => render('overview', { qId: parseInt(b.dataset.qid) })));
    root.querySelectorAll('[data-filter]').forEach(b => b.addEventListener('click', () => { activeFilter = b.dataset.filter; refresh(); }));

    // First-time tip
    showTipBanner('overview', root, 'Etap 1 - czytanie',
      'Przeczytaj wszystkie pytania w kolejności. Każde ma <strong>definicję, pełną odpowiedź w 3 akapitach, przykład i skrót</strong> na neonowym tle (do szybkiej powtórki przed obroną). Czytaj raz spokojnie - nie próbuj jeszcze zapamiętywać. Zapamiętywanie zacznie się w fiszkach. Po przeczytaniu pytania możesz przejść do kolejnego strzałkami u góry.');
  }

  refresh();
};

function renderSingleQuestion(root, qId) {
  const q = DATA.questions.find(x => x.id === qId);
  if (!q) { root.innerHTML = '<p>Pytanie nie znalezione.</p>'; return; }

  const prevQ = DATA.questions.find(x => x.id === qId - 1);
  const nextQ = DATA.questions.find(x => x.id === qId + 1);

  // Find errata/deepenings related to this question
  const relatedErrata = DATA.errata.filter(e => {
    // Match by keywords in title - rough but useful
    const eTitle = e.title.toLowerCase();
    const qTitle = q.title.toLowerCase();
    const keywords = ['bcg', 'csr', 'altman', 'shewhart', 'lean', 'marketing relacji', 'koszt', 'bep', 'porter', 'maslow', 'interesariusz', 'transformacyjne'];
    for (const kw of keywords) {
      if (eTitle.includes(kw) && qTitle.includes(kw)) return true;
    }
    return false;
  });

  root.innerHTML = `
    <div class="controls-bar">
      <button class="btn btn-ghost btn-sm" data-back>← Wróć do listy</button>
      <div class="controls-actions">
        ${prevQ ? `<button class="btn btn-secondary btn-sm" data-prev>← ${prevQ.id}. ${escapeHtml(prevQ.title.slice(0, 30))}${prevQ.title.length > 30 ? '...' : ''}</button>` : ''}
        ${nextQ ? `<button class="btn btn-secondary btn-sm" data-next>${nextQ.id}. ${escapeHtml(nextQ.title.slice(0, 30))}${nextQ.title.length > 30 ? '...' : ''} →</button>` : ''}
      </div>
    </div>

    <div class="tag-row">
      <button class="tag-btn tag-hard ${hasTag(q.id, 'hard') ? 'active' : ''}" data-toggle-tag="hard">
        <span style="font-size: 14px;">❗</span> ${hasTag(q.id, 'hard') ? 'Trudne' : 'Oznacz jako trudne'}
      </button>
      <button class="tag-btn tag-fav ${hasTag(q.id, 'favorite') ? 'active' : ''}" data-toggle-tag="favorite">
        <span style="font-size: 14px;">★</span> ${hasTag(q.id, 'favorite') ? 'Ulubione' : 'Dodaj do ulubionych'}
      </button>
    </div>

    <div class="q-card">
      <div class="q-card-num">PYTANIE ${String(q.id).padStart(2, '0')} / 40 ${q.id <= 15 ? '· Kształcenie ogólne' : '· Kształcenie kierunkowe'}${q.isNew ? ' <span class="new-badge">NOWE</span>' : ''}</div>
      <h1 class="q-card-title">${escapeHtml(q.title)}</h1>

      <div class="q-section">
        <div class="q-label">Definicja</div>
        <div class="q-definition">${escapeHtml(q.definition)}</div>
      </div>

      <div class="q-section">
        <div class="q-label">Pełna odpowiedź</div>
        ${q.answer.map(p => `<p class="q-paragraph">${renderFollowUpAnswer(p)}</p>`).join('')}
      </div>

      ${q.schema ? `
      <div class="q-section">
        <div class="q-label">Schemat</div>
        <pre style="background: var(--bg-soft); padding: 16px; border-radius: 8px; font-family: var(--font-mono); font-size: 12px; overflow-x: auto; color: var(--text-dim);">${escapeHtml(q.schema)}</pre>
      </div>` : ''}

      <div class="q-section">
        <div class="q-label">Przykład z praktyki</div>
        <div class="q-example">${escapeHtml(q.example || '')}</div>
      </div>

      <div class="q-section">
        <div class="q-label">Skrót (do szybkiej powtórki)</div>
        <div class="q-short">${escapeHtml(q.short || '')}</div>
      </div>

      ${q.follow_up && q.follow_up.length ? `
      <div class="q-section">
        <div class="q-label">Możliwe pytania dodatkowe od komisji</div>
        <div class="followup-list">
          ${q.follow_up.map((f, i) => `
            <details class="followup-item">
              <summary class="followup-q">
                <span class="followup-q-num">${i + 1}</span>
                <span class="followup-q-text">${escapeHtml(typeof f === 'string' ? f : f.q)}</span>
                <span class="followup-arrow">›</span>
              </summary>
              <div class="followup-a">
                ${typeof f === 'object' && f.a ? renderFollowUpAnswer(f.a) : '<em style="color: var(--text-faint);">Spróbuj odpowiedzieć z głównej odpowiedzi powyżej - to pytanie pogłębiające temat.</em>'}
              </div>
            </details>
          `).join('')}
        </div>
      </div>` : ''}

      ${relatedErrata.length ? `
      <div class="q-section">
        <div class="q-label">⚠ Powiązana errata</div>
        ${relatedErrata.map(e => `
          <div class="entry has-blocks" style="margin-bottom: 10px;">
            <div class="entry-title" style="font-size: 15px; margin-bottom: 10px;">${escapeHtml(e.title)}</div>
            ${e.blocks ? renderBlocks(e.blocks) : `<div class="entry-content" style="font-size: 13px;">${escapeHtml(e.content || '')}</div>`}

        `).join('')}
      </div>` : ''}

      <div class="q-section">
        <div class="q-label">Twoje notatki</div>
        <div class="notes-editor">
          <textarea id="note-input" placeholder="Dopisz swoje uwagi, mnemoniki, własne przykłady...">${escapeHtml(state.notes[q.id] || '')}</textarea>
          <div class="notes-editor-meta">
            <span id="note-status">Zapisuje się automatycznie</span>

  root.querySelector('[data-back]').addEventListener('click', () => render('overview'));
  if (prevQ) root.querySelector('[data-prev]').addEventListener('click', () => render('overview', { qId: prevQ.id }));
  if (nextQ) root.querySelector('[data-next]').addEventListener('click', () => render('overview', { qId: nextQ.id }));

  // Tag toggles
  root.querySelectorAll('[data-toggle-tag]').forEach(b => b.addEventListener('click', () => {
    toggleTag(q.id, b.dataset.toggleTag);
    render('overview', { qId: q.id });
  }));

  // Auto-save notes with debounce
  const noteInput = root.querySelector('#note-input');
  const noteStatus = root.querySelector('#note-status');
  let noteTimer = null;
  noteInput.addEventListener('input', (e) => {
    if (noteStatus) noteStatus.textContent = 'Zapisuje...';
    if (noteTimer) clearTimeout(noteTimer);
    noteTimer = setTimeout(() => {
      saveNote(q.id, e.target.value);
      if (noteStatus) noteStatus.textContent = '✓ Zapisane';
    }, 500);
  });
}

let flashcardQueue = [];
let flashcardIndex = 0;
let flashcardFlipped = false;
let flashcardMode = 'all';  // 'all' | 'due' | 'ogolne' | 'kierunkowe'

views.flashcards = (root, params = {}) => {

    flashcardQueue = buildFlashcardQueue(flashcardMode);

    flashcardFlipped = false;
  }

  if (flashcardIndex >= flashcardQueue.length) {
    renderFlashcardComplete(root);
    return;
  }

  const q = flashcardQueue[flashcardIndex];
  const total = flashcardQueue.length;
  const progress = ((flashcardIndex) / total) * 100;
  const card = state.cards[q.id];
  const dueIn = card ? Math.max(0, Math.round((new Date(card.dueDate) - new Date()) / 86400000)) : 0;

  root.innerHTML = `
    <div class="view-header">
      <div class="view-eyebrow">Etap 2 · Active recall + spaced repetition</div>
      <h1 class="view-title">Fiszki</h1>

    </div>

    <div class="filter-chips">
      <button class="chip ${flashcardMode === 'all' ? 'active' : ''}" data-mode="all">Wszystkie</button>
      <button class="chip ${flashcardMode === 'due' ? 'active' : ''}" data-mode="due">Tylko do powtórki</button>
      <button class="chip ${flashcardMode === 'ogolne' ? 'active' : ''}" data-mode="ogolne">Ogólne (1-15)</button>
      <button class="chip ${flashcardMode === 'kierunkowe' ? 'active' : ''}" data-mode="kierunkowe">Kierunkowe (16-40)</button>
      <button class="chip" data-shuffle="1">↻ Tasuj</button>
    </div>

    <div class="controls-bar">
      <div class="controls-info">Karta ${flashcardIndex + 1} / ${total}</div>
      <div class="controls-actions">
        <button class="btn btn-ghost btn-sm" data-prev ${flashcardIndex === 0 ? 'disabled' : ''}>← Poprzednia</button>
        <button class="btn btn-ghost btn-sm" data-skip>Pomiń →</button>
      </div>
    </div>

    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>

    <div class="flashcard-container">
      <div class="flashcard ${flashcardFlipped ? 'flipped' : ''}" id="flashcard">
        <!-- FRONT -->
        <div class="flashcard-face flashcard-front">
          <div class="flashcard-meta">
            <span>Pytanie ${q.id} / 40 · ${q.id <= 15 ? 'Ogólne' : 'Kierunkowe'}${q.isNew ? ' <span class="new-badge new-badge-sm">NOWE</span>' : ''}</span>
            <span>${card ? `Powtórka #${card.reps} · ${dueIn === 0 ? 'dziś' : 'za ' + dueIn + ' dni'}` : 'Nowa karta'}</span>
          </div>
          <div style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--accent); margin-bottom: 12px; font-weight: 600;">Pytanie</div>
          <div class="flashcard-title">${escapeHtml(q.title)}</div>
          <div style="margin-top: 16px; padding: 14px 16px; background: var(--bg-soft); border-radius: 8px; font-style: italic; color: var(--text-dim); font-size: 14px; line-height: 1.6;">
            <strong style="color: var(--text); font-style: normal; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-bottom: 6px;">Definicja</strong>
            ${escapeHtml(q.definition)}
          </div>
          <div class="flashcard-hint">
            <span class="kbd">Spacja</span> aby obrócić · Spróbuj wymienić wszystko z pamięci zanim klikniesz
          </div>
        </div>

        <!-- BACK -->
        <div class="flashcard-face flashcard-back">
          <div class="flashcard-meta">
            <span>Pytanie ${q.id} / 40</span>
            <span>Pełna odpowiedź</span>
          </div>
          <div class="q-card-title" style="font-size: 20px; margin-bottom: 16px;">${escapeHtml(q.title)}</div>
          ${q.answer.map(p => `<p class="q-paragraph" style="font-size: 14px;">${renderFollowUpAnswer(p)}</p>`).join('')}
          <div class="q-short" style="margin-top: 16px; font-size: 13px; padding: 12px 16px;">${escapeHtml(q.short || '')}</div>
          <div style="margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--border); color: var(--text-faint); font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600;">Oceń jak Ci poszło (kalibracja pewności)</div>
          <div class="confidence-row">
            ${[0, 1, 2, 3, 4, 5].map(n => {
              const labels = ['Czarna dziura', 'Źle', 'Trudno', 'OK', 'Dobrze', 'Perfekcja'];

          </div>
        </div>

  const fc = root.querySelector('#flashcard');

    fc.classList.toggle('flipped', flashcardFlipped);

  root.querySelectorAll('[data-conf]').forEach(b => {
    b.addEventListener('click', (e) => {

      render('flashcards');

    render('flashcards');

    render('flashcards');

  root.querySelector('[data-skip]').addEventListener('click', () => { flashcardIndex++; flashcardFlipped = false; render('flashcards'); });

  // First-time tip
  showTipBanner('flashcards', root, 'Jak używać fiszek',
    'Czytasz definicję, <strong>mów odpowiedź na głos</strong> z pamięci, dopiero potem klikasz w kartę (lub <span class="kbd">Spacja</span>) żeby ją obrócić. Po obrocie oceniasz uczciwie 0-5 - to jak dobrze Ci poszło. Algorytm SM-2 sam wybierze kiedy pokazać Ci tę kartę ponownie.');
};

function buildFlashcardQueue(mode) {
  let qs;
  if (mode === 'due') qs = getDueCards().length ? getDueCards() : DATA.questions.filter(q => getCardStatus(q.id) === 'new').slice(0, 10);
  else if (mode === 'ogolne') qs = DATA.questions.filter(q => q.id <= 15);
  else if (mode === 'kierunkowe') qs = DATA.questions.filter(q => q.id > 15);
  else qs = DATA.questions.slice();
  return shuffle(qs);
}

function renderFlashcardComplete(root) {
  root.innerHTML = `

      <div class="complete-stats">
        <div class="complete-stat"><div class="stat-value">${flashcardQueue.length}</div><div class="stat-label">Powtórzonych</div></div>

      <button class="btn btn-ghost btn-lg" data-home style="margin-left: 8px;">Wróć do pulpitu</button>

  `;

  root.querySelector('[data-home]').addEventListener('click', () => render('dashboard'));
}

let recallQueue = [];
let recallIndex = 0;
let recallShownAnswer = false;
let recallUserText = '';

views.recall = (root, params = {}) => {
  if (params.reset || recallQueue.length === 0) {
    recallQueue = shuffle(DATA.questions.slice());
    recallIndex = 0;
    recallShownAnswer = false;
    recallUserText = '';
  }

  if (recallIndex >= recallQueue.length) {
    root.innerHTML = `
      <div class="complete">
        <div class="complete-icon">✦</div>
        <h1 class="complete-title">Recall test zakończony</h1>
        <p class="complete-desc">Przeszłaś przez wszystkie pytania. To najsilniejsza forma testing effect - mózg gimnastykował się solidnie.</p>
        <button class="btn btn-primary btn-lg" data-restart>Zacznij od nowa</button>
        <button class="btn btn-ghost btn-lg" data-home style="margin-left: 8px;">Wróć do pulpitu</button>
      </div>
    `;
    root.querySelector('[data-restart]').addEventListener('click', () => render('recall', { reset: true }));
    root.querySelector('[data-home]').addEventListener('click', () => render('dashboard'));
    return;
  }

  const q = recallQueue[recallIndex];
  const progress = (recallIndex / recallQueue.length) * 100;

  root.innerHTML = `
    <div class="view-header">
      <div class="view-eyebrow">Etap 2 · Najsilniejszy testing effect</div>
      <h1 class="view-title">Recall test</h1>
      <p class="view-subtitle">Widzisz tylko tytuł pytania. Sama wpisz w polu poniżej wszystko co wiesz - z głowy, bez zaglądania. Potem porównaj z modelową odpowiedzią. To najefektywniejsza forma nauki (Roediger & Karpicke 2006).</p>
    </div>

    <div class="controls-bar">
      <div class="controls-info">Pytanie ${recallIndex + 1} / ${recallQueue.length}</div>
      <button class="btn btn-ghost btn-sm" data-skip>Pomiń →</button>
    </div>

    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>

    <div class="recall-prompt">
      <div class="q-card-num">PYTANIE ${q.id}${q.isNew ? ' <span class="new-badge">NOWE</span>' : ''}</div>
      <h2 class="q-card-title" style="font-size: 24px; margin-bottom: 18px;">${escapeHtml(q.title)}</h2>
      <p style="color: var(--text-dim); font-size: 14px; margin-bottom: 16px;">Napisz wszystko, co pamiętasz na ten temat. Definicja, kluczowe elementy, przykład. Nie martw się formą - chodzi o wymuszenie przypomnienia. Możesz <strong>mówić zamiast pisać</strong> - kliknij mikrofon poniżej.</p>
      <textarea class="recall-textarea" id="recall-input" placeholder="Pisz tu z pamięci albo kliknij mikrofon żeby mówić..." ${recallShownAnswer ? 'readonly' : ''}>${escapeHtml(recallUserText)}</textarea>
      <div class="controls-actions" style="margin-top: 10px;">
        <button class="btn btn-primary" id="reveal-btn" ${recallShownAnswer ? 'disabled' : ''}>Pokaż modelową odpowiedź</button>
        ${!recallShownAnswer ? `<button class="mic-btn" id="mic-btn" title="Mów odpowiedź zamiast pisać"><span class="mic-dot"></span>Mów</button>` : ''}
        ${recallShownAnswer ? '<button class="btn btn-secondary" data-next>Następne pytanie →</button>' : ''}
      </div>
    </div>

    ${recallShownAnswer ? `
    <div class="recall-comparison">
      <div class="recall-col recall-your">
        <div class="recall-col-label">Twoja odpowiedź</div>
        <div style="white-space: pre-wrap; line-height: 1.6; font-size: 14px;">${escapeHtml(recallUserText) || '<em style="color: var(--text-faint);">(puste)</em>'}</div>
      </div>
      <div class="recall-col recall-model">
        <div class="recall-col-label">Modelowa odpowiedź</div>
        <div style="margin-bottom: 12px; font-size: 14px; font-style: italic; color: var(--text-dim);">${escapeHtml(q.definition)}</div>
        ${q.answer.map(p => `<p class="q-paragraph" style="font-size: 13px;">${renderFollowUpAnswer(p)}</p>`).join('')}
        <div class="q-short" style="margin-top: 14px; font-size: 13px; padding: 12px 14px;">${escapeHtml(q.short || '')}</div>
      </div>
    </div>

    <div class="recall-prompt" style="margin-top: 20px;">
      <div style="font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-faint); margin-bottom: 14px; font-weight: 600;">Jak Ci poszło? (Wpływa na harmonogram powtórek SM-2)</div>
      <div class="confidence-row">
        ${[0, 1, 2, 3, 4, 5].map(n => {
          const labels = ['Czarna dziura', 'Źle', 'Trudno', 'OK', 'Dobrze', 'Perfekcja'];
          return `<button class="conf-btn conf-${n}" data-conf="${n}"><div class="conf-btn-num">${n}</div><div class="conf-btn-label">${labels[n]}</div></button>`;
        }).join('')}
      </div>
    </div>
    ` : ''}
  `;

  const input = root.querySelector('#recall-input');
  if (input) {
    input.addEventListener('input', (e) => { recallUserText = e.target.value; });
    if (!recallShownAnswer) setTimeout(() => input.focus(), 50);
  }

  // Speech-to-text
  const micBtn = root.querySelector('#mic-btn');
  if (micBtn) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      micBtn.disabled = true;
      micBtn.title = 'Twoja przeglądarka nie obsługuje mowy na tekst. Spróbuj Chrome.';
      micBtn.style.opacity = 0.5;
    } else {
      const recog = new SpeechRecognition();
      recog.lang = 'pl-PL';
      recog.continuous = true;
      recog.interimResults = true;
      let baseText = recallUserText;
      let isRecording = false;

      micBtn.addEventListener('click', () => {
        if (isRecording) {
          recog.stop();
        } else {
          baseText = recallUserText;
          try {
            recog.start();
            isRecording = true;
            micBtn.classList.add('recording');
            micBtn.querySelector('.mic-dot').style.background = 'currentColor';
            micBtn.lastChild.textContent = ' Słucham...';
          } catch (e) {
            console.warn(e);
          }
        }
      });

      recog.onresult = (event) => {
        let interim = '';
        let final = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const transcript = event.results[i][0].transcript;
          if (event.results[i].isFinal) final += transcript;
          else interim += transcript;
        }
        const combined = (baseText + ' ' + final + ' ' + interim).trim();
        if (input) input.value = combined;
        recallUserText = combined;
        if (final) baseText = (baseText + ' ' + final).trim();
      };

      recog.onend = () => {
        isRecording = false;
        if (micBtn) {
          micBtn.classList.remove('recording');
          // Re-render to update state
          const lastNode = micBtn.lastChild;
          if (lastNode && lastNode.nodeType === 3) lastNode.textContent = 'Mów';
        }
      };

      recog.onerror = (e) => {
        console.warn('Speech recognition error:', e.error);
        isRecording = false;
        if (micBtn) {
          micBtn.classList.remove('recording');
          if (e.error === 'not-allowed') {
            alert('Brak zgody na mikrofon. Daj pozwolenie w przeglądarce.');
          }
        }
      };
    }
  }

  root.querySelector('#reveal-btn').addEventListener('click', () => {
    recallShownAnswer = true;
    state.stats.totalRecall++;
    saveState();
    render('recall');
  });

function buildQuizQueue(source) {
  const items = [];
  if (source === 'all' || source === 'followup') {
    for (const q of DATA.questions) {
      if (q.follow_up) {
        for (const f of q.follow_up) {
          // f może być stringiem (stare dane) lub obiektem {q, a}
          const text = typeof f === 'string' ? f : f.q;
          const answer = typeof f === 'object' ? f.a : null;
          items.push({
            text,
            answer,
            source: 'followup',
            qId: q.id,
            context: `Pytanie ${q.id}: ${q.title}`,
            context_full: q.short || q.definition
          });
        }
      }
    }
  }
  if (source === 'all' || source === 'kontrolne') {
    const parts = [
      { items: DATA.control_questions.ogolne, label: 'Pytania kontrolne · Kształcenie ogólne' },
      { items: DATA.control_questions.kierunkowe, label: 'Pytania kontrolne · Kierunkowe' },
      { items: DATA.control_questions.przekrojowe, label: 'Pytania przekrojowe' },
    ];
    for (const p of parts) {
      for (const item of p.items) {
        // item może być stringiem (stare dane) lub obiektem {q, a}
        const text = typeof item === 'string' ? item : item.q;
        const answer = typeof item === 'object' ? item.a : null;
        items.push({
          text,
          answer,
          source: 'kontrolne',
          qId: null,
          context: p.label,
          context_full: 'Pytanie kontrolne'
        });
      }
    }
  }
  return shuffle(items);
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function startDefenseTimer() {
  defenseTimer = setInterval(() => {
    const elapsed = Math.floor((Date.now() - defenseStartTime) / 1000);
    const remaining = defenseDuration - elapsed;
    const timerEl = document.getElementById('def-timer');
    if (!timerEl) { clearInterval(defenseTimer); defenseTimer = null; return; }
    if (remaining <= 0) {
      timerEl.textContent = '00:00';
      timerEl.classList.add('danger');
      clearInterval(defenseTimer); defenseTimer = null;
      defenseRevealed = true;
      state.stats.totalDefense++;
      saveState();
      setTimeout(() => render('defense'), 300);
    } else {
      timerEl.textContent = formatTime(remaining);
      timerEl.classList.toggle('warning', remaining <= 20 && remaining > 10);
      timerEl.classList.toggle('danger', remaining <= 10);
    }
  }, 250);
}

// Render structured blocks (paragraphs, bullets, callouts, subheadings)
function renderBlocks(blocks) {
  if (!blocks || !Array.isArray(blocks)) return '';
  const result = [];
  let bulletGroup = [];

  const flushBullets = () => {
    if (bulletGroup.length > 0) {
      result.push(`<ul class="block-bullets">${bulletGroup.map(b => `<li class="block-bullet"><div>${b.text}</div></li>`).join('')}</ul>`);
      bulletGroup = [];
    }
  };

  for (const b of blocks) {
    if (b.type === 'bullet') {
      bulletGroup.push(b);
      continue;
    }
    flushBullets();
    if (b.type === 'para') {
      result.push(`<p class="block-para">${b.text}</p>`);
    } else if (b.type === 'subheading') {
      result.push(`<div class="block-subheading">${escapeHtml(b.text)}</div>`);
    } else if (b.type === 'callout') {
      result.push(`<div class="block-callout">${b.label ? `<div class="block-callout-label">${escapeHtml(b.label)}</div>` : ''}<div class="block-callout-text">${b.text}</div></div>`);
    }
  }
  flushBullets();
  return `<div class="blocks">${result.join('')}</div>`;
}

views.glossary = (root) => {
  let searchQ = '';

  function buildList() {
    const filtered = DATA.glossary.filter(g => {
      if (!searchQ) return true;
      const s = searchQ.toLowerCase();
      return g.term.toLowerCase().includes(s) || g.definition.toLowerCase().includes(s);
    });
    return filtered.map(g => `
      <div class="glossary-item">
        <div class="glossary-term">${escapeHtml(g.term)}</div>
        <div class="glossary-def">${escapeHtml(g.definition)}</div>
      </div>
    `).join('');
  }

  function refresh() {
    const grid = root.querySelector('#gloss-grid');
    if (grid) grid.innerHTML = buildList() || '<div class="empty"><div class="empty-icon">⌀</div>Nic nie znaleziono</div>';
  }

  root.innerHTML = `
    <div class="view-header">
      <div class="view-eyebrow">Słowniczek skrótów</div>
      <h1 class="view-title">Słowniczek kluczowych pojęć</h1>
      <p class="view-subtitle">${DATA.glossary.length} pojęć, które warto mieć w głowie - często padają w pytaniach pomocniczych komisji. BATNA, BEP, BPMN, BSC, CSR/ESG, RACI, SIPOC, SMART, SWOT, TQM, USP i inne.</p>
    </div>

    <div class="search-row">
      <input type="text" id="gloss-search" placeholder="Szukaj pojęcia lub w definicjach...">
    </div>

    <div class="glossary-grid" id="gloss-grid">
      ${buildList()}
    </div>
  `;

  root.querySelector('#gloss-search').addEventListener('input', (e) => { searchQ = e.target.value; refresh(); });
};

function startMockTimer() {
  const update = () => {
    const elapsed = Math.floor((Date.now() - mockQStartTime) / 1000);
    const remaining = MOCK_Q_SECONDS - elapsed;
    const timerEl = document.getElementById('mock-timer');
    if (!timerEl) { clearInterval(mockTimer); mockTimer = null; return; }
    if (remaining <= 0) {
      timerEl.textContent = '00:00';
      timerEl.classList.add('danger');
      // Auto-mark as 0 if time's up
      if (state.mockExam && state.mockExam.current < state.mockExam.questions.length) {
        const qId = state.mockExam.questions[state.mockExam.current];
        state.mockExam.results.push({ qId, score: 0, timeUsed: MOCK_Q_SECONDS });
        state.mockExam.current++;
        state.mockExam.qStartTime = Date.now();
        saveState();
        clearInterval(mockTimer); mockTimer = null;
        render('mock');
      }
    } else {
      timerEl.textContent = formatTime(remaining);
      timerEl.classList.toggle('warning', remaining <= 60 && remaining > 30);
      timerEl.classList.toggle('danger', remaining <= 30);
    }
  };
  update();
  mockTimer = setInterval(update, 500);
}

function showOnboarding(force = false) {
  if (state.onboardingDone && !force) return;
  onboardingStep = 0;
  renderOnboarding();
}

function renderOnboarding() {
  const existing = document.querySelector('.modal-backdrop');
  if (existing) existing.remove();

  const step = onboardingSteps[onboardingStep];
  const isLast = onboardingStep === onboardingSteps.length - 1;
  const isFirst = onboardingStep === 0;

  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <div class="modal-eyebrow">${step.eyebrow}</div>
        <div class="modal-steps">
          ${onboardingSteps.map((_, i) => `<div class="modal-step-dot ${i === onboardingStep ? 'active' : i < onboardingStep ? 'done' : ''}"></div>`).join('')}
        </div>
        <div class="modal-title">${step.title}</div>
      </div>
      <div class="modal-body">${step.body}</div>
      <div class="modal-footer">
        ${!isFirst ? '<button class="btn btn-ghost" data-onb-back>← Wstecz</button>' : ''}
        <button class="btn btn-ghost" data-onb-skip>Pomiń wprowadzenie</button>
        ${isLast ?
          '<button class="btn btn-primary" data-onb-finish>Zaczynam! →</button>' :
          '<button class="btn btn-primary" data-onb-next>Dalej →</button>'
        }
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);

  const close = () => {
    state.onboardingDone = true;
    saveState();
    backdrop.remove();
  };

  const backBtn = backdrop.querySelector('[data-onb-back]');
  if (backBtn) backBtn.addEventListener('click', () => { onboardingStep--; renderOnboarding(); });

  const nextBtn = backdrop.querySelector('[data-onb-next]');
  if (nextBtn) nextBtn.addEventListener('click', () => { onboardingStep++; renderOnboarding(); });

  backdrop.querySelector('[data-onb-skip]').addEventListener('click', close);

  const finishBtn = backdrop.querySelector('[data-onb-finish]');
  if (finishBtn) finishBtn.addEventListener('click', () => {
    close();
    render('guide');
  });

  // Close on backdrop click
  backdrop.addEventListener('click', (e) => {
    if (e.target === backdrop) close();
  });
}
