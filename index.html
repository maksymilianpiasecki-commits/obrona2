<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obrona Magisterska - Zarządzanie | Aplikacja do nauki</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  /* Default theme: lime (default Polish defense theme matching LockerRoom) */
  --bg: #0e0e10;
  --bg-soft: #16161a;
  --bg-card: #1c1c21;
  --bg-card-hover: #232329;
  --border: #2a2a31;
  --border-bright: #3a3a44;
  --text: #ededf0;
  --text-dim: #a5a5b0;
  --text-faint: #6c6c78;
  --accent: #d4f63d;
  --accent-dim: #9bb822;
  --accent-glow: rgba(212, 246, 61, 0.15);
  --accent-text: #0e0e10;  /* color of text on accent bg */
  --success: #6ee7a7;
  --warning: #f5c451;
  --danger: #f87171;
  --info: #88d4ff;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 8px 28px rgba(0,0,0,0.45);
  --font-display: 'Fraunces', Georgia, serif;
  --font-body: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --font-size-base: 15px;
}

/* === THEMES === */
html[data-theme="lime"] {
  --accent: #d4f63d;
  --accent-dim: #9bb822;
  --accent-glow: rgba(212, 246, 61, 0.15);
  --accent-text: #0e0e10;
}
html[data-theme="rose"] {
  --accent: #f472b6;
  --accent-dim: #b34a85;
  --accent-glow: rgba(244, 114, 182, 0.18);
  --accent-text: #fff;
}
html[data-theme="sapphire"] {
  --accent: #60a5fa;
  --accent-dim: #3b82f6;
  --accent-glow: rgba(96, 165, 250, 0.2);
  --accent-text: #0e0e10;
}
html[data-theme="amber"] {
  --accent: #fbbf24;
  --accent-dim: #b8860b;
  --accent-glow: rgba(251, 191, 36, 0.2);
  --accent-text: #0e0e10;
}
html[data-theme="mono"] {
  --accent: #ededf0;
  --accent-dim: #a5a5b0;
  --accent-glow: rgba(237, 237, 240, 0.12);
  --accent-text: #0e0e10;
}

/* === LIGHT MODE === */
html[data-mode="light"] {
  --bg: #fafaf9;
  --bg-soft: #f0f0ee;
  --bg-card: #ffffff;
  --bg-card-hover: #f6f6f4;
  --border: #e4e4e0;
  --border-bright: #c8c8c4;
  --text: #1a1a1f;
  --text-dim: #555560;
  --text-faint: #8a8a92;
  --shadow: 0 4px 16px rgba(0,0,0,0.08);
}
html[data-mode="light"][data-theme="lime"] {
  --accent: #8aa810;
  --accent-dim: #6d8408;
  --accent-glow: rgba(138, 168, 16, 0.12);
  --accent-text: #fff;
}
html[data-mode="light"][data-theme="rose"] {
  --accent: #db2777;
  --accent-dim: #a01655;
  --accent-glow: rgba(219, 39, 119, 0.12);
  --accent-text: #fff;
}
html[data-mode="light"][data-theme="sapphire"] {
  --accent: #2563eb;
  --accent-dim: #1e3a8a;
  --accent-glow: rgba(37, 99, 235, 0.12);
  --accent-text: #fff;
}
html[data-mode="light"][data-theme="amber"] {
  --accent: #b45309;
  --accent-dim: #92400e;
  --accent-glow: rgba(180, 83, 9, 0.12);
  --accent-text: #fff;
}
html[data-mode="light"][data-theme="mono"] {
  --accent: #1a1a1f;
  --accent-dim: #404048;
  --accent-glow: rgba(26, 26, 31, 0.08);
  --accent-text: #fafaf9;
}

/* === FONT SIZE === */
html[data-fs="small"] { --font-size-base: 13.5px; }
html[data-fs="normal"] { --font-size-base: 15px; }
html[data-fs="large"] { --font-size-base: 17px; }

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: var(--font-size-base);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

body {
  background:
    radial-gradient(ellipse at top right, var(--accent-glow) 0%, transparent 60%),
    radial-gradient(ellipse at bottom left, rgba(136,212,255,0.03) 0%, transparent 60%),
    var(--bg);
  background-attachment: fixed;
}

button {
  font-family: inherit;
  font-size: inherit;
  border: none;
  cursor: pointer;
  background: none;
  color: inherit;
}

input, textarea {
  font-family: inherit;
  font-size: inherit;
  background: var(--bg-soft);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  outline: none;
  width: 100%;
}

input:focus, textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

::selection { background: var(--accent); color: var(--accent-text); }

/* === LAYOUT === */
.app {
  display: grid;
  grid-template-columns: 280px 1fr;
  min-height: 100vh;
}

@media (max-width: 880px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { position: sticky; top: 0; z-index: 10; border-right: none !important; border-bottom: 1px solid var(--border); }
  .sidebar-content { padding: 16px !important; }
  .nav-section { display: none; }
  .sidebar.mobile-open .nav-section { display: block; }
  .sidebar-toggle { display: flex !important; }
}

.sidebar {
  background: var(--bg-soft);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}

.sidebar-content {
  padding: 24px 20px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
  position: sticky;
  top: 0;
  max-height: 100vh;
  overflow-y: auto;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 24px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.brand-mark {
  width: 36px;
  height: 36px;
  background: var(--accent);
  border-radius: 8px;
  display: grid;
  place-items: center;
  font-family: var(--font-display);
  font-weight: 800;
  color: var(--accent-text);
  font-size: 18px;
}

.brand-text { display: flex; flex-direction: column; line-height: 1.1; }
.brand-text strong { font-family: var(--font-display); font-size: 16px; font-weight: 700; }
.brand-text span { font-size: 11px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }

.sidebar-toggle {
  display: none;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 10px;
  margin-left: auto;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-dim);
}

.nav-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-faint);
  margin: 16px 0 6px 8px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 10px 12px;
  border-radius: 8px;
  font-size: 14px;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s ease;
  text-align: left;
  width: 100%;
}

.nav-item:hover { background: var(--bg-card); color: var(--text); }
.nav-item.active { background: var(--accent); color: var(--accent-text); font-weight: 600; }
.nav-item.active .nav-icon { opacity: 1; }
.nav-icon { width: 18px; height: 18px; opacity: 0.7; flex-shrink: 0; }
.nav-item .nav-badge {
  margin-left: auto;
  background: var(--bg-soft);
  color: var(--text-faint);
  font-size: 11px;
  padding: 2px 7px;
  border-radius: 10px;
  font-variant-numeric: tabular-nums;
}
.nav-item.active .nav-badge { background: rgba(0,0,0,0.15); color: var(--accent-text); }

.sidebar-footer {
  margin-top: auto;
  padding-top: 16px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-faint);
  line-height: 1.6;
}

/* === MAIN === */
.main {
  padding: 32px 40px 80px;
  max-width: 980px;
  width: 100%;
}

@media (max-width: 640px) {
  .main { padding: 24px 20px 60px; }
}

.view-header {
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.view-eyebrow {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 8px;
}

.view-title {
  font-family: var(--font-display);
  font-size: 36px;
  font-weight: 600;
  line-height: 1.1;
  letter-spacing: -0.02em;
  margin-bottom: 8px;
}

.view-subtitle {
  color: var(--text-dim);
  font-size: 15px;
  max-width: 70ch;
}

/* === DASHBOARD === */
.hero {
  background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-soft) 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 36px;
  margin-bottom: 32px;
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -10%;
  width: 60%;
  height: 200%;
  background: radial-gradient(ellipse, var(--accent-glow) 0%, transparent 60%);
  pointer-events: none;
}

.hero-eyebrow {
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 12px;
}

.hero-title {
  font-family: var(--font-display);
  font-size: clamp(28px, 4vw, 44px);
  line-height: 1.05;
  font-weight: 600;
  letter-spacing: -0.025em;
  margin-bottom: 14px;
  max-width: 24ch;
}

.hero-desc {
  color: var(--text-dim);
  max-width: 56ch;
  margin-bottom: 28px;
  position: relative;
  z-index: 1;
}

.hero-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px;
  position: relative;
  z-index: 1;
}

@media (max-width: 720px) { .hero-stats { grid-template-columns: repeat(2, 1fr); } }

.stat {
  padding: 18px 0;
  border-top: 1px solid var(--border-bright);
}

.stat-value {
  font-family: var(--font-display);
  font-size: 30px;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 6px;
  font-variant-numeric: tabular-nums;
}

.stat-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-faint);
}

.mode-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
  margin-bottom: 36px;
}

.mode-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px;
  cursor: pointer;
  transition: all 0.18s ease;
  display: flex;
  flex-direction: column;
  text-align: left;
  position: relative;
  overflow: hidden;
}

.mode-card:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-bright);
  transform: translateY(-2px);
}

.mode-card::after {
  content: '→';
  position: absolute;
  top: 22px;
  right: 22px;
  color: var(--text-faint);
  font-size: 18px;
  transition: all 0.2s ease;
}
.mode-card:hover::after { color: var(--accent); transform: translateX(4px); }

.mode-card-num {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--accent);
  font-weight: 500;
  margin-bottom: 14px;
}

.mode-card-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 600;
  line-height: 1.15;
  letter-spacing: -0.01em;
  margin-bottom: 8px;
}

.mode-card-desc {
  color: var(--text-dim);
  font-size: 13px;
  line-height: 1.5;
  margin-bottom: 14px;
  flex: 1;
}

.mode-card-meta {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-faint);
  letter-spacing: 0.04em;
}

/* === BUTTONS === */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 11px 18px;
  border-radius: 8px;
  font-weight: 500;
  font-size: 14px;
  transition: all 0.15s ease;
  border: 1px solid transparent;
}

.btn-primary { background: var(--accent); color: var(--accent-text); font-weight: 600; }
.btn-primary:hover { background: #c4e62d; }
.btn-secondary { background: var(--bg-card); color: var(--text); border-color: var(--border); }
.btn-secondary:hover { background: var(--bg-card-hover); border-color: var(--border-bright); }
.btn-ghost { color: var(--text-dim); }
.btn-ghost:hover { color: var(--text); }
.btn-sm { padding: 7px 12px; font-size: 13px; }
.btn-lg { padding: 14px 24px; font-size: 15px; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* === PROGRESS BAR === */
.progress-bar {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 24px;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  transition: width 0.4s ease;
}

/* === QUESTION CARD === */
.q-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
  margin-bottom: 24px;
}

.q-card-num {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--accent);
  margin-bottom: 8px;
  letter-spacing: 0.04em;
}

.new-badge {
  display: inline-block;
  background: #f87171;
  color: #fff;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 2px 8px;
  border-radius: 10px;
  margin-left: 8px;
  vertical-align: middle;
  text-transform: uppercase;
  animation: newPulse 2.5s ease-in-out infinite;
  box-shadow: 0 0 12px rgba(248, 113, 113, 0.4);
}
.new-badge-sm {
  font-size: 9px;
  padding: 1px 6px;
  margin-left: 6px;
  letter-spacing: 0.08em;
}
@keyframes newPulse {
  0%, 100% { box-shadow: 0 0 12px rgba(248, 113, 113, 0.4); }
  50% { box-shadow: 0 0 18px rgba(248, 113, 113, 0.7); }
}

.q-card-title {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 600;
  line-height: 1.2;
  margin-bottom: 22px;
  letter-spacing: -0.015em;
}

.q-section {
  margin-bottom: 24px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}
.q-section:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }

.q-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-faint);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.q-label::before {
  content: '';
  width: 3px;
  height: 12px;
  background: var(--accent);
  border-radius: 2px;
}

.q-definition {
  font-size: 16px;
  line-height: 1.6;
  color: var(--text);
  font-style: italic;
  border-left: 2px solid var(--accent);
  padding-left: 16px;
  margin-left: 4px;
}

.q-paragraph {
  margin-bottom: 14px;
  color: var(--text);
  line-height: 1.7;
}
.q-paragraph:last-child { margin-bottom: 0; }

.q-example {
  background: rgba(136, 212, 255, 0.06);
  border-left: 3px solid var(--info);
  padding: 14px 18px;
  border-radius: 4px;
  font-size: 14px;
  color: var(--text);
}

.q-short {
  background: var(--accent);
  color: var(--accent-text);
  padding: 16px 20px;
  border-radius: var(--radius-sm);
  font-weight: 500;
  line-height: 1.6;
}

.q-followup {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.q-followup li {
  padding: 10px 14px;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 14px;
}
.q-followup li::before { content: '?'; color: var(--accent); font-weight: 700; margin-right: 8px; }

/* === LIST VIEW === */
.q-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.q-list-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.15s ease;
  text-align: left;
  width: 100%;
}
.q-list-item:hover { background: var(--bg-card-hover); border-color: var(--border-bright); }
.q-list-item-num {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--accent);
  width: 28px;
  flex-shrink: 0;
}
.q-list-item-title { flex: 1; }
.q-list-item-status {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 10px;
}
.status-new { background: var(--bg-soft); color: var(--text-faint); }
.status-learning { background: rgba(245, 196, 81, 0.12); color: var(--warning); }
.status-known { background: rgba(110, 231, 167, 0.12); color: var(--success); }
.status-mastered { background: var(--accent-glow); color: var(--accent); }

.section-divider {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--text-faint);
  margin: 24px 0 12px;
  padding-top: 12px;
}
.section-divider:first-child { margin-top: 0; padding-top: 0; }

/* === FLASHCARD === */
.flashcard-container {
  perspective: 1500px;
  margin: 32px 0;
  position: relative;
}

.flashcard {
  position: relative;
  width: 100%;
  transform-style: preserve-3d;
  transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
}
.flashcard.flipped { transform: rotateY(180deg); }

/* Use grid to overlay both faces; container height matches the LARGER face */
.flashcard {
  display: grid;
  grid-template-areas: "stack";
}
.flashcard-face {
  grid-area: stack;
  backface-visibility: hidden;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 36px;
  display: flex;
  flex-direction: column;
  min-height: 380px;
}
.flashcard-back { transform: rotateY(180deg); }

.flashcard-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-faint);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.flashcard-title {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 600;
  line-height: 1.25;
  letter-spacing: -0.015em;
  flex: 1;
  display: flex;
  align-items: center;
}

.flashcard-hint {
  text-align: center;
  font-size: 13px;
  color: var(--text-faint);
  margin-top: 24px;
  padding-top: 18px;
  border-top: 1px dashed var(--border);
}

.confidence-row {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 8px;
  margin-top: 20px;
}

@media (max-width: 540px) {
  .confidence-row { grid-template-columns: repeat(3, 1fr); }
}

.conf-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px 6px;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s ease;
  text-align: center;
}
.conf-btn:hover { transform: translateY(-2px); border-color: var(--border-bright); }
.conf-btn-num { font-family: var(--font-display); font-size: 22px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
.conf-btn-label { font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.06em; }
.conf-0 { color: var(--danger); border-color: rgba(248,113,113,0.3); }
.conf-1 { color: var(--danger); border-color: rgba(248,113,113,0.2); }
.conf-2 { color: var(--warning); border-color: rgba(245,196,81,0.2); }
.conf-3 { color: var(--warning); border-color: rgba(245,196,81,0.25); }
.conf-4 { color: var(--success); border-color: rgba(110,231,167,0.25); }
.conf-5 { color: var(--accent); border-color: var(--accent); }
.conf-0:hover { background: rgba(248,113,113,0.08); }
.conf-1:hover { background: rgba(248,113,113,0.06); }
.conf-2:hover { background: rgba(245,196,81,0.06); }
.conf-3:hover { background: rgba(245,196,81,0.08); }
.conf-4:hover { background: rgba(110,231,167,0.08); }
.conf-5:hover { background: var(--accent-glow); }

/* === RECALL TEST === */
.recall-prompt {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  margin-bottom: 20px;
}

.recall-textarea {
  width: 100%;
  min-height: 220px;
  resize: vertical;
  line-height: 1.6;
  margin-bottom: 14px;
}

.recall-comparison {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-top: 24px;
}

@media (max-width: 760px) {
  .recall-comparison { grid-template-columns: 1fr; }
}

.recall-col {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px;
}

.recall-col-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-faint);
  margin-bottom: 14px;
  font-weight: 600;
}

.recall-your { border-color: rgba(136,212,255,0.2); }
.recall-your .recall-col-label { color: var(--info); }

.recall-model { border-color: var(--accent); border-width: 1px; }
.recall-model .recall-col-label { color: var(--accent); }

/* === BOX (mode obronny) === */
.defense-stage {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 40px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.defense-timer {
  font-family: var(--font-mono);
  font-size: 64px;
  font-weight: 600;
  line-height: 1;
  margin: 18px 0;
  font-variant-numeric: tabular-nums;
  color: var(--accent);
  transition: color 0.3s ease;
}
.defense-timer.warning { color: var(--warning); }
.defense-timer.danger { color: var(--danger); }

.defense-question {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 600;
  line-height: 1.3;
  margin: 24px 0;
  max-width: 24ch;
  margin-left: auto;
  margin-right: auto;
  letter-spacing: -0.015em;
}

.defense-meta {
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-faint);
}

/* === QUIZ === */
.quiz-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
  margin-bottom: 20px;
}

.quiz-question {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 600;
  line-height: 1.3;
  margin-bottom: 12px;
}
.quiz-context {
  font-size: 12px;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 24px;
}

.quiz-reveal {
  margin-top: 16px;
  padding: 18px 20px;
  background: var(--accent-glow);
  border-left: 3px solid var(--accent);
  border-radius: 4px;
  line-height: 1.6;
}

/* === QUIZ ANSWER ACCORDION === */
.quiz-answer-details[open] {
  /* When open, no extra spacing needed */
}
.quiz-answer-summary {
  cursor: pointer;
  padding: 14px 18px;
  background: var(--accent-glow);
  border: 1px solid var(--accent);
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  color: var(--accent);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  list-style: none;
  user-select: none;
  transition: all 0.15s ease;
}
.quiz-answer-summary::-webkit-details-marker { display: none; }
.quiz-answer-summary:hover {
  filter: brightness(1.1);
}
.quiz-answer-summary-text { flex: 1; }
.quiz-answer-arrow {
  font-family: var(--font-mono);
  font-size: 20px;
  font-weight: 400;
  transition: transform 0.2s ease;
}
.quiz-answer-details[open] .quiz-answer-arrow {
  transform: rotate(90deg);
}
.quiz-answer-details[open] .quiz-answer-summary {
  border-bottom-left-radius: 0;
  border-bottom-right-radius: 0;
}
.quiz-answer-details .quiz-reveal {
  margin-top: 0;
  border-top: 1px dashed var(--border);
  border-top-left-radius: 0;
  border-top-right-radius: 0;
  border-bottom-left-radius: 10px;
  border-bottom-right-radius: 10px;
}
.quiz-answer-details .quiz-reveal strong {
  color: var(--accent);
  font-weight: 600;
}

/* === ERRATA / GLOSSARY === */
.entry {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 22px;
  margin-bottom: 14px;
}

.entry-id {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--accent);
  margin-bottom: 6px;
}

.entry-title {
  font-family: var(--font-display);
  font-size: 19px;
  font-weight: 600;
  margin-bottom: 10px;
  letter-spacing: -0.01em;
}

.entry-content { color: var(--text-dim); line-height: 1.6; font-size: 14px; }

.glossary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 10px;
}

.glossary-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
}

.glossary-term {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 4px;
}

.glossary-def {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.5;
}

/* === BIBLIOGRAPHY === */
.bib-category {
  margin-bottom: 26px;
}
.bib-category-title {
  font-family: var(--font-display);
  font-size: 19px;
  font-weight: 600;
  margin-bottom: 10px;
  color: var(--accent);
  letter-spacing: -0.01em;
}
.bib-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.bib-list li {
  padding: 8px 12px;
  background: var(--bg-card);
  border-radius: 4px;
  font-size: 13px;
  line-height: 1.5;
  color: var(--text-dim);
  border-left: 2px solid var(--border-bright);
}

/* === COMPLETE SCREEN === */
.complete {
  text-align: center;
  padding: 60px 20px;
}
.complete-icon {
  font-family: var(--font-display);
  font-size: 80px;
  margin-bottom: 20px;
  color: var(--accent);
}
.complete-title {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 600;
  margin-bottom: 10px;
}
.complete-desc { color: var(--text-dim); margin-bottom: 30px; max-width: 50ch; margin-left: auto; margin-right: auto; }
.complete-stats {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}
.complete-stat .stat-value { font-size: 36px; }

/* === CONTROLS === */
.controls-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.controls-info {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-faint);
  letter-spacing: 0.04em;
}
.controls-actions { display: flex; gap: 10px; flex-wrap: wrap; }

.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-faint);
}
.empty-icon { font-size: 48px; margin-bottom: 14px; font-family: var(--font-display); color: var(--accent); }
.empty-title { font-family: var(--font-display); font-size: 20px; color: var(--text); margin-bottom: 8px; }

.filter-chips {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.chip {
  padding: 6px 12px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 12px;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s ease;
}
.chip:hover { border-color: var(--border-bright); color: var(--text); }
.chip.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); font-weight: 600; }

.fade-in { animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

.tactics-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 16px;
}
.tactics-title {
  font-family: var(--font-display);
  font-size: 19px;
  font-weight: 600;
  margin-bottom: 12px;
  color: var(--accent);
  letter-spacing: -0.01em;
}
.tactics-content {
  color: var(--text-dim);
  line-height: 1.7;
  font-size: 14px;
}

/* === STRUCTURED BLOCKS (errata, deepenings, tactics) === */
.blocks { display: flex; flex-direction: column; gap: 12px; }

.block-para {
  color: var(--text);
  line-height: 1.65;
  font-size: 14px;
}

.block-subheading {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-top: 14px;
  margin-bottom: 2px;
  letter-spacing: -0.005em;
  padding-left: 12px;
  border-left: 2px solid var(--accent);
}

.block-bullets {
  display: flex;
  flex-direction: column;
  gap: 6px;
  list-style: none;
  padding-left: 0;
  margin: 4px 0;
}
.block-bullet {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  padding: 4px 0;
}
.block-bullet::before {
  content: '';
  display: block;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
  margin-top: 9px;
}

.block-callout {
  background: linear-gradient(135deg, var(--accent-glow), transparent);
  border-left: 3px solid var(--accent);
  border-radius: 6px;
  padding: 14px 18px;
  margin: 4px 0;
}
.block-callout-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 6px;
}
.block-callout-text {
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
}

/* Entries with blocks need different layout than the old entry-content */
.entry.has-blocks {
  padding: 24px 26px;
}
.entry.has-blocks .entry-title {
  margin-bottom: 14px;
}

.search-row {
  display: flex;
  gap: 10px;
  margin-bottom: 18px;
}
.search-row input { flex: 1; }

/* === SETTINGS MODAL === */
.settings-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
  gap: 14px;
  flex-wrap: wrap;
}
.settings-row:last-child { border-bottom: none; }
.settings-row-label {
  font-size: 14px;
  color: var(--text);
  font-weight: 500;
}
.settings-row-desc {
  font-size: 12px;
  color: var(--text-faint);
  margin-top: 3px;
}

.theme-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  margin-top: 8px;
}
@media (max-width: 540px) { .theme-grid { grid-template-columns: repeat(3, 1fr); } }

.theme-swatch {
  cursor: pointer;
  border-radius: 10px;
  padding: 14px 6px 10px;
  border: 2px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  background: var(--bg-soft);
  transition: all 0.15s ease;
}
.theme-swatch:hover { border-color: var(--border-bright); }
.theme-swatch.active { border-color: var(--accent); }
.theme-swatch-color {
  width: 32px;
  height: 32px;
  border-radius: 50%;
}
.theme-swatch[data-theme="lime"] .theme-swatch-color { background: #d4f63d; }
.theme-swatch[data-theme="rose"] .theme-swatch-color { background: #f472b6; }
.theme-swatch[data-theme="sapphire"] .theme-swatch-color { background: #60a5fa; }
.theme-swatch[data-theme="amber"] .theme-swatch-color { background: #fbbf24; }
.theme-swatch[data-theme="mono"] .theme-swatch-color { background: linear-gradient(135deg, #ededf0 50%, #1a1a1f 50%); }
.theme-swatch-name {
  font-size: 11px;
  color: var(--text-dim);
  font-weight: 500;
}
.theme-swatch.active .theme-swatch-name { color: var(--accent); font-weight: 600; }

.size-buttons, .mode-buttons {
  display: flex;
  gap: 6px;
}
.size-buttons button, .mode-buttons button {
  padding: 7px 14px;
  border-radius: 6px;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s ease;
  font-size: 13px;
}
.size-buttons button:hover, .mode-buttons button:hover { color: var(--text); }
.size-buttons button.active, .mode-buttons button.active {
  background: var(--accent);
  color: var(--accent-text);
  border-color: var(--accent);
  font-weight: 600;
}

/* === POMODORO WIDGET === */
.pomodoro-widget {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--bg-card);
  border: 2px solid var(--accent);
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  min-width: 200px;
  box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px var(--accent-glow);
  z-index: 1500;
  animation: fadeIn 0.3s ease;
}
.pomodoro-widget.minimized { padding: 8px 12px; min-width: auto; }

.pomodoro-state {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-faint);
  font-weight: 600;
}
.pomodoro-state.working { color: var(--accent); }
.pomodoro-state.breaking { color: var(--success); }

.pomodoro-time {
  font-family: var(--font-mono);
  font-size: 28px;
  font-weight: 600;
  line-height: 1;
  font-variant-numeric: tabular-nums;
  color: var(--text);
}

.pomodoro-actions {
  display: flex;
  gap: 6px;
  margin-top: 4px;
}
.pomodoro-actions button {
  padding: 5px 10px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: var(--bg-soft);
  color: var(--text-dim);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s ease;
}
.pomodoro-actions button:hover { color: var(--text); border-color: var(--border-bright); }
.pomodoro-actions button.primary { background: var(--accent); color: var(--accent-text); border-color: var(--accent); font-weight: 600; }

.pomodoro-counter {
  display: flex;
  gap: 3px;
  align-items: center;
  font-size: 10px;
  color: var(--text-faint);
}
.pomodoro-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--border);
}
.pomodoro-dot.done { background: var(--accent); }

/* === SEARCH MODAL === */
.search-modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(6px);
  z-index: 2000;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 80px 20px 20px;
  animation: fadeIn 0.2s ease;
}

.search-box {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  max-width: 640px;
  width: 100%;
  max-height: 70vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
}

.search-input-wrap {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}
.search-input-wrap input {
  border: none;
  background: none;
  font-size: 16px;
  padding: 0;
}
.search-input-wrap input:focus { box-shadow: none; }
.search-icon { color: var(--text-faint); font-size: 18px; }
.search-kbd { color: var(--text-faint); font-size: 11px; }

.search-results {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

.search-result {
  padding: 10px 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: background 0.1s ease;
}
.search-result:hover, .search-result.active { background: var(--bg-soft); }
.search-result-icon {
  width: 28px;
  height: 28px;
  background: var(--bg-soft);
  border-radius: 6px;
  display: grid;
  place-items: center;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--accent);
  flex-shrink: 0;
}
.search-result-content { flex: 1; min-width: 0; }
.search-result-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.search-result-subtitle {
  font-size: 12px;
  color: var(--text-faint);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.search-result-type {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-faint);
  background: var(--bg-soft);
  padding: 2px 8px;
  border-radius: 10px;
}

.search-empty {
  text-align: center;
  padding: 30px 20px;
  color: var(--text-faint);
  font-size: 14px;
}

/* === HEATMAP === */
.heatmap-grid {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 8px;
  margin-top: 16px;
}
@media (max-width: 720px) { .heatmap-grid { grid-template-columns: repeat(8, 1fr); } }
@media (max-width: 480px) { .heatmap-grid { grid-template-columns: repeat(5, 1fr); } }

.heatmap-cell {
  aspect-ratio: 1;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg-soft);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  cursor: pointer;
  position: relative;
  transition: all 0.15s ease;
  padding: 4px;
  text-align: center;
}
.heatmap-cell:hover { transform: scale(1.08); border-color: var(--border-bright); z-index: 5; }

.heatmap-cell-num {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  line-height: 1;
}

.heatmap-status-new { background: var(--bg-soft); color: var(--text-faint); }
.heatmap-status-learning { background: rgba(245, 196, 81, 0.18); color: var(--warning); border-color: rgba(245, 196, 81, 0.3); }
.heatmap-status-known { background: rgba(110, 231, 167, 0.15); color: var(--success); border-color: rgba(110, 231, 167, 0.3); }
.heatmap-status-mastered { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }

.heatmap-tag {
  position: absolute;
  top: 2px;
  right: 2px;
  font-size: 9px;
  line-height: 1;
}

.heatmap-legend {
  display: flex;
  gap: 14px;
  margin-top: 18px;
  flex-wrap: wrap;
}
.heatmap-legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-dim);
}
.heatmap-legend-swatch {
  width: 12px;
  height: 12px;
  border-radius: 3px;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 20px;
}
.stat-card-num {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 4px;
  font-variant-numeric: tabular-nums;
}
.stat-card-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-faint);
  font-weight: 600;
}
.stat-card-sub {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 8px;
}

/* Mini bar chart for last 14 days */
.activity-bars {
  display: flex;
  align-items: flex-end;
  gap: 4px;
  height: 60px;
  margin-top: 12px;
}
.activity-bar {
  flex: 1;
  background: var(--border);
  border-radius: 3px 3px 0 0;
  min-height: 2px;
  position: relative;
  transition: background 0.15s ease;
}
.activity-bar.has-activity { background: var(--accent); }
.activity-bar:hover {
  background: var(--accent-dim);
}

.mock-timer {

.mock-timer.danger { color: var(--danger); }

.mock-question {

}

.mock-feedback-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-top: 18px;
}
@media (max-width: 540px) { .mock-feedback-grid { grid-template-columns: 1fr; } }

.mock-feedback-btn {
  padding: 14px;

  text-align: center;
  cursor: pointer;
  transition: all 0.15s ease;
}
.mock-feedback-btn:hover { transform: translateY(-2px); }
.mock-feedback-btn-num {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 4px;
}
.mock-feedback-btn-label {
  font-size: 11px;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.mock-fb-fail .mock-feedback-btn-num { color: var(--danger); }
.mock-fb-ok .mock-feedback-btn-num { color: var(--warning); }
.mock-fb-good .mock-feedback-btn-num { color: var(--success); }

.mock-results-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 18px;
}
.mock-result-row {
  display: grid;
  grid-template-columns: 30px 1fr 80px;
  gap: 12px;
  align-items: center;
  padding: 12px 16px;
  background: var(--bg-soft);
  border-radius: 8px;
  font-size: 13px;
}
.mock-result-num {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-faint);
}
.mock-result-score {
  text-align: right;
  font-weight: 600;
  font-family: var(--font-mono);
  font-size: 13px;
}
.mock-result-score.fail { color: var(--danger); }
.mock-result-score.ok { color: var(--warning); }
.mock-result-score.good { color: var(--success); }

/* === NOTES EDITOR === */
.notes-editor {
  background: var(--bg-soft);
  border: 1px dashed var(--border-bright);
  border-radius: 8px;
  padding: 14px;
  margin-top: 12px;
}
.notes-editor textarea {
  background: transparent;
  border: none;
  min-height: 80px;
  resize: vertical;
  font-size: 14px;
}
.notes-editor textarea:focus { box-shadow: none; }
.notes-editor-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  color: var(--text-faint);
  margin-top: 6px;
}

/* === TAGS BAR === */
.tag-row {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.tag-btn {
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg-soft);
  color: var(--text-dim);
  font-size: 12px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: all 0.15s ease;
}
.tag-btn:hover { border-color: var(--border-bright); color: var(--text); }
.tag-btn.active.tag-hard {
  background: rgba(248, 113, 113, 0.15);
  color: var(--danger);
  border-color: rgba(248, 113, 113, 0.4);
}
.tag-btn.active.tag-fav {
  background: var(--accent-glow);
  color: var(--accent);
  border-color: var(--accent);
}

/* === SPEECH-TO-TEXT BUTTON === */
.mic-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg-soft);
  color: var(--text-dim);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s ease;
}
.mic-btn:hover { border-color: var(--border-bright); color: var(--text); }
.mic-btn.recording {
  background: rgba(248, 113, 113, 0.12);
  border-color: rgba(248, 113, 113, 0.4);
  color: var(--danger);
}
.mic-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: currentColor;
}
.mic-btn.recording .mic-dot {
  animation: pulse 1s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.3); }
}

.icon-btn-row {
  display: flex;
  gap: 6px;
  margin-left: auto;
}

/* === DASHBOARD: PROGRESS RING === */
.progress-ring-wrap {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-top: 14px;
}
.progress-ring-info { flex: 1; }
.progress-ring-pct {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 600;
  color: var(--accent);
}
.progress-ring-desc {
  font-size: 12px;
  color: var(--text-dim);
}

/* keyboard hint */
.kbd {
  display: inline-block;
  padding: 2px 6px;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-bottom-width: 2px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
}

/* === ONBOARDING MODAL === */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(8px);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  animation: fadeIn 0.3s ease;
}

.modal {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  max-width: 580px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
}

.modal-header {
  padding: 32px 32px 0;
  position: relative;
}

.modal-eyebrow {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--accent);
  margin-bottom: 12px;
}

.modal-title {
  font-family: var(--font-display);
  font-size: 28px;
  line-height: 1.15;
  letter-spacing: -0.02em;
  font-weight: 600;
  margin-bottom: 14px;
}

.modal-body {
  padding: 8px 32px 24px;
  color: var(--text-dim);
  line-height: 1.65;
}

.modal-body p { margin-bottom: 14px; }
.modal-body strong { color: var(--text); }

.modal-footer {
  padding: 20px 32px 28px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  flex-wrap: wrap;
}

.modal-steps {
  display: flex;
  gap: 6px;
  margin-bottom: 18px;
  margin-top: 8px;
}
.modal-step-dot {
  width: 24px;
  height: 4px;
  border-radius: 2px;
  background: var(--border);
  transition: background 0.2s ease;
}
.modal-step-dot.active { background: var(--accent); }
.modal-step-dot.done { background: var(--accent-dim); }

.onboarding-illustration {
  background: var(--bg-soft);
  border-radius: 10px;
  padding: 18px 20px;
  margin: 16px 0 18px;
  border-left: 3px solid var(--accent);
}
.onboarding-illustration ul { list-style: none; padding: 0; margin: 0; }
.onboarding-illustration li {
  padding: 6px 0;
  font-size: 14px;
  color: var(--text);
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.onboarding-illustration li::before {
  content: '✓';
  color: var(--accent);
  font-weight: 700;
  flex-shrink: 0;
}

/* === FIRST-TIME TIP BANNER === */
.tip-banner {
  display: flex;
  gap: 16px;
  background: var(--accent-glow);
  border: 1px solid var(--accent);
  border-radius: 12px;
  padding: 18px 22px;
  margin-bottom: 24px;
  position: relative;
}

.tip-banner-icon {
  font-family: var(--font-display);
  font-size: 24px;
  color: var(--accent);
  flex-shrink: 0;
  line-height: 1;
}

.tip-banner-content { flex: 1; }
.tip-banner-title {
  font-weight: 600;
  font-size: 14px;
  margin-bottom: 4px;
  color: var(--text);
}
.tip-banner-text {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.5;
}

.tip-banner-close {
  background: none;
  border: none;
  color: var(--text-faint);
  font-size: 18px;
  cursor: pointer;
  padding: 0;
  line-height: 1;
  align-self: flex-start;
  margin-top: 2px;
}
.tip-banner-close:hover { color: var(--text); }

/* === GUIDE / PLAN === */
.guide-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  margin-bottom: 24px;
}

.guide-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.015em;
  margin-bottom: 6px;
}

.guide-desc {
  color: var(--text-dim);
  font-size: 14px;
  margin-bottom: 22px;
}

.date-picker-row {
  display: flex;
  gap: 12px;
  align-items: flex-end;
  flex-wrap: wrap;
  margin-bottom: 22px;
}

.date-picker-row label {
  flex: 1;
  min-width: 200px;
}
.date-picker-row .label-text {
  display: block;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-faint);
  margin-bottom: 8px;
  font-weight: 600;
}

input[type="date"] { color-scheme: dark; }

.countdown {
  background: var(--bg-soft);
  border-radius: 10px;
  padding: 18px 22px;
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 22px;
  border-left: 3px solid var(--accent);
}
.countdown-num {
  font-family: var(--font-display);
  font-size: 42px;
  font-weight: 700;
  line-height: 1;
  color: var(--accent);
  font-variant-numeric: tabular-nums;
}
.countdown-label {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.4;
}
.countdown-urgent .countdown-num { color: var(--warning); }
.countdown-critical .countdown-num { color: var(--danger); }

/* Day-by-day plan */
.day-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.day-row {
  display: grid;
  grid-template-columns: 80px 1fr auto;
  gap: 16px;
  align-items: center;
  padding: 14px 18px;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: 10px;
  transition: all 0.15s ease;
}

@media (max-width: 640px) {
  .day-row { grid-template-columns: 60px 1fr; }
  .day-row-time { grid-column: 2; font-size: 11px; }
}

.day-row.today {
  border-color: var(--accent);
  background: var(--accent-glow);
}
.day-row.past { opacity: 0.45; }

.day-row-clickable {
  cursor: pointer;
  transition: all 0.15s ease;
}
.day-row-clickable:hover {
  border-color: var(--accent);
  transform: translateX(2px);
}
.day-row-clickable:hover .day-row-title {
  color: var(--accent);
}

.day-row-num {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  line-height: 1.3;
}
.day-row.today .day-row-num { color: var(--accent); font-weight: 600; }

.day-row-content {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.day-row-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
}
.day-row-desc {
  font-size: 12px;
  color: var(--text-dim);
}
.day-row-time {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-faint);
  text-align: right;
  white-space: nowrap;
}

.plan-toggle {
  display: flex;
  gap: 6px;
  margin-bottom: 18px;
  flex-wrap: wrap;
}

/* FAQ */
.faq-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 8px;
  overflow: hidden;
}
.faq-q {
  padding: 16px 20px;
  cursor: pointer;
  font-weight: 500;
  font-size: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 14px;
  user-select: none;
}
.faq-q:hover { background: var(--bg-card-hover); }
.faq-q-arrow {
  color: var(--text-faint);
  transition: transform 0.2s ease;
  font-family: var(--font-mono);
  font-size: 14px;
}
.faq-item.open .faq-q-arrow { transform: rotate(90deg); color: var(--accent); }
.faq-a {
  padding: 0 20px;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease, padding 0.3s ease;
  color: var(--text-dim);
  font-size: 14px;
  line-height: 1.65;
}
.faq-item.open .faq-a {
  padding: 0 20px 18px;
  max-height: 600px;
}

/* === FOLLOW-UP ACCORDION === */
.followup-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.followup-item {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  transition: border-color 0.15s ease;
}
.followup-item:hover { border-color: var(--border-bright); }
.followup-item[open] {
  background: var(--bg-card);
  border-color: var(--accent);
}

.followup-q {
  padding: 14px 18px;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  user-select: none;
  list-style: none;
  font-weight: 500;
  color: var(--text);
}
.followup-q::-webkit-details-marker { display: none; }
.followup-q:hover { background: var(--bg-card-hover); }

.followup-q-num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  flex-shrink: 0;
}
.followup-item[open] .followup-q-num {
  background: var(--accent);
  color: var(--accent-text);
  border-color: var(--accent);
}

.followup-q-text {
  flex: 1;
  line-height: 1.4;
}

.followup-arrow {
  font-family: var(--font-mono);
  font-size: 18px;
  color: var(--text-faint);
  transition: transform 0.2s ease;
  font-weight: 400;
  flex-shrink: 0;
}
.followup-item[open] .followup-arrow {
  transform: rotate(90deg);
  color: var(--accent);
}

.followup-a {
  padding: 0 18px 18px 56px;
  color: var(--text);
  font-size: 14px;
  line-height: 1.65;
  border-top: 1px dashed var(--border);
  padding-top: 14px;
  margin-top: 0;
}
.followup-a strong {
  color: var(--accent);
  font-weight: 600;
}

@media (max-width: 600px) {
  .followup-a { padding-left: 18px; }
}

<script id="app-data" type="application/json">{"questions":[{"id":1,"title":"Cykl koniunkturalny - fazy, przyczyny i mechanizmy stabilizacji","definition":"Cykl koniunkturalny to okresowe, powtarzające się wahania aktywności gospodarczej (PKB, zatrudnienia, inwestycji, cen) wokół długookresowego trendu wzrostu gospodarczego.","answer":["Fazy cyklu koniunkturalnego:\n**Ożywienie** - gospodarka wychodzi z kryzysu. Rośnie produkcja, zatrudnienie, sprzedaż, inwestycje i popyt. Firmy zaczynają zwiększać produkcję, bo widzą poprawę sytuacji.","**Rozkwit / boom** - gospodarka działa na wysokich obrotach. Bezrobocie jest niskie, produkcja wysoka, rosną płace i ceny. Może pojawić się presja inflacyjna.","**Recesja** - spada produkcja, popyt, inwestycje i zatrudnienie. Firmy ograniczają koszty, konsumenci mniej kupują, wzrasta bezrobocie.","**Depresja / dno cyklu** - najniższy poziom aktywności gospodarczej. Występuje duże bezrobocie, niskie inwestycje, bankructwa firm i pesymizm gospodarczy.","Przyczyny cyklu:\nzmiany popytu konsumpcyjnego i inwestycyjnego,zmiany stóp procentowych i dostępności kredytu, nadmierny optymizm lub pesymizm przedsiębiorców, szoki zewnętrzne, np. wojny, pandemie, kryzysy energetyczne, zmiany technologiczne, polityka państwa.","Mechanizmy stabilizacji koniunktury to przede wszystkim polityka fiskalna (zmiany podatków i wydatków publicznych) oraz polityka monetarna (sterowanie stopami procentowymi przez bank centralny, operacje otwartego rynku, rezerwa obowiązkowa). W Polsce kluczową rolę odgrywa Rada Polityki Pieniężnej oraz polityka antycykliczna rządu. Działają też tzw. automatyczne stabilizatory: progresywny system podatkowy i zasiłki dla bezrobotnych, które samoczynnie łagodzą wahania."],"example":"Polska 2020-2021 (pandemia COVID): faza recesji -> ekspansywna polityka fiskalna (tarcze antykryzysowe, ok. 200 mld zł) + obniżki stóp NBP do 0,1%. Wynik: szybkie ożywienie w 2021 r. Klasyczny przykład historyczny: kryzys 2008 - FED i EBC obniżyły stopy niemal do zera.","short":"4 fazy: Ożywienie -> Rozkwit/boom -> Recesja -> Depresja/dno. Stabilizacja: polityka fiskalna + monetarna (NBP, RPP) + automatyczne stabilizatory (progresywny podatek, zasiłki).","follow_up":[{"q":"Jakie są typy automatycznych stabilizatorów koniunktury?","a":"Automatyczne stabilizatory to mechanizmy, które samoczynnie łagodzą wahania cyklu bez decyzji rządu. Dwa najważniejsze: **progresywny system podatkowy** (w recesji niższe dochody -> niższe podatki -> więcej pieniędzy w kieszeniach -> podtrzymanie popytu) oraz **zasiłki dla bezrobotnych** (rosną w recesji, podtrzymują konsumpcję). Plus: działają natychmiastowo, bez opóźnień politycznych. Minus: tylko łagodzą wahania, nie eliminują problemu."},{"q":"Czym różni się polityka fiskalna od monetarnej?","a":"**Polityka fiskalna** jest prowadzona przez **rząd i Ministerstwo Finansów** - dotyczy podatków i wydatków publicznych. W recesji: zwiększanie wydatków lub obniżanie podatków (ekspansywna). **Polityka monetarna** jest prowadzona przez **bank centralny (NBP w Polsce, decyduje Rada Polityki Pieniężnej)** - dotyczy stóp procentowych, operacji otwartego rynku i rezerwy obowiązkowej. W recesji: obniżenie stóp procentowych (tańszy kredyt -> pobudzenie inwestycji)."},{"q":"Co to jest presja inflacyjna pojawiająca się w fazie rozkwitu?","a":"W fazie **rozkwitu (boomu)** gospodarka działa na pełnych obrotach - bezrobocie jest niskie, produkcja wysoka, popyt przewyższa podaż. To prowadzi do **wzrostu cen** (presja inflacyjna): firmy podnoszą ceny bo mogą, pracownicy żądają wyższych płac, surowce drożeją. Jeśli inflacja przekroczy cel banku centralnego (NBP: 2,5% +/-1 p.p.), bank podnosi stopy procentowe żeby schłodzić gospodarkę - i to często rozpoczyna fazę recesji."}],"isNew":true},{"id":2,"title":"Rynek pracy - uwarunkowania, tendencje","definition":"Rynek pracy to całokształt relacji między pracodawcami (popyt na pracę) a pracownikami (podaż pracy), gdzie przedmiotem wymiany jest praca, a ceną - wynagrodzenie.","answer":["Uwarunkowania rynku pracy dzielą się na demograficzne (struktura wiekowa, migracje, dzietność), ekonomiczne (faza cyklu, poziom inwestycji, technologia), instytucjonalne (prawo pracy, płaca minimalna, związki zawodowe, system ubezpieczeń) oraz społeczno-kulturowe (model rodziny, aktywność zawodowa kobiet, etos pracy).","Współczesne tendencje to przede wszystkim cyfryzacja i automatyzacja, które eliminują rutynowe stanowiska, ale tworzą nowe zawody (specjaliści IT, analitycy danych, marketing cyfrowy). Rośnie znaczenie pracy zdalnej i hybrydowej, co przyspieszyła pandemia COVID-19. Postępuje gig economy i platformyzacja pracy (Uber, Bolt, Glovo). Obserwuje się starzenie się społeczeństw i wydłużanie aktywności zawodowej. W Polsce dochodzi presja imigracyjna (głównie z Ukrainy) wypełniająca lukę kadrową.","Kluczowe wskaźniki rynku pracy to stopa bezrobocia (rejestrowanego i według BAEL), stopa aktywności zawodowej, wskaźnik zatrudnienia oraz luka płacowa. W Polsce stopa bezrobocia rejestrowanego utrzymuje się na rekordowo niskim poziomie, ale rośnie problem niedoboru wykwalifikowanych pracowników, szczególnie w IT, budownictwie i służbie zdrowia."],"example":"Polska 2022-2025: niemal pełne zatrudnienie (bezrobocie ok. 5%), masowy napływ pracowników z Ukrainy (ok. 1 mln zarejestrowanych w ZUS), rosnąca presja płacowa wymuszająca podwyżki płacy minimalnej, rozwój pracy hybrydowej w korporacjach (Google, Microsoft, banki).","short":"Uwarunkowania: demograficzne, ekonomiczne, instytucjonalne, kulturowe. Tendencje: automatyzacja, praca zdalna, gig economy, starzenie społeczeństwa, migracje. Wskaźniki: stopa bezrobocia, aktywność zawodowa, luka płacowa.","follow_up":[{"q":"Czym różni się bezrobocie strukturalne od frykcyjnego?","a":"**Bezrobocie frykcyjne** to krótkotrwałe bezrobocie wynikające z naturalnej rotacji - ludzie zmieniają pracę, absolwenci szukają pierwszej posady, ktoś przeprowadza się do innego miasta. Trwa tygodnie/miesiące, jest nieuniknione i nawet pożądane (lepszy dopasowanie pracownika do stanowiska). **Bezrobocie strukturalne** wynika z niedopasowania kwalifikacji do potrzeb rynku - automatyzacja eliminuje stare zawody, powstają nowe wymagające innych umiejętności. Trwa lata, wymaga przekwalifikowania. Razem tworzą tzw. naturalną stopę bezrobocia (NAIRU)."},{"q":"Co to jest krzywa Phillipsa?","a":"Krzywa Phillipsa (1958) to empirycznie zaobserwowana odwrotna zależność między stopą bezrobocia a stopą inflacji: gdy bezrobocie spada, inflacja rośnie i odwrotnie. Sugerowała, że rząd może 'kupić' niższe bezrobocie za cenę wyższej inflacji. Lata 70. (stagflacja) podważyły tę zależność. Friedman i Phelps wprowadzili koncepcję **naturalnej stopy bezrobocia** - krzywa Phillipsa działa tylko krótkookresowo, długookresowo jest pionowa. Współcześnie używana z modyfikacją o oczekiwania inflacyjne."},{"q":"Jakie są wady i zalety pracy w gig economy?","a":"**Zalety**: elastyczność czasu i miejsca pracy, możliwość łączenia kilku zleceń, niskie progi wejścia (kierowca Uber, kurier Glovo), brak hierarchii korporacyjnej. **Wady**: brak ochrony socjalnej (ubezpieczenie zdrowotne, urlop, emerytura), brak stabilności dochodu, samodzielne ponoszenie kosztów (sprzęt, paliwo), brak ścieżki kariery, ryzyko 'platform capitalism' - algorytmy decydują o stawkach. UE wprowadza dyrektywę o pracownikach platformowych (domniemanie zatrudnienia)."}]},{"id":3,"title":"Formy organizacyjno-prawne prowadzenia działalności gospodarczej","definition":"Forma organizacyjno-prawna to ustawowo określony sposób prowadzenia działalności gospodarczej, który decyduje o odpowiedzialności właścicieli, sposobie opodatkowania, zasadach reprezentacji i wymogach rejestrowych.","answer":["W Polsce wyróżnia się formy nieposiadające osobowości prawnej oraz osoby prawne. Pierwsza grupa to: jednoosobowa działalność gospodarcza (JDG) - najprostsza forma, wpisywana do CEIDG, z pełną odpowiedzialnością właściciela całym majątkiem; spółka cywilna - umowa między co najmniej dwoma przedsiębiorcami; oraz spółki osobowe handlowe: jawna, partnerska, komandytowa i komandytowo-akcyjna, regulowane Kodeksem spółek handlowych.","Drugą grupą są spółki kapitałowe posiadające osobowość prawną: spółka z ograniczoną odpowiedzialnością (sp. z o.o.) - kapitał zakładowy minimum 5.000 zł, ograniczona odpowiedzialność wspólników do wysokości wkładów; prosta spółka akcyjna (PSA) - od 2021 r., kapitał 1 zł, dla startupów; spółka akcyjna (S.A.) - kapitał 100.000 zł, możliwość emisji akcji na giełdzie. Do osób prawnych zaliczamy też spółdzielnie, fundacje i stowarzyszenia prowadzące działalność gospodarczą.","Wybór formy zależy od skali działalności, liczby wspólników, akceptowalnego poziomu ryzyka, kwestii podatkowych (PIT vs CIT, możliwość ryczałtu) oraz planów rozwoju. JDG dominuje wśród mikroprzedsiębiorców, sp. z o.o. wśród MŚP, S.A. wśród dużych firm i emitentów giełdowych."],"example":"LockerRoom.pl mógłby działać jako JDG (proste rozliczenia, ryczałt 3% lub liniowy 19%) lub sp. z o.o. (ochrona majątku osobistego, łatwiejsze pozyskanie inwestora, ale podwójne opodatkowanie - CIT 9%/19% + PIT od dywidendy). InPost rozpoczął jako JDG, dziś jest międzynarodową S.A. notowaną w Amsterdamie.","short":"Bez osobowości prawnej: JDG, spółka cywilna, spółki osobowe (jawna, partnerska, komandytowa, k-a). Z osobowością prawną: sp. z o.o. (5 tys.), PSA (1 zł), S.A. (100 tys.), spółdzielnie. Wybór zależy od ryzyka, skali, podatków i planów rozwoju.","follow_up":[{"q":"Czym różni się spółka komandytowa od jawnej?","a":"**Spółka jawna** ma tylko jeden rodzaj wspólników - wszyscy odpowiadają całym majątkiem osobistym za zobowiązania spółki, wszyscy mogą reprezentować spółkę i prowadzić sprawy. **Spółka komandytowa** ma dwa typy wspólników: **komplementariusz** (odpowiada bez ograniczeń, prowadzi sprawy) i **komandytariusz** (odpowiada tylko do wysokości sumy komandytowej, nie reprezentuje spółki). Komandytowa pozwala wejść inwestorom finansowym bez ryzyka utraty całego majątku. Często komplementariuszem jest sp. z o.o. (sp.k. z sp. z o.o. - bardzo popularna konstrukcja)."},{"q":"Jakie są zalety prostej spółki akcyjnej dla startupu?","a":"PSA (od 2021 r.) została stworzona specjalnie dla startupów. **Kapitał 1 zł** zamiast 5 tys. dla sp. z o.o. czy 100 tys. dla S.A. **Akcje bez wartości nominalnej** - można łatwo dzielić udziały i przyjmować inwestorów. **Możliwość wkładów pracy/usług** jako pokrycia akcji (np. CTO zamiast pieniędzy wnosi 6 miesięcy pracy). **Elektroniczna rejestracja**, prowadzenie akcjonariatu przez dom maklerski lub notariusza. **Łatwe pozyskiwanie finansowania** - emisje, ESOPy. Wady: nowa instytucja, niewielka praktyka, niektórzy inwestorzy preferują sp. z o.o."},{"q":"Co to jest podwójne opodatkowanie i jak go uniknąć?","a":"**Podwójne opodatkowanie** dotyczy spółek kapitałowych (sp. z o.o., S.A.): najpierw spółka płaci **CIT** od zysku (9% do 2 mln euro przychodu, 19% powyżej), potem wspólnik płaci **PIT** od wypłaconej dywidendy (19% podatku zryczałtowanego). Razem efektywnie ~26-34%. **Sposoby unikania**: estoński CIT (płacisz CIT dopiero przy wypłacie zysku - jeden raz), wypłaty w formie wynagrodzenia za usługi/zarządzanie (koszt dla spółki), spółka komandytowa (do 2021 - już mało korzystne), prowadzenie JDG (jeden podatek PIT)."}]},{"id":4,"title":"Koncepcja zrównoważonego rozwoju","definition":"Zrównoważony rozwój (**sustainable** development) to rozwój zaspokajający potrzeby obecnego pokolenia bez ograniczania możliwości zaspokojenia potrzeb przyszłych pokoleń (definicja z raportu **Brundtland**, 1987).","answer":["**Zrównoważony rozwój- **Zrównoważon**y** rozwój to** **koncepcja rozwoju społeczno-gospodarczego, która zakłada zaspokajanie potrzeb obecnego pokolenia** **bez ograniczania możliwości zaspokajania potrzeb przyszłych pokoleń**. **to podejście do rozwoju, które stara się osiągnąć równowagę między potrzebami ekonomicznymi, społecznymi i środowiskowymi, aby zapewnić dobrobyt obecnych i przyszłych pokoleń. Planowanie i podejmowanie decyzji z myślą o przyszłości jest kluczowe. Oznacza to unikanie krótkowzrocznych działań, które mogą mieć negatywne skutki w przyszłości. Ta koncepcja opiera się na trzech filarach:","- **Ekonomiczny**- Stabilny wzrost gospodarczy, innowacje, tworzenie miejsc pracy, zrównoważona konsumpcja i produkcja np. Promowanie zielonej gospodarki, inwestowanie w technologie przyjazne środowisku, wspieranie małych i średnich przedsiębiorstw","- **Społeczny**- Poprawa jakości życia, równość społeczna, dostęp do edukacji, ochrony zdrowia i innych usług społecznych.","- **Środowiskowy**- Ochrona środowiska naturalnego, zarządzanie zasobami naturalnymi w sposób zrównoważony, ograniczenie zanieczyszczeń np. redukcja emisji gazów cieplarnianych, promowanie odnawialnych źródeł energii","Zarówno zrównoważony, jak i trwały rozwój mają kluczowe znaczenie dla zaspokajania potrzeb przyszłych pokoleń, skupiając się na ochronie zasobów naturalnych, zrównoważonej konsumpcji i produkcji, edukacji ekologicznej oraz budowaniu systemów odpornych na zmiany. Te podejścia mają na celu zapewnienie długoterminowej stabilności i ciągłości procesów rozwojowych, co jest niezbędne do utrzymania dobrobytu obecnych i przyszłych pokoleń."],"example":"Polska transformacja energetyczna: odejście od węgla, inwestycje w farmy wiatrowe i fotowoltaikę, KPO z budżetem ok. 60 mld euro wspierający zieloną energię i modernizację. Firmy: IKEA dąży do pełnej cyrkularności do 2030 r., LPP raportuje wpływ środowiskowy w raporcie ESG.","short":"3 filary: ekonomiczny (zielona gospodarka, MŚP), społeczny (jakość życia, edukacja, zdrowie), środowiskowy (OZE, redukcja CO2). Cel: zaspokoić potrzeby obecnych pokoleń bez ograniczania przyszłych (Brundtland 1987).","follow_up":[{"q":"Co oznacza filar ekonomiczny zrównoważonego rozwoju?","a":"Filar ekonomiczny zakłada **stabilny wzrost gospodarczy** połączony z **zieloną gospodarką**. Przykłady: promowanie technologii przyjaznych środowisku (OZE, elektromobilność), wspieranie małych i średnich przedsiębiorstw, zrównoważona konsumpcja i produkcja, innowacje, tworzenie zielonych miejsc pracy. Nie chodzi o zatrzymanie wzrostu, ale o jego **przekierowanie** na działalność niewyczerpującą zasobów."},{"q":"Czym jest trwały rozwój i jak różni się od zrównoważonego?","a":"W praktyce **trwały rozwój** i **zrównoważony rozwój** są pojęciami bardzo bliskimi - oba dotyczą **zaspokajania potrzeb przyszłych pokoleń**. Trwały rozwój kładzie nacisk na **długoterminową stabilność** procesów (zasoby, systemy gospodarcze, ekosystemy), a zrównoważony - na **równowagę między trzema filarami** (ekonomicznym, społecznym, środowiskowym). Wspólny mianownik: ochrona zasobów, edukacja ekologiczna, odporność na zmiany."},{"q":"Jakie konkretne działania są typowe dla filaru środowiskowego?","a":"Najważniejsze działania filaru środowiskowego: **redukcja emisji gazów cieplarnianych** (cel UE - neutralność klimatyczna do 2050 r.), **promowanie odnawialnych źródeł energii** (wiatr, słońce, biomasa), **zarządzanie zasobami naturalnymi** w sposób zrównoważony (woda, lasy, gleba), **gospodarka cyrkularna** (recykling, ponowne wykorzystanie), ochrona bioróżnorodności. W praktyce biznesowej: certyfikaty ekologiczne, raportowanie ESG (CSRD od 2024), ograniczanie zużycia plastiku."}],"isNew":true},{"id":5,"title":"Instytucje integracji europejskiej","definition":"Instytucje UE to organy traktatowe odpowiedzialne za stanowienie prawa, wykonywanie polityki oraz nadzór sądowniczy i finansowy nad funkcjonowaniem Unii Europejskiej.","answer":["Integracja europejska to proces stopniowego zacieśniania współpracy między państwami Europy. Polega na przekazywaniu części kompetencji na poziom ponadnarodowy po to, żeby zapewnić pokój, stabilność, spójność społeczną i większą konkurencyjność gospodarczą. Podstawą integracji jest wspólne prawo, wspólne polityki oraz jednolity rynek oparty na czterech swobodach: przepływu towarów, osób, usług i kapitału.","Unia Europejska działa na podstawie dwóch równorzędnych traktatów: Traktatu o Unii Europejskiej, czyli TUE, oraz Traktatu o Funkcjonowaniu Unii Europejskiej, czyli TFUE. Ich obecny kształt wynika z Traktatu z Lizbony z 2007 roku, który wszedł w życie w 2009 roku. TUE wywodzi się z Traktatu z Maastricht z 1992 roku, który formalnie powołał Unię Europejską, natomiast TFUE ma swoje korzenie w Traktacie Rzymskim z 1957 roku.","TUE ma charakter bardziej konstytucyjny. Określa wartości Unii, takie jak godność człowieka, wolność, demokracja, równość, państwo prawa i prawa człowieka. Wskazuje też cele UE, czyli pokój, dobrobyt i bezpieczeństwo. Reguluje zasady działania, takie jak pomocniczość i proporcjonalność, oraz opisuje ramy instytucjonalne. To właśnie w TUE znajduje się artykuł 50, który określa procedurę wyjścia z Unii.","TFUE ma charakter operacyjny. Opisuje, jak Unia działa w praktyce: jakie ma kompetencje, jak wygląda proces stanowienia prawa, jak funkcjonuje jednolity rynek, strefa euro oraz obszar wolności, bezpieczeństwa i sprawiedliwości. Wyróżnia kompetencje wyłączne, dzielone i wspierające.","System instytucjonalny UE opiera się na siedmiu głównych instytucjach. Pierwszą z nich jest Parlament Europejski, jedyna instytucja wybierana bezpośrednio przez obywateli. Współstanowi prawo i budżet oraz kontroluje Komisję. Jego przewodniczącą jest Roberta Metsola.","Drugą instytucją jest Rada Europejska, czyli szefowie państw lub rządów. To ona wyznacza ogólne kierunki polityczne Unii, ale nie stanowi prawa. Jej przewodniczącym jest António Costa.","Trzecią instytucją jest Rada Unii Europejskiej, zwana Radą Ministrów. To główny organ ustawodawczy obok Parlamentu. Tworzą ją ministrowie państw członkowskich. Przewodnictwo w Radzie zmienia się co pół roku i obecnie sprawuje je Polska.","Czwartą instytucją jest Komisja Europejska, czyli organ wykonawczy. Ma wyłączną inicjatywę ustawodawczą, nadzoruje przestrzeganie prawa i zarządza budżetem. Jej przewodniczącą jest Ursula von der Leyen.","Piątą instytucją jest Trybunał Sprawiedliwości Unii Europejskiej, który dba o jednolitą interpretację prawa unijnego i rozstrzyga spory. Jego prezesem jest Koen Lenaerts.","Szóstą instytucją jest Europejski Bank Centralny, odpowiedzialny za politykę pieniężną strefy euro i stabilność cen. Na jego czele stoi Christine Lagarde.","Siódmą instytucją jest Europejski Trybunał Obrachunkowy, który kontroluje finanse Unii. Jego prezesem jest Tony Murphy.","Oprócz instytucji głównych funkcjonują także organy pomocnicze i dyplomatyczne. Najważniejsza jest Europejska Służba Działań Zewnętrznych, czyli unijny korpus dyplomatyczny, kierowany przez Kaję Kallas. Istnieją też organy doradcze, takie jak Komitet Ekonomiczno-Społeczny i Komitet Regionów.","Ważną rolę odgrywają również wyspecjalizowane agencje, na przykład Europejski Bank Inwestycyjny, Prokuratura Europejska, Frontex czy Europol.","Cały system UE jest wielopoziomowy i dynamiczny. Jego charakterystyczną cechą jest multicentryczność, czyli rozproszenie władzy między instytucje reprezentujące obywateli, państwa członkowskie i interes wspólnotowy. To sprawia, że Unia Europejska jest unikalnym modelem integracji w stosunkach międzynarodowych."],"example":"Procedura legislacyjna UE w praktyce: Komisja Europejska (von der Leyen) ma wyłączną inicjatywę -> przygotowuje projekt np. dyrektywy CSRD -> Parlament Europejski i Rada UE wspólnie uchwalają (procedura zwykła współdecyzji) -> TSUE pilnuje zgodności wdrażania w państwach członkowskich. Sankcje wobec Rosji po 2022 r. - inicjatywa KE, decyzja Rady UE jednomyślnie.","short":"7 instytucji UE: PE (Metsola) + Rada Europejska (Costa) + Rada UE (rotacja, obecnie PL) + KE (von der Leyen) + TSUE (Lenaerts) + EBC (Lagarde) + ETO (Murphy). Podstawa: TUE + TFUE (Lizbona 2007). Cecha: multicentryczność.","follow_up":[{"q":"Czym różni się Rada Europejska od Rady Unii Europejskiej?","a":"To dwie różne instytucje, często mylone. **Rada Europejska** = szefowie państw lub rządów (premierzy, prezydenci) + przewodniczący (António Costa) + przewodniczący KE. Spotyka się 4 razy w roku, **wyznacza ogólne kierunki polityczne**, ale nie stanowi prawa. **Rada Unii Europejskiej** (Rada Ministrów) = ministrowie poszczególnych krajów. **Główny organ ustawodawczy** obok Parlamentu. Przewodnictwo zmienia się co pół roku - obecnie sprawuje je **Polska**."},{"q":"Czym różnią się TUE i TFUE?","a":"To dwa równorzędne traktaty będące podstawą UE od Lizbony (2007, wszedł w życie 2009). **TUE (Traktat o Unii Europejskiej)** ma charakter **konstytucyjny** - określa wartości Unii (godność, wolność, demokracja, prawa człowieka), cele (pokój, dobrobyt, bezpieczeństwo), zasady (pomocniczość, proporcjonalność) i ramy instytucjonalne. Zawiera **artykuł 50** (procedura wyjścia z UE). **TFUE (Traktat o Funkcjonowaniu Unii Europejskiej)** ma charakter **operacyjny** - opisuje jak UE działa: kompetencje (wyłączne/dzielone/wspierające), proces stanowienia prawa, jednolity rynek, strefa euro."},{"q":"Czym jest multicentryczność systemu UE?","a":"**Multicentryczność** to charakterystyczna cecha Unii Europejskiej - **rozproszenie władzy między różne instytucje** reprezentujące **różne interesy**. Parlament Europejski reprezentuje **obywateli** (jedyna instytucja wybierana bezpośrednio). Rada UE reprezentuje **państwa członkowskie** (ich rządy). Komisja Europejska reprezentuje **interes wspólnotowy** (cała UE, nie pojedyncze państwa). Trybunał Sprawiedliwości UE pilnuje **prawa**, a EBC niezależnie prowadzi **politykę pieniężną strefy euro**. Dzięki temu żadna instytucja nie ma pełnej władzy - jest to **unikalny model integracji** w stosunkach międzynarodowych."}],"isNew":true},{"id":6,"title":"Sektor małych i średnich przedsiębiorstw (MŚP)","definition":"Sektor MŚP obejmuje przedsiębiorstwa zatrudniające mniej niż 250 osób, których roczny obrót nie przekracza 50 mln euro lub suma bilansowa 43 mln euro (definicja KE).","answer":["ektor małych i średnich przedsiębiorstw, czyli MŚP, obejmuje firmy zatrudniające do 249 pracowników. Jest to bardzo ważna część gospodarki każdego kraju, ponieważ przedsiębiorstwa te stanowią większość wszystkich firm oraz tworzą dużą liczbę miejsc pracy.","- Podział przedsiębiorstw w sektorze MŚP","Według kryterium liczby zatrudnionych i wysokości obrotów wyróżnia się:","Mikroprzedsiębiorstwa - do 9 pracowników,","Małe przedsiębiorstwa - od 10 do 49 pracowników,","Średnie przedsiębiorstwa - od 50 do 249 pracowników. :Cechy sektora MŚP","Do najważniejszych cech małych i średnich przedsiębiorstw należą:","elastyczność działania, szybkie reagowanie na potrzeby rynku, prostsza struktura organizacyjna, bliski kontakt z klientem, większe ryzyko finansowe niż w dużych przedsiębiorstwach, ograniczone możliwości kapitałowe.","Znaczenie sektora MŚP w gospodarce :Sektor MŚP pełni bardzo ważną rolę w gospodarce, ponieważ:","tworzy nowe miejsca pracy, zmniejsza bezrobocie, wpływa na rozwój regionalny i lokalny, zwiększa konkurencyjność rynku, wspiera innowacyjność i przedsiębiorczość, przyczynia się do wzrostu PKB.","W Polsce sektor MŚP stanowi zdecydowaną większość wszystkich przedsiębiorstw i jest podstawą funkcjonowania gospodarki.","Problemy i bariery rozwoju MŚP najczęstsze trudności, z którymi spotykają się przedsiębiorcy z sektora MŚP, to: wysokie koszty prowadzenia działalności, skomplikowane przepisy prawne i podatkowe, trudności w uzyskaniu finansowania, silna konkurencja, brak wykwalifikowanych pracowników.","Sektor małych i średnich przedsiębiorstw jest fundamentem nowoczesnej gospodarki. Firmy z tego sektora wpływają na rozwój ekonomiczny kraju, tworzą miejsca pracy i pobudzają przedsiębiorczość. Mimo wielu trudności sektor MŚP ma ogromne znaczenie dla rozwoju Polski i całej gospodarki europejskiej.","."],"example":"LockerRoom.pl jako klasyczny przykład polskiego MŚP: kilku pracowników, elastyczne podejmowanie decyzji, niski próg wejścia do branży e-commerce. Problemy typowe dla MŚP: silna konkurencja (duże sieci sportowe), trudność w pozyskaniu finansowania bankowego, konieczność efektywnego marketingu przy ograniczonym budżecie.","short":"MŚP = do 249 pracowników. Podział: Mikro (do 9) + Małe (10-49) + Średnie (50-249). Cechy: elastyczność, prosta struktura, bliski kontakt z klientem. Większość firm w PL i głównie one tworzą miejsca pracy.","follow_up":[{"q":"Jakie są najczęstsze problemy i bariery rozwoju MŚP w Polsce?","a":"Główne bariery rozwoju polskich MŚP: **wysokie koszty prowadzenia działalności** (energia, podatki, ZUS), **skomplikowane przepisy** prawne i podatkowe (zmieniający się Polski Ład, VAT, RODO), **trudności w uzyskaniu finansowania** (banki traktują MŚP jako ryzykowne - brak zabezpieczeń, krótka historia), **silna konkurencja** (duże sieci, korporacje, e-commerce z Chin), **brak wykwalifikowanych pracowników** (zwłaszcza w IT, budownictwie). Wsparcie: PARP, BGK, fundusze UE (FENG, POIR)."},{"q":"Dlaczego sektor MŚP jest fundamentem nowoczesnej gospodarki?","a":"MŚP są podstawą gospodarki z kilku powodów: **(1)** stanowią **zdecydowaną większość firm** (w Polsce ok. 99,8% wszystkich przedsiębiorstw), **(2)** tworzą **dużą liczbę miejsc pracy** (ok. 70% zatrudnionych w sektorze prywatnym), **(3)** generują znaczną część **PKB** (ok. 50% w Polsce), **(4)** wpływają na **rozwój regionalny i lokalny** - są blisko klienta, działają w mniejszych miastach, **(5)** zwiększają **konkurencyjność rynku** (przeciwwaga dla monopoli), **(6)** wspierają **innowacyjność i przedsiębiorczość** (większość startupów to MŚP)."},{"q":"Jakie są cechy charakterystyczne MŚP w porównaniu do dużych firm?","a":"Najważniejsze cechy MŚP: **elastyczność działania** - mogą szybko zmienić strategię, ofertę, kierunek (w korporacji decyzja trwa miesiące); **szybkie reagowanie na potrzeby rynku** - bliskość klienta, brak biurokracji; **prostsza struktura organizacyjna** - mało szczebli, bezpośrednia komunikacja; **bliski kontakt z klientem** - właściciel często sam obsługuje kluczowych klientów; **większe ryzyko finansowe** - mniej rezerw, większa zależność od jednego klienta; **ograniczone możliwości kapitałowe** - trudniej zdobyć kredyt, ograniczone budżety na marketing/R&D."}],"isNew":true},{"id":7,"title":"Polityka fiskalna - charakterystyka i ocena","definition":"Polityka fiskalna to świadome wykorzystanie dochodów (głównie podatków) i wydatków publicznych przez państwo w celu osiągnięcia określonych celów makroekonomicznych: stabilizacji koniunktury, wzrostu gospodarczego, redystrybucji dochodów i zatrudnienia.","answer":["**Polityka fiskalna** to działania państwa związane z gromadzeniem i wydatkowaniem środków publicznych. W Polsce za prowadzenie polityki fiskalnej odpowiada **Ministerstwo Finansów**. Państwo przeznacza pieniądze przede wszystkim na realizację swoich zadań, czyli na dostarczanie dóbr publicznych i usług, inwestycje, wydatki socjalne, stymulowanie gospodarki oraz obsługę długu publicznego. Największa część dochodów budżetu pochodzi z **podatku VAT**, natomiast w przypadku gmin największym wydatkiem jest **szkolnictwo**, które do nich należy.","Polityka fiskalna ma trzy główne funkcje. Pierwsza to **alokacyjna**, czyli gospodarowanie dobrami publicznymi. Druga to **redystrybucyjna**, polegająca na wyrównywaniu różnic dochodowych między obywatelami. Trzecia to **stabilizacyjna**, czyli wpływanie na gospodarkę tak, aby ograniczać wahania koniunktury i pobudzać aktywność gospodarczą. W ramach polityki fiskalnej wykorzystuje się różne instrumenty. Makroekonomiczne to m.in. dochody i wydatki budżetu państwa, deficyt lub nadwyżka oraz dług publiczny. Mikroekonomiczne to takie narzędzia jak podatki, opłaty, cła, dotacje, subwencje, obligacje czy gwarancje rządowe. Głównym celem polityki fiskalnej jest zapewnienie państwu środków finansowych, ale może ona również wspierać wzrost gospodarczy, ograniczać bezrobocie czy zmniejszać nadmierne różnice dochodowe.","Jeśli chodzi o **upadłość przedsiębiorstw**, to mówimy o sytuacji, w której firma traci zdolność do regulowania swoich zobowiązań. Innymi słowy, nie jest w stanie spłacać długów. Przyczyny upadłości dzielimy na **wewnętrzne** i **zewnętrzne**. Wewnętrzne wynikają z błędów zarządzania, takich jak brak planowania, nadmierne zadłużenie, niekontrolowanie kosztów, błędne inwestycje czy brak reakcji na pogarszającą się sytuację. Ważną rolę odgrywa też zarządzanie personelem - konflikty, wysoka rotacja czy brak kompetencji mogą obniżać efektywność firmy i prowadzić do problemów finansowych.","Przyczyny zewnętrzne to czynniki, na które firma nie ma wpływu: kryzysy gospodarcze, inflacja, wzrost kosztów, spadek popytu, zmiany prawa, silna konkurencja czy nagłe wydarzenia losowe. W praktyce upadłość najczęściej wynika z połączenia kilku czynników jednocześnie.","Wyróżniamy dwa podstawowe rodzaje upadłości. **Upadłość likwidacyjna** oznacza zakończenie działalności firmy i sprzedaż jej majątku w celu spłaty wierzycieli. Natomiast **upadłość układowa** polega na zawarciu porozumienia z wierzycielami i daje przedsiębiorstwu szansę na dalsze funkcjonowanie, jeśli istnieją realne możliwości poprawy sytuacji.","Upadłość ma poważne konsekwencje - dla firmy oznacza utratę wiarygodności i często zakończenie działalności, dla pracowników utratę pracy, a dla gospodarki osłabienie rynku i problemy wierzycieli. Dlatego tak ważne jest wczesne rozpoznawanie sygnałów ostrzegawczych, takich jak spadek rentowności, problemy z płynnością czy odpływ klientów. Skuteczne zarządzanie polega nie tylko na osiąganiu wyników, ale też na monitorowaniu ryzyka i reagowaniu na zagrożenia odpowiednio wcześnie."],"example":"Pakiety pomocowe Polski w pandemii (2020-2022) - tarcze antykryzysowe o wartości ok. 200 mld zł (postojowe, zwolnienia ZUS, dopłaty do pensji) jako klasyczna ekspansywna polityka fiskalna. Cel: utrzymanie zatrudnienia i popytu w fazie recesji. Skutek uboczny: wzrost długu publicznego i późniejsza inflacja.","short":"3 funkcje p
