ezniszczalności; (2) Wiara w słuszność moralną grupy; (3) Stereotypy wrogów; (4) Bezpośrednia presja na opozycjonistów; (5) Samocenzura; (6) Iluzja jednomyślności; (7) Strażnicy ('mindguards') - filtrują negatywne info; (8) Kolektywna racjonalizacja. **Jak unikać**: **(1) Devil's advocate** - ktoś z obowiązku kwestionuje wnioski; **(2) Red team** - druga grupa atakuje plan A; **(3) Anonimowe głosowanie** - bez presji konformizmu; **(4) Sceptyk z zewnątrz** - konsultant, ekspert spoza zespołu; **(5) Decyzje warte rozważenia w 2 sesjach** - pierwsza analiza, druga po 'przespaniu się'; **(6) Lider mówi ostatni** - żeby nie zakotwiczyć dyskusji; **(7) Premiowanie dissens** - nagradzanie pytań, nie zgody."},{"q":"Co to jest prospect theory Kahnemana?","a":"**Prospect Theory** (Kahneman & Tversky 1979) - przełomowa teoria decyzji w ryzyku, **fundament ekonomii behawioralnej**. Pokazała, że ludzie **NIE są racjonalnymi maksymalizatorami** użyteczności (jak zakładała klasyczna ekonomia). **3 główne odkrycia**: **(1) Reference dependence** - oceniamy wyniki względem **punktu odniesienia** (status quo), nie absolutnie. 100 zł zysku z poziomu 0 ≠ 100 zł zysku przy posiadaniu już 10 tys.; **(2) Loss aversion** - **strata boli 2x mocniej niż wygrana cieszy** (krzywa wartości stroma w dół); **(3) Probability weighting** - **przeceniamy małe prawdopodobieństwa** (kupujemy lotki mimo P=1 do milionów) i **niedoceniamy duże** (ignorujemy 95% szans powodzenia jakby było 80%). **Konsekwencje**: framing matters (te same opcje opisane różnie → różne decyzje), endowment effect, status quo bias, mental accounting. **Nobla 2002** dla Kahnemana (Tversky nie żył). **Książka popularna**: 'Thinking, Fast and Slow' (2011) - System 1 (szybki, intuicyjny) vs System 2 (wolny, analityczny)."}]},{"id":39,"title":"Pojęcie procesu i jego składowe","definition":"Proces (biznesowy) to uporządkowana, powtarzalna sekwencja powiązanych ze sobą działań, które wykorzystując zasoby przekształcają wejścia  w wyjścia  o określonej wartości dla klienta wewnętrznego lub zewnętrznego.","answer":["Każdy proces ma swój początek, koniec, cel oraz osobę odpowiedzialną za jego przebieg. W procesie zawsze występuje dostawca, który dostarcza wejścia, następnie odbywają się działania, czyli konkretne kroki wykonywane przez ludzi lub systemy, a efektem jest wyjście, czyli produkt lub usługa trafiająca do klienta wewnętrznego lub zewnętrznego.","Do opisania procesu często wykorzystuje się model SIPOC, który obejmuje dostawców, wejścia, sam proces, wyjścia oraz klientów. Każdy proces ma też swoje mierniki, takie jak czas, koszty, jakość czy poziom satysfakcji klienta. Ważne są również zasoby potrzebne do realizacji procesu, na przykład ludzie, technologia czy infrastruktura, oraz mechanizmy sterujące, czyli procedury, standardy i regulacje.","Procesy można podzielić na główne, które bezpośrednio tworzą wartość dla klienta, na przykład produkcja czy sprzedaż, oraz na procesy wspierające, takie jak HR, IT czy księgowość. Istnieją też procesy zarządcze, związane z planowaniem i kontrolą. Każdy proces można opisać na różnych poziomach szczegółowości - od ogólnych makroprocesów, przez procesy i podprocesy, aż po pojedyncze czynności.","W organizacjach procesy często przedstawia się graficznie, na przykład za pomocą schematów blokowych, diagramów przepływu, map strumienia wartości czy notacji BPMN. Dzięki temu łatwiej je analizować, usprawniać i eliminować marnotrawstwo. Dojrzałość procesowa organizacji może być różna - od chaotycznego działania po pełne, ciągłe doskonalenie procesów.","Podsumowując: proces to uporządkowany sposób działania, który przekształca wejścia w wartościowe wyjścia. Ma swoje cele, zasoby, mierniki i klientów, a jego skuteczność zależy zarówno od jakości działań wewnętrznych, jak i od tego, jak odbiera go klient."],"example":"Proces sprzedaży LockerRoom.pl (order-to-cash): Suppliers (klient z zamówieniem, dostawca koszulek) -> Inputs (zamówienie, zapasy, środki płatnicze) -> Process (przyjęcie zamówienia -> wybór z magazynu -> pakowanie -> wysyłka -> fakturowanie) -> Outputs (zapakowana paczka, faktura) -> Customer (klient końcowy). KPI: czas realizacji (24h), koszt obsługi (15 zł), satysfakcja (NPS).","short":"Proces = sekwencja działań przekształcająca wejścia w wyjścia dające wartość klientowi. Składowe (SIPOC): Suppliers + Inputs + Process (5-7 kroków) + Outputs + Customers. Plus: właściciel procesu, KPI, zasoby. Modelowanie: BPMN, mapy procesów. Typy: główne (core), pomocnicze (support), zarządcze.","follow_up":[{"q":"Co to jest model SIPOC?","a":"**SIPOC** (Suppliers, Inputs, Process, Outputs, Customers) - **prosta tabelaryczna metoda mapowania procesu** na wysokim poziomie. Pochodzi z TQM/Six Sigma. **Krok 1**: **Suppliers** - kto dostarcza wejście? (np. dostawcy materiałów, klienci z zapytaniami, dział marketingu z briefem); **Krok 2**: **Inputs** - co dostarczają? (materiały, zlecenia, briefy); **Krok 3**: **Process** - 5-7 głównych kroków procesu (np. przyjęcie zamówienia -> produkcja -> kontrola -> wysyłka -> fakturowanie); **Krok 4**: **Outputs** - co produkujemy? (produkt, faktura, raport); **Krok 5**: **Customers** - kto odbiera? (klient zewnętrzny, dział sprzedaży, regulator). **Zastosowanie**: początek projektu BPR/Six Sigma - daje wspólne zrozumienie procesu zanim zaczniemy szczegółowe mapowanie. Plus: prosty, mieści się na 1 stronie A4."},{"q":"Czym jest macierz RACI?","a":"**Macierz RACI** (Responsibility Assignment Matrix) - **narzędzie przypisywania ról i odpowiedzialności** w procesie/projekcie. **4 role**: **R - Responsible** (odpowiedzialny) - osoba/y **wykonująca pracę** (może być kilka); **A - Accountable** (rozliczany, decydent) - **odpowiada za wynik**, podpisuje, decyduje (TYLKO JEDNA osoba dla danej czynności - klucz!); **C - Consulted** - **konsultowany przed decyzją**, dwukierunkowa komunikacja (np. ekspert prawny); **I - Informed** - **informowany o decyzji po fakcie**, jednokierunkowa. **Format**: tabela - wiersze = czynności, kolumny = osoby/role. **Zasady**: każda czynność ma dokładnie 1 A, R może być >1, C i I dowolnie. **Przykład**: \"Akceptacja kampanii marketingowej\" - R: zespół marketingu, A: CMO, C: dyrektor sprzedaży, I: zarząd. **Plusy**: jasność ról, koniec konfliktów \"kto miał to zrobić\"."},{"q":"Wymień poziomy dojrzałości procesowej CMMI.","a":"**CMMI** (Capability Maturity Model Integration) - **model dojrzałości procesowej** organizacji. **5 poziomów** dojrzałości: **(1) Initial** (Początkowy) - chaos, procesy ad-hoc, sukces zależy od jednostek-bohaterów, brak dokumentacji; **(2) Managed** (Zarządzany) - procesy zdefiniowane na poziomie projektów, planowanie, monitoring, ale różne metody w różnych zespołach; **(3) Defined** (Zdefiniowany) - **standardowe procesy w całej organizacji**, dokumentacja, szkolenia, mierniki; **(4) Quantitatively Managed** - procesy mierzone statystycznie, kontrola jakości oparta na danych (KPI, SPC); **(5) Optimizing** - **ciągłe doskonalenie**, innowacje procesowe, prewencja zamiast reakcji, kultura kaizen. **Stosowanie**: oryginalnie IT, później wszystkie branże. **Minus**: drogie wdrożenie i certyfikacja - większość firm dochodzi tylko do poziomu 3."}],"isNew":true},{"id":40,"title":"Segmentacja rynku, wybór rynku docelowego i pozycjonowanie marki (STP)","definition":"STP (**Segmentation**, **Targeting**, **Positioning**) to fundamentalny proces marketingu strategicznego, polegający na podziale rynku na jednorodne segmenty, wyborze najatrakcyjniejszych z nich jako rynków docelowych oraz zaprojektowaniu unikalnej pozycji marki w świadomości konsumentów.","answer":["STP to jeden z najważniejszych procesów w marketingu. Polega na tym, że najpierw dzielimy rynek na mniejsze grupy klientów, potem wybieramy te, które są dla firmy najbardziej atrakcyjne, a na końcu tworzymy jasny obraz marki w świadomości tych klientów.","Segmentacja rynku oznacza podział dużego, zróżnicowanego rynku na mniejsze grupy ludzi, którzy mają podobne potrzeby lub zachowania. Można to robić według cech demograficznych, takich jak wiek czy płeć, według miejsca zamieszkania, według stylu życia i wartości albo według zachowań zakupowych. W segmencie B2B segmentuje się firmy, na przykład według branży czy wielkości. Dobra segmentacja musi być sensowna, mierzalna i możliwa do obsłużenia przez firmę.","Kolejny krok to wybór rynku docelowego, czyli decyzja, do których segmentów firma chce kierować swoją ofertę. Można wybrać jeden duży rynek i stosować marketing masowy, można kierować różne produkty do różnych segmentów, można też skupić się na jednej niszy. Przy wyborze segmentu bierze się pod uwagę jego wielkość, potencjał wzrostu, konkurencję oraz to, czy firma ma kompetencje, żeby skutecznie go obsłużyć.","Ostatni etap to pozycjonowanie, czyli określenie, jak marka ma być postrzegana przez klientów w porównaniu z konkurencją. Chodzi o to, żeby stworzyć jasny i wyróżniający się przekaz - na przykład że marka jest najtańsza, najbardziej innowacyjna, najbardziej ekologiczna albo najbardziej prestiżowa. Pomagają w tym narzędzia takie jak mapa pozycjonowania czy unikalna propozycja wartości. Czasem firmy zmieniają swoją pozycję, jeśli chcą dotrzeć do nowych klientów - to tzw. repozycjonowanie.","Podsumowując: STP to proces, który pomaga firmie zrozumieć, do kogo chce kierować swoją ofertę i jak chce być postrzegana. Segmentacja dzieli rynek, targeting wybiera najlepsze grupy, a pozycjonowanie buduje w umysłach klientów jasny obraz marki."],"example":"LockerRoom.pl STP: Segmentacja (psychograficzna - fani piłki nożnej, demograficzna - mężczyźni 18-35); Targeting (skoncentrowana strategia - polski rynek, polskie kluby + Premier League); Positioning (\"autentyczne koszulki + emocje Mystery Box\" - mapa pozycjonowania: oś autentyczność vs cena; konkurenci: AliExpress (tani + nieautentyczny), oficjalne sklepy klubów (drogi + autentyczny), LockerRoom (średnia cena + autentyczność).","short":"STP = fundament marketingu strategicznego: Segmentation (podział rynku) + Targeting (wybór segmentów) + Positioning (miejsce w głowie klienta). Kryteria: demograficzne, geograficzne, psychograficzne, behawioralne. Strategie targetingu: 4 typy (niezróżnicowana, zróżnicowana, skoncentrowana, micro). Narzędzie: mapa pozycjonowania, USP.","follow_up":[{"q":"Co to jest USP (Unique Selling Proposition)?","a":"**USP** (Unique Selling Proposition, unikalna oferta sprzedażowa) - pojęcie z marketingu lat 40. (Rosser Reeves, agencja Ted Bates). **Definicja**: **konkretna, mierzalna korzyść**, którą **TYLKO twój produkt** dostarcza, i która **przyciąga klientów**. **3 kryteria USP**: **(1) Proposition** - \"Kupując nasz produkt, dostaniesz X\"; **(2) Unique** - konkurencja nie oferuje tego lub nie potrafi (lub nie reklamuje); **(3) Selling** - na tyle silna, że ludzie kupują. **Klasyczne przykłady**: M&M's \"rozpływają się w ustach, nie w dłoni\"; FedEx \"When it absolutely, positively has to be there overnight\"; Domino's \"Pizza w 30 minut albo gratis\"; Volvo \"Bezpieczeństwo\"; Apple \"Think Different\". **LockerRoom**: \"Autentyczne koszulki z emocjami Mystery Box\". Współczesne pojęcia: **UVP** (Unique Value Proposition), **Positioning Statement**."},{"q":"Wymień kryteria segmentacji rynku B2C i B2B.","a":"**B2C** (Business-to-Consumer): **(1) Demograficzne** - wiek, płeć, dochód, wykształcenie, zawód, status rodzinny, narodowość; **(2) Geograficzne** - kraj, region, miasto, klimat; **(3) Psychograficzne** - styl życia, osobowość, wartości, hobby; **(4) Behawioralne** - okazja zakupu (urodziny, święta), poszukiwane korzyści, lojalność, intensywność użycia. **B2B** (Business-to-Business): **(1) Firmograficzne** - branża, wielkość (liczba pracowników, obrót), wiek firmy, lokalizacja; **(2) Operacyjne** - technologia, intensywność użycia; **(3) Procurement approach** - centralizacja zakupów, polityka, kryteria wyboru; **(4) Sytuacyjne** - pilność, wielkość zamówienia; **(5) Charakterystyka decydentów** - kto podejmuje decyzję (DMU - Decision Making Unit). **B2B trudniejszy**: mniej klientów, więksi, racjonalne kryteria, dłuższy cykl sprzedaży."},{"q":"Co to jest mapa pozycjonowania?","a":"**Perceptual map / Positioning map** - **wykres dwuwymiarowy** pokazujący, jak konsumenci postrzegają nasze produkty/marki w porównaniu z konkurencją. **Konstrukcja**: 2 osie = **najważniejsze kryteria** dla klientów (np. cena vs jakość, sportowość vs luksus). Każda marka = punkt na mapie. **Cele**: **(1) Zidentyfikować nasze obecne miejsce** - jak nas widzą klienci (często != jak myśleliśmy); **(2) Znaleźć luki rynkowe** - obszary mapy gdzie nikogo nie ma, a klienci pragną; **(3) Repositioning** - świadoma zmiana percepcji; **(4) Analiza konkurencji** - kto jest blisko nas (substytuty), kto daleko. **Przykład**: auta na osi cena x sportowość: Ferrari (drogi, sportowy), Mercedes S (drogi, komfortowy), Mazda MX-5 (tani, sportowy), Skoda Octavia (tani, komfortowy). **Jak zrobić**: badania marketingowe (ankiety, focus groups)."}],"isNew":true}],"errata":[{"id":"1.1","title":"Macierz BCG - data powstania","blocks":[{"type":"para","text":"W pliku głównym podano rok 1968 jako rok powstania macierzy BCG. To jest powszechnie cytowana data (sam BCG tak twierdzi - Bruce Henderson zauważył cztery zasady przepływu gotówki w 1968 r.), ale:"},{"type":"bullet","text":"Pierwsza szkicowa koncepcja czteropolowa pochodzi od Alana Zakona (współpracownika BCG)."},{"type":"bullet","text":"Esej 'The Product Portfolio' Hendersona, który spopularyzował narzędzie, ukazał się w 1970 r. w biuletynie BCG 'Perspectives'."},{"type":"bullet","text":"W literaturze pojawiają się też daty 1969 i 1970 - wszystkie mają swoje uzasadnienie."},{"type":"callout","label":"Bezpieczna odpowiedź","text":"Macierz BCG powstała w Boston Consulting Group na przełomie lat 60. i 70., główny autor to Bruce Henderson, choć współtworzył ją zespół, m.in. Alan Zakon. Koncepcja została upubliczniona w eseju 'The Product Portfolio' z 1970 r."}]},{"id":"1.2","title":"Piramida CSR Carrolla - dwie daty","blocks":[{"type":"para","text":"W pliku głównym piramida Carrolla jest datowana na 1991 r. - to jest poprawne w odniesieniu do pyramidy jako graficznej wizualizacji. Ale:"},{"type":"bullet","text":"4-częściowa definicja CSR (ekonomiczna, prawna, etyczna, dyskrecjonalna/filantropijna) została opublikowana przez Carrolla już w 1979 r. w Academy of Management Review."},{"type":"bullet","text":"Dopiero w 1991 r. Carroll przedstawił to graficznie jako piramidę, w Business Horizons."},{"type":"callout","label":"Bezpieczna odpowiedź","text":"Czteropoziomowa koncepcja CSR Carrolla pochodzi z 1979 r. - graficzna wizualizacja w postaci piramidy została opublikowana w 1991 r."}]},{"id":"1.3","title":"Teoria interesariuszy - Freeman","blocks":[{"type":"para","text":"W pliku poprawnie - R. Edward Freeman 1984, książka 'Strategic Management: A Stakeholder Approach'. Bez zmian, ale dobrze wiedzieć: sam termin 'stakeholder' pojawił się wcześniej - w memorandum Stanford Research Institute (SRI) w 1963 r., Freeman systematyzował i rozpropagował tę koncepcję jako alternatywę dla shareholder theory Friedmana (1970 'The Social Responsibility of Business is to Increase its Profits')."}]},{"id":"1.4","title":"Z-score Altmana - interpretacja","blocks":[{"type":"para","text":"Wzór w pliku poprawny: Z = 1,2X1 + 1,4X2 + 3,3X3 + 0,6X4 + 1,0X5 (niektóre źródła podają 0,999 zamiast 1,0 dla X5 - to to samo)."},{"type":"para","text":"Uściślenie granic interpretacji (oryginalny model z 1968 r. dla dużych spółek produkcyjnych notowanych):"},{"type":"bullet","text":"Z > 2,99 - strefa bezpieczna (safe zone), upadek mało prawdopodobny"},{"type":"bullet","text":"Z 1,81 - 2,99 - strefa szara / strefa niepewności (grey zone / zone of ignorance)"},{"type":"bullet","text":"Z < 1,81 - strefa zagrożenia (distress zone), wysokie ryzyko upadłości w ciągu 2 lat"},{"type":"para","text":"W pliku głównym jest uproszczenie 'Z<1,8' i 'Z>3' - formalnie granice wynoszą 1,81 i 2,99. Zapamiętaj też, że istnieją warianty Z' (spółki niepubliczne) i Z'' (firmy nieprodukcyjne, rynki wschodzące)."}]},{"id":"1.5","title":"Przywództwo transformacyjne - Burns vs Bass","blocks":[{"type":"para","text":"W pliku: 'transformacyjny (Bass, Burns)'. Uściślenie kolejności:"},{"type":"bullet","text":"James MacGregor Burns 1978 - polityolog, wprowadził rozróżnienie przywództwa transformacyjnego vs transakcyjnego w książce 'Leadership' (w kontekście polityki)."},{"type":"bullet","text":"Bernard Bass 1985 - przeniósł tę koncepcję do zarządzania i rozwinął operacyjnie (4 wymiary: idealized influence, inspirational motivation, intellectual stimulation, individualized consideration)."}]},{"id":"1.6","title":"Karty kontrolne Shewharta","blocks":[{"type":"para","text":"W pliku: 'opracowane przez Waltera Shewharta w Bell Labs (lata 20. XX w.)'. Uściślenie:"},{"type":"bullet","text":"Konkretnie: Walter A. Shewhart opracował karty kontrolne w 1924 r. (notatka do Bell Telephone Laboratories z 16 maja 1924)."},{"type":"bullet","text":"W 1931 r. wydał książkę 'Economic Control of Quality of Manufactured Product' - fundament całego SPC."},{"type":"bullet","text":"Deming był uczniem Shewharta i rozpowszechnił metodologię w Japonii po 1950 r."}]},{"id":"1.7","title":"Lean - 7 typów marnotrawstwa","blocks":[{"type":"para","text":"W pliku TIMWOOD - poprawne. Doprecyzowanie:"},{"type":"bullet","text":"7 typów marnotrawstwa (muda) zidentyfikował Taiichi Ohno - opisane w jego książce 'Toyota Production System: Beyond Large-Scale Production' (1978, tłum. ang. 1988)."},{"type":"bullet","text":"Akronim TIMWOOD (oryginalnie) lub TIMWOODS (po dodaniu 8. typu - niewykorzystany potencjał ludzi / Skills) to memoryczne ułatwienie - NIE jest to oryginalna kolejność Ohno."},{"type":"bullet","text":"Ohno opisywał marnotrawstwo w innej kolejności, akcentując że nadprodukcja (overproduction) jest najgorszą, bo pociąga za sobą inne marnotrawstwa."},{"type":"bullet","text":"Muda to jedno z trzech M: Muda (marnotrawstwo), Muri (przeciążenie), Mura (nierównomierność)."}]},{"id":"1.8","title":"Marketing relacji - zasada Reichhelda","blocks":[{"type":"para","text":"W pliku: 'pozyskanie nowego klienta jest 5-7 razy droższe niż utrzymanie istniejącego'. W literaturze podaje się różne wartości (5x, 7x, nawet 25x), powoływane na różnych badaczy (Reichheld, Harvard Business Review, różne raporty konsultingowe)."},{"type":"callout","label":"Bezpieczna wersja","text":"Liczne badania wskazują, że pozyskanie nowego klienta jest kilkukrotnie (najczęściej podaje się 5-7 razy) droższe niż utrzymanie istniejącego - dokładna wartość zależy od branży. Koncepcja marketingu relacji wynika z tego efektu kosztowego."},{"type":"para","text":"Frederick Reichheld sam bardziej znany jest z wprowadzenia NPS (Net Promoter Score) w 2003 r. w Harvard Business Review oraz książki 'The Loyalty Effect' (1996)."}]},{"id":"1.9","title":"Koszty stałe vs zmienne - ważny niuans","blocks":[{"type":"para","text":"W pliku poprawnie: koszty stałe nie zmieniają się z produkcją, zmienne - tak. Dodatkowe subtelności które komisja może chcieć usłyszeć:"},{"type":"bullet","text":"Koszty stałe są stałe TYLKO w krótkim okresie i przy określonej zdolności produkcyjnej - w długim okresie wszystkie koszty są zmienne."},{"type":"bullet","text":"Istnieją też koszty mieszane (semi-variable / semi-fixed), np. rachunek za telefon - stała opłata + zmienne minuty."},{"type":"bullet","text":"Koszty stałe mogą mieć charakter skokowy (step costs) - np. wynajem dodatkowego magazynu po przekroczeniu pewnego poziomu."}]},{"id":"1.10","title":"Break-Even Point - niuanse","blocks":[{"type":"para","text":"Wzór w pliku poprawny: BEP = FC / (P - VC). Uściślenia:"},{"type":"bullet","text":"Marża pokrycia jednostkowa (unit contribution margin) = P - VC"},{"type":"bullet","text":"Wskaźnik marży pokrycia (contribution margin ratio) = (P-VC)/P"},{"type":"bullet","text":"Dla produkcji wieloasortymentowej: ważony średni wskaźnik marży pokrycia (weighted average contribution margin ratio)"},{"type":"bullet","text":"Założenia BEP w CVP: ceny stałe, struktura kosztów stała, struktura asortymentu stała, produkcja = sprzedaż (brak zapasów)"}]},{"id":"1.11","title":"Strategie Portera - uściślenie","blocks":[{"type":"para","text":"W pliku: 3 strategie generyczne (1980). Drobne uściślenie z tego samego źródła:"},{"type":"bullet","text":"Porter wyróżnił właściwie 4 warianty: przywództwo kosztowe + różnicowanie + koncentracja kosztowa + koncentracja przez różnicowanie. Najczęściej upraszcza się do 3."},{"type":"bullet","text":"Rok 1980: 'Competitive Strategy'. 5 sił Portera - z tej samej książki. Łańcuch wartości - 1985, 'Competitive Advantage'."},{"type":"bullet","text":"Porter ostrzegał przed 'utknięciem w środku' (stuck in the middle) - próbą robienia wszystkiego po trochu."}]},{"id":"1.12","title":"Maslow - uściślenie dla bezpieczeństwa","blocks":[{"type":"para","text":"Maslow nie pojawia się bezpośrednio w pytaniach, ale przy motywowaniu - na wypadek pytania komisji:"},{"type":"bullet","text":"Piramida Maslowa wywodzi się z artykułu 'A Theory of Human Motivation' (1943, Psychological Review), rozwiniętego w książce 'Motivation and Personality' (1954)."},{"type":"bullet","text":"Oryginalnie 5 poziomów: fizjologiczne → bezpieczeństwo → przynależność/miłość → szacunek/uznanie → samoaktualizacja."},{"type":"bullet","text":"Późniejsze rozszerzenia (nie zawsze przypisywane samemu Maslowowi): poznawcze, estetyczne, transcendencja - do 7 lub 8 poziomów."},{"type":"bullet","text":"Krytyka: brak solidnych badań empirycznych potwierdzających hierarchię, kulturowa stronniczość (amerykański kontekst indywidualistyczny)."}]}],"deepenings":[{"id":"2.1","title":"Weryfikacja hipotez - p-value i częste błędy","blocks":[{"type":"para","text":"To pytanie jest podstępne, bo wiele osób pomylowo interpretuje p-value. Jeśli komisja zapyta 'co to jest p-value', oto precyzyjna definicja:"},{"type":"callout","label":null,"text":"P-value to prawdopodobieństwo zaobserwowania danych co najmniej tak ekstremalnych jak te otrzymane w próbie, PRZY ZAŁOŻENIU że hipoteza zerowa jest prawdziwa."},{"type":"para","text":"Czyli: P(dane | H0), nie P(H0 | dane)."},{"type":"subheading","text":"Typowe BŁĘDNE interpretacje (których komisja może pytać)"},{"type":"bullet","text":"BŁĘDNE: 'p-value to prawdopodobieństwo że H0 jest prawdziwa' - NIE, p-value NIE mówi nic o prawdopodobieństwie hipotezy."},{"type":"bullet","text":"BŁĘDNE: 'jeśli p<0,05, to efekt jest realny' - NIE, mówi tylko że obserwacja jest mało prawdopodobna pod H0."},{"type":"bullet","text":"BŁĘDNE: 'p<0,05 oznacza że H1 jest prawdziwa z 95% pewnością' - NIE, kompletnie."},{"type":"bullet","text":"BŁĘDNE: 'wielka próba = bardziej wiarygodny p-value' - przy bardzo wielkiej próbie nawet trywialne różnice są istotne statystycznie, więc sama istotność traci znaczenie - trzeba patrzeć na effect size."},{"type":"subheading","text":"Różnica istotność statystyczna vs praktyczna"},{"type":"para","text":"Istotność statystyczna: p<α - odchylenie wystarczająco duże że nie uznamy go za przypadek."},{"type":"para","text":"Istotność praktyczna: wielkość efektu (np. d Cohena, r Pearsona) - czy różnica jest duża, żeby miała realne znaczenie."},{"type":"para","text":"Przykład: test A/B na 1 mln użytkowników, konwersja wzrosła z 2,000% do 2,001%. p<0,001 (statystycznie super-istotne), ale praktycznie bez znaczenia."}]},{"id":"2.2","title":"Statystyczne sterowanie procesami (SPC) - reguły Western Electric","blocks":[{"type":"para","text":"Komisja może dopytać 'jakie są reguły wykrywania sygnałów na karcie Shewharta?'. Oto reguły Western Electric (Handbook 1956):"},{"type":"bullet","text":"Reguła 1: Jeden punkt poza 3σ (UCL lub LCL) - klasyczny sygnał."},{"type":"bullet","text":"Reguła 2: Dwa z trzech kolejnych punktów w strefie A (między 2σ a 3σ) po tej samej stronie CL."},{"type":"bullet","text":"Reguła 3: Cztery z pięciu kolejnych punktów w strefie B lub dalej (za 1σ) po tej samej stronie CL."},{"type":"bullet","text":"Reguła 4: Osiem kolejnych punktów po tej samej stronie CL (trend systematyczny)."},{"type":"para","text":"Późniejsze uzupełnienia Nelson Rules (1984) - dodaje reguły o trendach rosnących/malejących, oscylacjach itp. W sumie 8 reguł."}]},{"id":"2.3","title":"FMEA - krok po kroku","blocks":[{"type":"para","text":"Klasyczny przebieg analizy FMEA - komisja może pytać o metodologię:"},{"type":"bullet","text":"Krok 1: Zidentyfikuj funkcje systemu/procesu (co powinien robić)"},{"type":"bullet","text":"Krok 2: Zidentyfikuj potencjalne sposoby awarii (failure modes) - co może pójść nie tak"},{"type":"bullet","text":"Krok 3: Dla każdej awarii określ skutki (effects) i ich dotkliwość S (Severity) 1-10"},{"type":"bullet","text":"Krok 4: Zidentyfikuj przyczyny awarii i ocen prawdopodobieństwo wystąpienia O (Occurrence) 1-10"},{"type":"bullet","text":"Krok 5: Oceń skuteczność obecnych kontroli w wykrywaniu awarii - D (Detection) 1-10 (UWAGA: 10 = słaba wykrywalność!)"},{"type":"bullet","text":"Krok 6: Policz RPN = S × O × D (zakres 1-1000)"},{"type":"bullet","text":"Krok 7: Priorytetyzuj awarie wg RPN, zaplanuj działania korygujące"},{"type":"bullet","text":"Krok 8: Po wdrożeniu działań - ponowna ocena RPN, powtarzaj"},{"type":"para","text":"Uwaga: od ok. 2019 r. AIAG i VDA promują nowe podejście 'AIAG-VDA FMEA' z działaniem priorytetowym AP (Action Priority) zamiast samego RPN."}]},{"id":"2.4","title":"Porter - 5 sił w szczegółach","blocks":[{"type":"para","text":"To klasyczne pytanie. Wyjaśnienie każdej z sił:"},{"type":"bullet","text":"Rywalizacja między konkurentami w branży - siła głównego pola walki. Wysoka gdy: wielu równych graczy, niski wzrost branży, wysokie koszty stałe (presja na wykorzystanie mocy), brak zróżnicowania produktów, wysokie bariery wyjścia."},{"type":"bullet","text":"Zagrożenie wejściem nowych graczy - zależy od barier wejścia (kapitał, skala, lojalność marki, dostęp do kanałów dystrybucji, regulacje, ekonomia skali)."},{"type":"bullet","text":"Siła przetargowa dostawców - wysoka gdy: mało dostawców vs wielu kupujących, brak substytutów surowców, koszty zmiany dostawcy, dostawca może się zintegrować w przód (forward integration)."},{"type":"bullet","text":"Siła przetargowa nabywców - wysoka gdy: mało dużych kupujących, produkt niezróżnicowany, niskie koszty zmiany, kupujący mogą się zintegrować wstecz (backward integration), produkt stanowi duży % ich kosztów."},{"type":"bullet","text":"Zagrożenie substytutami - wysokie gdy: istnieją produkty zaspokajające tę samą potrzebę, niskie koszty przełączenia, lepsza cena/jakość substytutów."},{"type":"para","text":"Szósta siła (nieoryginalna u Portera, dodana później): komplementy / ekosystem - gracze, których oferta zwiększa wartość naszej (np. twórcy gier dla konsol)."}]},{"id":"2.5","title":"Business Model Canvas - 9 bloków w kolejności","blocks":[{"type":"para","text":"Klasyczne Business Model Canvas Osterwaldera i Pigneura (2010, 'Business Model Generation'). Zalecana kolejność wypełniania:"},{"type":"bullet","text":"1. CUSTOMER SEGMENTS (segmenty klientów) - dla kogo tworzymy wartość?"},{"type":"bullet","text":"2. VALUE PROPOSITION (propozycja wartości) - jaką wartość dostarczamy?"},{"type":"bullet","text":"3. CHANNELS (kanały) - jak dostarczamy wartość do klienta?"},{"type":"bullet","text":"4. CUSTOMER RELATIONSHIPS (relacje z klientami) - jak utrzymujemy relację?"},{"type":"bullet","text":"5. REVENUE STREAMS (strumienie przychodów) - za co klient płaci?"},{"type":"bullet","text":"6. KEY RESOURCES (kluczowe zasoby) - czego potrzebujemy?"},{"type":"bullet","text":"7. KEY ACTIVITIES (kluczowe działania) - co musimy robić?"},{"type":"bullet","text":"8. KEY PARTNERS (kluczowi partnerzy) - kto nam pomaga?"},{"type":"bullet","text":"9. COST STRUCTURE (struktura kosztów) - jaka jest struktura kosztów?"},{"type":"para","text":"Lewa strona canvasu = efektywność (KP, KA, KR, CS - koszty). Prawa strona = wartość (CS - segmenty, CR, CH, RS - przychody). W centrum: Value Proposition."}]},{"id":"2.6","title":"Style przywództwa sytuacyjne Hersey-Blanchard","blocks":[{"type":"para","text":"Model SLII (Situational Leadership II) - cztery style, dopasowane do 4 poziomów dojrzałości pracownika:"},{"type":"bullet","text":"D1 (niska dojrzałość - entuzjastyczny początkujący, 'niezdolny ale chętny') → STYL S1: DYREKTYWNY (telling / directing) - dużo instrukcji, mało wsparcia."},{"type":"bullet","text":"D2 (rozczarowany uczący się, 'niezdolny i niechętny') → STYL S2: TRENERSKI (selling / coaching) - dużo instrukcji i dużo wsparcia."},{"type":"bullet","text":"D3 (zdolny ale ostrożny, 'zdolny ale niechętny') → STYL S3: WSPIERAJĄCY (participating / supporting) - mało instrukcji, dużo wsparcia."},{"type":"bullet","text":"D4 (dojrzały, 'zdolny i chętny') → STYL S4: DELEGUJĄCY (delegating) - mało instrukcji, mało wsparcia, pełna autonomia."},{"type":"para","text":"Kluczowe: to NIE pracownik ogólnie, tylko jego poziom dojrzałości DO KONKRETNEGO ZADANIA. Ten sam człowiek może być D4 w Excelu i D1 w Pythonie."}]},{"id":"2.7","title":"Teorie motywacji - zestawienie porównawcze","blocks":[{"type":"para","text":"Najważniejsze teorie które mogą paść pytań dodatkowych:"},{"type":"bullet","text":"MASLOW (1943, 1954) - hierarchia potrzeb: 5 poziomów (fizjo → bezpieczeństwo → przynależność → uznanie → samoaktualizacja). Teoria TREŚCI (co motywuje)."},{"type":"bullet","text":"HERZBERG (1959) - dwuczynnikowa: higiena (brak demotywuje: płaca, warunki, polityka firmy) vs motywatory (tworzą motywację: osiągnięcia, uznanie, rozwój, odpowiedzialność). Teoria TREŚCI."},{"type":"bullet","text":"ALDERFER (1969) - ERG: zredukował Maslowa do 3 kategorii - Existence, Relatedness, Growth. Teoria TREŚCI."},{"type":"bullet","text":"MCCLELLAND (1961) - potrzeby wyuczone: potrzeba osiągnięć (nAch), władzy (nPow), przynależności (nAff). Teoria TREŚCI."},{"type":"bullet","text":"MCGREGOR (1960) - teorie X (ludzie leniwi, trzeba ich przymuszać) i Y (ludzie lubią pracę, trzeba im dać autonomię). Teoria założeń o naturze człowieka."},{"type":"bullet","text":"VROOM (1964) - oczekiwań (expectancy): motywacja = Expectancy × Instrumentality × Valence. Teoria PROCESU (jak motywujemy)."},{"type":"bullet","text":"LOCKE (1968) - wyznaczania celów: konkretne, trudne ale osiągalne cele motywują lepiej niż ogólne. Źródło SMART."},{"type":"bullet","text":"ADAMS (1965) - sprawiedliwości (equity theory): porównujemy swój wkład/wynagrodzenie do innych. Poczucie niesprawiedliwości demotywuje."},{"type":"bullet","text":"DECI & RYAN (1985) - samodeterminacji (SDT): motywacja autonomiczna vs kontrolowana; 3 podstawowe potrzeby: autonomia, kompetencja, relacje. Naukowa podbudowa dla Pinka."},{"type":"bullet","text":"PINK (2009) - syntetyzując SDT: autonomia + mistrzostwo + cel jako kluczowe motywatory w pracy kreatywnej."}]},{"id":"2.8","title":"Cykl koniunkturalny - cykle wg czasu trwania","blocks":[{"type":"para","text":"Klasyfikacja cykli - komisja może pytać:"},{"type":"bullet","text":"Kitchina (1923) - cykle zapasów, 3-5 lat, wynikające z wahań zapasów handlowych."},{"type":"bullet","text":"Juglara (1862) - cykle inwestycji, 7-11 lat, związane z inwestycjami w maszyny i urządzenia."},{"type":"bullet","text":"Kuznetsa (1930) - cykle inwestycji budowlanych, 15-25 lat, migracje, demografia."},{"type":"bullet","text":"Kondratiewa (1925) - długie fale, 40-60 lat, związane z przełomowymi innowacjami (parowy, elektryczność, komputeryzacja, AI?)."},{"type":"para","text":"Wyjaśnienie popularne: Schumpeter 'Business Cycles' (1939) - zsyntetyzował te cykle i dodał schumpeterowską teorię innowacji (twórcza destrukcja)."}]},{"id":"2.9","title":"PDCA - cykl Deminga (wł. Shewharta-Deminga)","blocks":[{"type":"para","text":"Bardzo ważne uściślenie autorstwa:"},{"type":"bullet","text":"Cykl 'PDCA' (Plan-Do-Check-Act) - popularnie nazywany 'cyklem Deminga', ale sam Deming podkreślał, że nauczył się go od Shewharta i nazywał go 'cyklem Shewharta'."},{"type":"bullet","text":"Sam Deming w latach 50. mówił o cyklu PDCA, ale od lat 80. propagował wariant PDSA (Plan-Do-Study-Act) - słowo 'Study' (studiuj, analizuj) zamiast 'Check' (sprawdzaj), ponieważ sprawdzanie jest powierzchowne, studiowanie wymaga głębokiej analizy."},{"type":"bullet","text":"W literaturze zarządzania dominuje wersja PDCA, w pracach samego Deminga od lat 80. - PDSA."}]}],"control_questions":{"ogolne":[{"q":"Wymień i krótko scharakteryzuj 4 fazy cyklu koniunkturalnego.","a":"**(1) Ożywienie** (ekspansja) - rośnie produkcja, spada bezrobocie, rosną inwestycje i konsumpcja. **(2) Szczyt** (boom) - maksimum aktywności, ale pojawiają się napięcia inflacyjne i wąskie gardła. **(3) Recesja** (kryzys) - produkcja spada, rośnie bezrobocie, pogarszają się oczekiwania. **(4) Dno** (depresja) - najniższy punkt, po którym następuje stopniowa odbudowa. Cykl trwa zwykle 5-10 lat (cykl Juglara)."},{"q":"Czym różni się recesja od depresji gospodarczej?","a":"**Recesja** to **łagodniejszy** i **krótszy** spadek aktywności gospodarczej - definicyjnie 2 kolejne kwartały ujemnego wzrostu PKB. Trwa zwykle 6-18 miesięcy, spadek PKB rzędu kilku procent. **Depresja** to **głęboka i długotrwała recesja** - spadek PKB powyżej 10%, bezrobocie 20%+, trwa kilka lat. Klasyczny przykład: Wielki Kryzys 1929-1933. Współcześnie depresji unika się dzięki interwencji banków centralnych (FED, EBC) i polityce fiskalnej."},{"q":"Co to są automatyczne stabilizatory koniunktury? Podaj 2 przykłady.","a":"**Automatyczne stabilizatory** to mechanizmy fiskalne, które **bez decyzji rządu** samoczynnie łagodzą wahania cyklu. **Przykład 1**: progresywny system podatkowy - w recesji niższe dochody → niższe podatki → więcej pieniędzy w kieszeniach (podtrzymanie popytu). **Przykład 2**: zasiłki dla bezrobotnych - rosną w recesji, podtrzymują konsumpcję. Plus: natychmiastowe działanie bez opóźnień politycznych. Minus: nie eliminują problemu, tylko łagodzą."},{"q":"Jakie są główne uwarunkowania rynku pracy w Polsce w 2026 r.?","a":"**Demograficzne**: starzejące się społeczeństwo, niska dzietność, drenaż mózgów. **Ekonomiczne**: niemal pełne zatrudnienie (~5% bezrobocia), wysoka presja płacowa, inflacja płac. **Migracyjne**: ok. 1 mln pracowników z Ukrainy, ich integracja i potencjalny powrót po wojnie. **Technologiczne**: automatyzacja i AI eliminują rutynowe stanowiska, rośnie popyt na IT, analitykę, ESG. **Społeczne**: praca hybrydowa standardem, work-life balance, młode pokolenia żądają sensu pracy."},{"q":"Czym różni się bezrobocie strukturalne od frykcyjnego?","a":"**Bezrobocie frykcyjne** to krótkotrwałe (tygodnie/miesiące) bezrobocie wynikające z naturalnej rotacji - zmiana pracy, absolwenci szukający pierwszej posady, przeprowadzki. Jest nieuniknione i nawet pożądane (lepsze dopasowanie). **Bezrobocie strukturalne** wynika z **niedopasowania kwalifikacji** do potrzeb rynku - automatyzacja eliminuje stare zawody, powstają nowe wymagające innych umiejętności. Trwa lata, wymaga przekwalifikowania. Razem tworzą **naturalną stopę bezrobocia** (NAIRU) - poziom, poniżej którego nie da się zejść bez wywołania inflacji."},{"q":"Co to jest gig economy i jakie niesie wyzwania?","a":"**Gig economy** to model gospodarki oparty na **krótkoterminowych zleceniach** zamiast stałego zatrudnienia - kierowca Uber, kurier Glovo, freelancer na Upwork. Pracownik łączy kilka źródeł dochodu, elastyczność czasu. **Wyzwania**: brak ochrony socjalnej (ubezpieczenie, urlop, emerytura), brak stabilności dochodu, samodzielne koszty (sprzęt, paliwo), brak ścieżki kariery, **platform capitalism** - algorytmy decydują o stawkach. UE wprowadza dyrektywę o pracownikach platformowych (2024) - domniemanie zatrudnienia."},{"q":"Wymień formy organizacyjno-prawne w Polsce wg Kodeksu spółek handlowych.","a":"**Spółki osobowe** (bez osobowości prawnej): **(1)** jawna - wszyscy odpowiadają majątkiem osobistym; **(2)** partnerska - dla wolnych zawodów (lekarze, prawnicy); **(3)** komandytowa - komplementariusz (pełna odpowiedzialność) + komandytariusz (do sumy komandytowej); **(4)** komandytowo-akcyjna - hybryda. **Spółki kapitałowe** (osobowość prawna): **(5)** sp. z o.o. - kapitał 5 tys. zł; **(6)** prosta spółka akcyjna (PSA) - od 2021, kapitał 1 zł, dla startupów; **(7)** spółka akcyjna (S.A.) - kapitał 100 tys. zł, możliwość emisji giełdowej. Plus: jednoosobowa działalność gospodarcza (JDG, w CEIDG, poza KSH)."},{"q":"Jaka jest różnica między sp. z o.o. a prostą spółką akcyjną (PSA)?","a":"**Sp. z o.o.** - **kapitał minimum 5.000 zł**, udziały o wartości nominalnej, klasyczna forma dla MŚP. Trudniej dzielić udziały, wkłady tylko pieniężne lub rzeczowe. **PSA** (od 2021) - **kapitał 1 zł**, akcje **bez wartości nominalnej** (łatwe dzielenie i emisje), wkłady mogą być **pracą lub usługami** (np. CTO zamiast pieniędzy wnosi 6 miesięcy pracy). Elektroniczna rejestracja, akcjonariat prowadzony przez dom maklerski. PSA jest stworzona dla **startupów** - łatwe ESOPy, runda inwestycyjna, exit."},{"q":"Zdefiniuj zrównoważony rozwój (definicja Brundtland).","a":"Zrównoważony rozwój (sustainable development) to **rozwój zaspokajający potrzeby obecnego pokolenia bez ograniczania możliwości zaspokojenia potrzeb przyszłych pokoleń**. Definicja z raportu Komisji Brundtland 'Our Common Future' (1987) - przewodniczyła jej premier Norwegii Gro Harlem Brundtland. Raport powstał na zlecenie ONZ, stał się fundamentem polityki klimatycznej i koncepcji ESG."},{"q":"Co to są 3 filary zrównoważonego rozwoju i 17 celów SDG?","a":"**3 filary** (Triple Bottom Line): **(1) Ekonomiczny** - efektywny i stabilny wzrost; **(2) Społeczny** - sprawiedliwość, jakość życia, równość szans; **(3) Środowiskowy** - ochrona zasobów, klimatu, bioróżnorodności. **17 celów SDG** (Sustainable Development Goals, Agenda 2030 ONZ): m.in. **SDG 1** Koniec ubóstwa; **SDG 4** Dobra edukacja; **SDG 5** Równość płci; **SDG 7** Czysta energia; **SDG 8** Wzrost gospodarczy i godna praca; **SDG 11** Zrównoważone miasta; **SDG 13** Działania klimatyczne; **SDG 17** Partnerstwa."},{"q":"Wymień i krótko scharakteryzuj 5 głównych instytucji UE.","a":"**(1) Komisja Europejska** (KE) - 27 komisarzy, **inicjatywa ustawodawcza**, strażnik traktatów. **(2) Parlament Europejski** (PE) - 720 deputowanych wybieranych co 5 lat, uchwala prawo z Radą. **(3) Rada Unii Europejskiej** - ministrowie państw (różne składy: ECOFIN, JHA), współuchwala prawo. **(4) Rada Europejska** - szefowie państw/rządów, **wyznacza kierunki strategiczne** (nie uchwala prawa). **(5) Trybunał Sprawiedliwości UE** (TSUE) - interpretuje prawo UE, rozstrzyga spory. Dodatkowo: EBC (euro), ETO (kontrola finansów), Komitet Regionów."},{"q":"Czym różni się Rada Europejska od Rady UE?","a":"Najczęściej mylone instytucje! **Rada Europejska** = **szefowie państw/rządów** (premierzy, prezydenci) + przewodniczący (António Costa) + przewodniczący KE. Spotyka się 4 razy w roku, **wyznacza kierunki strategiczne**, ale nie uchwala prawa. **Rada Unii Europejskiej** (Rada Ministrów) = **ministrowie poszczególnych krajów** (różne składy: ECOFIN dla finansów, JHA dla wymiaru sprawiedliwości). **Uchwala prawo UE** wspólnie z Parlamentem Europejskim. Trzeci, jeszcze inny organ: **Rada Europy** - NIE jest organem UE, to organizacja praw człowieka (Strasbourg)."},{"q":"Podaj kryteria MŚP wg definicji UE (liczba osób, obrót).","a":"Definicja UE (Rozporządzenie 651/2014): **MŚP** = **mniej niż 250 pracowników** ORAZ obrót **<= 50 mln euro** lub suma bilansowa <= 43 mln euro. **3 kategorie**: **Mikro** - <10 pracowników, obrót/bilans <=2 mln euro; **Małe** - <50 pracowników, obrót/bilans <=10 mln euro; **Średnie** - <250 pracowników, obrót <=50 mln euro lub bilans <=43 mln euro. W Polsce **99,8% firm** to MŚP, generują **~50% PKB** i zatrudniają ~70% pracowników."},{"q":"Jakie wsparcie ma sektor MŚP w Polsce?","a":"**PARP** (Polska Agencja Rozwoju Przedsiębiorczości) - dotacje i programy: FENG (innowacje), POIR (B+R), bony na cyfryzację, wsparcie eksportu, Akademia Menadżera MŚP. **BGK** (Bank Gospodarstwa Krajowego) - pożyczki preferencyjne, gwarancje de minimis. **Fundusze UE** - KPO (60 mld euro), Fundusze Strukturalne. **Inkubatory i akceleratory** - dla startupów (np. Huge Thing, ReaktorX). **Ulgi podatkowe**: ulga B+R, IP Box, estoński CIT. **Wsparcie sukcesji** dla firm rodzinnych."},{"q":"Na czym polega polityka fiskalna ekspansywna i restrykcyjna?","a":"**Ekspansywna**: **zwiększanie wydatków publicznych** lub **obniżanie podatków** - stosowana w recesji w celu **pobudzenia popytu**. Generuje deficyt budżetowy. Mechanizm: rząd wydaje → ludzie mają więcej pieniędzy → konsumują → rośnie PKB (efekt mnożnika Keynesa). **Restrykcyjna**: ograniczanie wydatków lub podnoszenie podatków - stosowana w boomie w celu **schłodzenia gospodarki** i ograniczenia inflacji. Dążenie do nadwyżki budżetowej. W UE obowiązuje Pakt Stabilności i Wzrostu - deficyt <3% PKB, dług <60% PKB."},{"q":"Co to jest mnożnik fiskalny i efekt wypierania?","a":"**Mnożnik fiskalny** (Keynes) pokazuje, że jednostkowy wzrost wydatków publicznych zwiększa PKB o **więcej niż jedną jednostkę** - bo pieniądze krążą w gospodarce. Wzór: 1/(1-MPC), gdzie MPC = krańcowa skłonność do konsumpcji. **Efekt wypierania** (crowding out) - negatywny skutek: gdy rząd zaciąga dług, zwiększa popyt na pieniądz → rosną stopy procentowe → drożeje kredyt → firmy prywatne ograniczają inwestycje. Wydatki publiczne 'wypychają' prywatne inwestycje. Najsilniejszy przy pełnym zatrudnieniu, słabszy w recesji."},{"q":"Wymień 3 najważniejsze przyczyny upadłości przedsiębiorstw.","a":"**(1) Problemy z płynnością** - firma rentowna księgowo, ale brak gotówki na bieżące zobowiązania. Klasyczny zabójca biznesu - 'firma umarła z głodu'. **(2) Słabe zarządzanie** - brak strategii, błędne decyzje, niedoświadczenie, nepotyzm, konflikty w zarządzie. **(3) Czynniki zewnętrzne** - kryzysy (2008, COVID), wojny, zmiany prawne, technologiczne (digital disruption), rosnące koszty (energia, surowce). Mniej istotne: zbyt szybka ekspansja, nadmierne zadłużenie, jeden duży klient (single-customer risk)."},{"q":"Podaj wzór Z-score Altmana i zinterpretuj wartość 1,5.","a":"**Z = 1,2×X1 + 1,4×X2 + 3,3×X3 + 0,6×X4 + 1,0×X5**, gdzie: X1=kapitał obrotowy/aktywa, X2=zysk zatrzymany/aktywa, X3=EBIT/aktywa, X4=kapitalizacja/zobowiązania, X5=sprzedaż/aktywa. **Interpretacja**: **Z > 2,99** - strefa bezpieczna; **Z 1,81-2,99** - strefa szara (niepewność); **Z < 1,81** - strefa zagrożenia. **Wartość 1,5** = **strefa zagrożenia** - wysokie ryzyko upadłości w ciągu 2 lat. Firma wymaga natychmiastowej restrukturyzacji finansowej, redukcji długu, poprawy płynności."},{"q":"Jakie są specyficzne wyzwania zarządzania małą firmą?","a":"**Dominacja właściciela** - wszystkie decyzje na jednej osobie, ryzyko wąskiego gardła i wypalenia. **Ograniczone zasoby** - brak działu HR, prawnego, marketingu (jedna osoba robi wszystko). **Finansowanie** - banki niechętnie kredytują (brak zabezpieczeń), ograniczony kapitał własny. **Profesjonalizacja** - przejście od 'zarządzania rodziną' do procedur i delegowania. **Cyfryzacja** - mała firma musi mieć ERP, CRM, e-commerce. **Sukcesja** - 70% polskich firm rodzinnych szuka następcy. **Kadry** - trudność konkurowania z korporacjami o talenty."},{"q":"Czym jest pułapka średniego dochodu?","a":"**Pułapka średniego dochodu** (middle income trap) - sytuacja, gdy kraj rozwijający się **dochodzi do średniego poziomu PKB per capita** (10-15 tys. USD), ale **nie potrafi przejść do kategorii krajów wysoko rozwiniętych**. Powody: stracona przewaga niskich kosztów pracy (przegrywa z biedniejszymi), niewystarczające innowacje (przegrywa z bogatszymi). **Polska** ma PKB per capita ~22 tys. USD - formalnie wyszliśmy z pułapki, ale wyzwania zostają: niskie nakłady na R&D (1,4% PKB, cel 3%), drenaż mózgów, niska produktywność. Sposoby ucieczki: edukacja STEM, instytucje, polityka przemysłowa. Sukces: Korea Płd., Tajwan; porażka: Argentyna, Brazylia."},{"q":"Co to jest KPO i czego dotyczy?","a":"**KPO** = **Krajowy Plan Odbudowy i Zwiększania Odporności** - polski plan inwestycyjny finansowany z funduszu **NextGenerationEU** (powstał po pandemii COVID-19). **Budżet**: ok. **60 mld euro** (35 mld w grantach + 25 mld w pożyczkach). **5 obszarów**: (1) Odporność i konkurencyjność gospodarki; (2) **Zielona energia** i ograniczenie emisji; (3) **Transformacja cyfrowa**; (4) Skuteczność, dostępność i jakość systemu ochrony zdrowia; (5) Zielona, inteligentna mobilność. Wdrażany do 2026 r. Środki uzależnione od reform praworządności (kamienie milowe)."},{"q":"Wyjaśnij macierz BCG - 4 pola i rekomendacje strategiczne.","a":"**2 osie**: tempo wzrostu rynku × względny udział w rynku. **4 pola**: **(1) Gwiazdy** (wysoki wzrost + wysoki udział) - rosną, wymagają inwestycji; strategia: **inwestuj agresywnie**. **(2) Dojne krowy** (niski wzrost + wysoki udział) - generują gotówkę; strategia: **doj, utrzymuj pozycję**. **(3) Znaki zapytania** (wysoki wzrost + niski udział) - dylemat; strategia: **decyzja** - inwestować (próba zostania gwiazdą) lub wycofać. **(4) Psy** (niski wzrost + niski udział) - bez perspektyw; strategia: **likwidacja lub harvest**. Klasyczna ścieżka: Znak Zapytania → Gwiazda → Dojna Krowa → Pies."},{"q":"Opisz cykl kontrolowania - 4 etapy.","a":"**(1) Ustalenie standardów** - określenie celów, KPI, benchmarków (np. produktywność 100 jednostek/godz., satysfakcja klienta >85%). **(2) Pomiar rzeczywistej wydajności** - zbieranie danych przez systemy IT, raporty, obserwację. **(3) Porównanie z standardami** - analiza odchyleń (wariancji), identyfikacja przyczyn (Pareto, Ishikawa). **(4) Działania korygujące** - jeśli odchylenia istotne: korekta procesów, szkolenia, zmiana zasobów, modyfikacja standardów. Cykl się **powtarza** - to pętla feedbacku. Stosowane w cyklach PDCA, OKR, BSC."},{"q":"Czym różni się kontrola wstępna, bieżąca i następcza?","a":"**Wstępna** (feedforward, ex ante) - **przed rozpoczęciem** działania. Sprawdzanie zasobów, procedur, kompetencji. Przykład: audyt jakości surowców przed produkcją, screening kandydatów do pracy. **Bieżąca** (concurrent, in-process) - **w trakcie** działania. Korekta w czasie rzeczywistym. Przykład: karty kontrolne Shewharta na linii produkcyjnej, supervisor obserwujący pracę. **Następcza** (feedback, ex post) - **po zakończeniu** działania. Ocena wyników, lessons learned. Przykład: audyt finansowy, retrospektywa projektu, badanie satysfakcji klienta. Najlepiej kombinować wszystkie 3 typy."},{"q":"Wymień 4 fazy cyklu życia produktu i strategie dla każdej.","a":"**(1) Wprowadzenie** - niska sprzedaż, straty, edukacja rynku. Strategia: **skimming** (wysoka cena, np. iPhone) lub **penetration** (niska cena, np. Netflix). **(2) Wzrost** - szybka sprzedaż, pierwsi zyski, pojawia się konkurencja. Strategia: rozwój produktu, dystrybucja, marka. **(3) Dojrzałość** - stabilna sprzedaż, ostra konkurencja cenowa, max zysk, faza najdłuższa. Strategia: różnicowanie, modyfikacje, programy lojalnościowe. **(4) Schyłek** - spadek sprzedaży, decyzja: **harvest** (doj, bez inwestycji) lub **divest** (sprzedaż/likwidacja) lub **revival** (rebranding)."},{"q":"Co to są innowatorzy i early adopters (Rogers)?","a":"Z modelu **dyfuzji innowacji** Everetta Rogersa (1962) - rozkład normalny adopcji nowości w społeczeństwie. **Innowatorzy** (2,5%) - pionierzy, akceptują wysokie ryzyko, kupują pierwsi (early Tesla buyers, beta testerzy). **Early adopters** (13,5%) - **liderzy opinii** (opinion leaders), influencerzy, kluczowi dla sukcesu - jeśli zaakceptują, większość pójdzie za nimi. **Następne grupy**: early majority (34%), late majority (34%), laggards (16%). **Chasm** (Geoffrey Moore) - przepaść między early adopters a early majority - tu ginie 70% produktów technologicznych. Strategia: skupić się na early adopters, używać ich jako case studies."},{"q":"Wymień rodzaje inflacji wg tempa.","a":"**(1) Pełzająca** - <5% rocznie, akceptowalna, nie zaburza decyzji ekonomicznych. Cel NBP: 2,5% ±1 p.p. **(2) Krocząca/umiarkowana** - 5-10% rocznie, niepokojąca, wymaga interwencji banku centralnego. **(3) Galopująca** - 10-100% rocznie, dezorganizuje gospodarkę, ucieka się od pieniądza do aktywów rzeczowych. Polska 1989: 250%. **(4) Hiperinflacja** - >100% miesięcznie (Cagan), załamanie monetarne, pieniądz traci funkcje. Klasyczne: Niemcy 1923 (ceny podwajały się co 4 dni), Zimbabwe 2008 (banknot 100 bilionów dolarów), Wenezuela 2018."},{"q":"Jaki jest cel inflacyjny NBP?","a":"**Cel inflacyjny NBP**: **2,5% ±1 p.p.** (czyli przedział 1,5-3,5%) mierzony wskaźnikiem CPI (Consumer Price Index) w skali rok do roku. Cel został zdefiniowany przez **Radę Polityki Pieniężnej** (RPP). Cel zakłada małą, dodatnią inflację - bo deflacja jest niebezpieczna (odkładanie zakupów, recesja). Polska 2022-2023 była daleko od celu (inflacja CPI >16%), RPP podnosiła stopy procentowe do 6,75%. W 2024-2025 inflacja stopniowo spada w stronę celu. Większość banków centralnych ma cel 2% (FED, EBC)."},{"q":"Co to jest błąd I i II rodzaju w statystyce?","a":"**Błąd I rodzaju (α)** - **odrzucenie prawdziwej H0** (false positive). Powiedzieliśmy, że jest efekt, choć go nie ma. Przykład: testujemy lek - test sugeruje skuteczność, choć lek nie działa. Kontrolowany przez poziom istotności (zwykle α=0,05). **Błąd II rodzaju (β)** - **nieodrzucenie fałszywej H0** (false negative). Powiedzieliśmy, że nie ma efektu, choć jest. Przykład: lek działa, ale test tego nie wykrył. Trudniejszy do kontrolowania - zależy od mocy testu (1-β), wielkości próby, effect size. **Trade-off**: zmniejszając α, zwiększamy β. Trzeba balansować zależnie od konsekwencji."},{"q":"Zdefiniuj p-value (poprawnie, nie popularnie!).","a":"**P-value** to **prawdopodobieństwo zaobserwowania danych co najmniej tak ekstremalnych jak te otrzymane w próbie, PRZY ZAŁOŻENIU że hipoteza zerowa jest prawdziwa**. Formalnie: P(dane | H0), **NIE** P(H0 | dane). **Częste BŁĘDNE interpretacje**: 'p-value to prawdopodobieństwo że H0 jest prawdziwa' - NIE. 'Jeśli p<0,05, efekt jest realny' - NIE. 'p<0,05 = 95% pewności H1' - NIE. Niska p-value mówi tylko, że obserwacja jest mało prawdopodobna pod H0, nie mówi nic o prawdopodobieństwie samej hipotezy. ASA wydała oficjalne ostrzeżenie w 2016 r. przed nadużywaniem p-value."}],"kierunkowe":[{"q":"Wymień klasyczne i współczesne paradygmaty zarządzania.","a":"**Klasyczne**: (1) **Naukowy** - Taylor 1911 (one best way, normy czasowe); (2) **Administracyjny** - Fayol (14 zasad, 5 funkcji); (3) **Biurokratyczny** - Weber (hierarchia, procedury). **Behawioralny**: (4) **Stosunki międzyludzkie** - Mayo (Hawthorne 1924-1932), Maslow, Herzberg. **Systemowy**: (5) Bertalanffy 1950 - organizacja jako system otwarty. **Sytuacyjny**: (6) Fiedler, Lawrence-Lorsch - 'nie ma jednego najlepszego sposobu'. **Strategiczny**: (7) Porter, Ansoff. **Zasobowy** (RBV): (8) Barney 1991. **Sieciowy**: (9) outsourcing, alianse. **Oparty na wiedzy**: (10) Nonaka, Drucker. **Zwinny/agile**: (11) Scrum, Kanban, turkusowy (Laloux)."},{"q":"Co to jest VUCA i BANI?","a":"**VUCA** (US Army War College, lata 80.): **V**olatility (zmienność), **U**ncertainty (niepewność), **C**omplexity (złożoność), **A**mbiguity (niejednoznaczność). Opisał świat **post-zimnej wojny** - globalizacja, internet. **BANI** (Jamais Cascio 2020, po pandemii): **B**rittle (kruchy - systemy łatwo się załamują), **A**nxious (lękowy - powszechny niepokój), **N**onlinear (nieliniowy - małe przyczyny → wielkie skutki), **I**ncomprehensible (niezrozumiały - logika zawodzi). BANI lepiej opisuje obecny świat: AI, klimat, wojny, kryzysy łańcuchów dostaw. Reakcja: agility, scenariusze, resilience."},{"q":"Wyjaśnij JIT (Just In Time) - na przykładzie Toyoty.","a":"**JIT** (Just In Time) - filozofia produkcji opracowana w Toyocie (Taiichi Ohno, lata 50.-70.). Idea: produkcja **dokładnie wtedy, gdy potrzeba** i **w ilości jakiej potrzeba** - eliminacja zapasów. **Mechanizm Toyoty**: gdy klient zamówi auto, sygnał (kanban) idzie do montażu → dział silników → dostawcy części. Działa **na zasadzie ssania** (pull), nie pchania (push). **Wymaga**: stabilnych dostawców, jakości na każdym etapie (jedna wada = zatrzymanie linii), zaangażowania pracowników (autonomation/jidoka). **Korzyści**: minimalne zapasy, szybkie wykrywanie problemów. **Ryzyko**: zakłócenia łańcucha dostaw (jak w pandemii - kryzys półprzewodników 2021)."},{"q":"Czym jest franchising - role franchisora i franchisee.","a":"**Franchising** to system biznesowy, w którym **franchisor** (dawca licencji, np. McDonald's) udziela **franchisee** (biorcy, lokalnemu przedsiębiorcy) **prawa do korzystania z marki, know-how, systemu operacyjnego** w zamian za opłaty. **Franchisor**: zapewnia markę, technologię, szkolenia, marketing, jakość; pobiera opłatę wstępną (np. 250 tys. zł dla KFC) + royalty (5-10% obrotu) + opłatę marketingową. **Franchisee**: inwestuje własny kapitał (lokal, wyposażenie), zarządza lokalnie, dotrzymuje standardów, dzieli zyski. **Korzyści**: szybka ekspansja bez kapitału (franchisor), gotowy biznes (franchisee). **Przykłady**: McDonald's, KFC, Żabka, Subway."},{"q":"Wymień 7 typów marnotrawstwa TIMWOOD.","a":"**TIMWOOD** - 7 strat (muda) w Lean Management zidentyfikowane przez Taiichi Ohno: **T**ransportation (transport zbędny materiałów), **I**nventory (zapasy - zamrożony kapitał), **M**otion (ruch zbędny pracowników, np. szukanie narzędzi), **W**aiting (czekanie na materiały, decyzje, maszyny), **O**verproduction (**nadprodukcja - NAJGORSZA**, generuje pozostałe straty), **O**verprocessing (nadmierne procesowanie ponad potrzeby klienta), **D**efects (wady, braki, poprawki). **8. strata** (TIMWOODS): **S**kills - niewykorzystany potencjał ludzi. Cel Lean: ciągła eliminacja muda + mura (nierównomierność) + muri (przeciążenie)."},{"q":"Czym jest 5S i co oznacza każde S?","a":"**5S** - japońska metoda organizacji miejsca pracy (Toyota Production System). **(1) Seiri** (Sortowanie) - usuń niepotrzebne rzeczy. **(2) Seiton** (Systematyka) - poukładaj potrzebne rzeczy logicznie ('miejsce dla każdej rzeczy, każda rzecz na swoim miejscu'). **(3) Seiso** (Sprzątanie) - utrzymuj czystość, sprzątanie = inspekcja. **(4) Seiketsu** (Standaryzacja) - ustal normy dla pierwszych 3S (np. kolory taśm na podłodze). **(5) Shitsuke** (Samodyscyplina) - utrzymuj system stale, audyty, ciągłe doskonalenie. **Korzyści**: bezpieczeństwo, produktywność, jakość, redukcja muda. Często rozszerzane do **6S** (+Safety) lub **7S** (+Spirit)."},{"q":"Wymień 4 rodzaje kosztów wg klasyfikacji reakcji na produkcję.","a":"Klasyfikacja kosztów wg **reakcji na zmiany wielkości produkcji**: **(1) Stałe** (fixed) - nie zmieniają się z produkcją w danym okresie (czynsz, amortyzacja, pensje stałe). **(2) Zmienne** (variable) - rosną proporcjonalnie z produkcją (surowce, energia produkcyjna, prowizje). **(3) Mieszane/półzmienne** (semi-variable) - część stała + część zmienna (rachunek za telefon: abonament + minuty). **(4) Skokowe/stopniowe** (step costs) - stałe w przedziałach, skokowo rosną po przekroczeniu progu (najem dodatkowego magazynu po przekroczeniu wolumenu). **Uwaga**: w długim okresie wszystkie koszty są zmienne."},{"q":"Co to jest Activity-Based Costing i czemu służy?","a":"**ABC** (Activity-Based Costing) - rachunek kosztów działań (Cooper & Kaplan 1988). **Cel**: dokładniejsze przypisanie **kosztów pośrednich** do produktów. **Tradycyjny** rachunek dzieli koszty pośrednie według prostego klucza (np. roboczogodziny) - zniekształca koszty, proste produkty 'subsydiowane' przez złożone. **ABC**: koszty pośrednie przypisywane do **konkretnych działań** (obsługa klienta, kontrola jakości, transport), a następnie do produktów według **rzeczywistego zużycia**. **Korzyści**: dokładniejsze ceny, lepsze decyzje produkt mix, identyfikacja nieefektywności. **Wady**: drogi we wdrożeniu, skomplikowany. Stosowany głównie tam, gdzie koszty pośrednie >50% i portfolio jest złożone."},{"q":"Podaj wzór BEP i wyjaśnij marżę pokrycia.","a":"**BEP** (Break-Even Point, próg rentowności) - poziom sprzedaży, przy którym **zysk = 0**. **Wzór**: **BEP (sztuk) = Koszty Stałe / (Cena - Koszt Zmienny jednostkowy) = KS / (C - KZj)**. **BEP wartościowy = KS / wskaźnik marży pokrycia**. **Marża pokrycia jednostkowa** (unit contribution margin) = **Cena - Koszt Zmienny jednostkowy** = część ceny, która 'pokrywa' koszty stałe i zysk. **Wskaźnik marży pokrycia** = (C-KZj)/C. Im wyższa marża pokrycia, tym niższy BEP, tym mniejsze ryzyko. **Przykład**: KS=100 tys., C=50 zł, KZj=30 zł → BEP = 100.000/(50-30) = 5.000 sztuk."},{"q":"Co to jest margines bezpieczeństwa i dźwignia operacyjna (DOL)?","a":"**Margines bezpieczeństwa** = (Sprzedaż - BEP) / Sprzedaż × 100%. Pokazuje **o ile może spaść sprzedaż**, zanim firma zacznie ponosić straty. Im wyższy, tym bezpieczniej. Przykład: 30% = sprzedaż może spaść o 30% i firma nadal jest rentowna. **Dźwignia operacyjna** (DOL = Degree of Operating Leverage) = Marża Pokrycia / Zysk Operacyjny = (S-KZ) / (S-KZ-KS). Mierzy **wrażliwość zysku na zmiany sprzedaży**. **Wysoki DOL** (dużo kosztów stałych): mały wzrost sprzedaży → duży wzrost zysku, ale mały spadek → duża strata. **Przykłady wysokiego DOL**: linie lotnicze, fabryki. **Niski DOL**: handel, konsulting."},{"q":"Czym różni się zarządzanie procesowe od funkcjonalnego?","a":"**Funkcjonalne** (tradycyjne): podział **pionowy** na działy/funkcje (marketing, produkcja, finanse, HR). Specjalizacja, hierarchia, KPI per dział. **Wady**: silosy, suboptymalizacja (każdy dział optymalizuje siebie kosztem całości), długi czas reakcji, klient 'odbija się' między działami. **Procesowe**: podział **poziomy** na procesy **end-to-end** (od zamówienia do dostawy). Każdy proces ma właściciela (process owner), przekracza działy. **Zalety**: orientacja na klienta, krótszy czas, lepsza koordynacja. **Wady**: konflikty kompetencji z funkcjami. W praktyce stosuje się **hybrydy/macierze** - łączą oba podejścia."},{"q":"Wymień kroki cyklu życia BPM.","a":"**BPM** (Business Process Management) cycle - cykl zarządzania procesami: **(1) Identyfikacja** procesów - katalog wszystkich procesów w firmie. **(2) Modelowanie** - rysowanie 'as-is' w notacji BPMN (np. Bizagi, Camunda). **(3) Analiza** - identyfikacja wąskich gardeł, marnotrawstwa, automatyzowalnych zadań. **(4) Przeprojektowanie** ('to-be') - nowa wersja procesu (kaizen - drobne usprawnienia lub BPR - radykalna zmiana). **(5) Wdrożenie** - zmiany organizacyjne, IT, szkolenia. **(6) Monitoring** - KPI procesu (czas, koszt, jakość, satysfakcja). **(7) Optymalizacja** - powrót do kroku 3. Cykl ciągły, automatyzowany przez systemy BPMS."},{"q":"Wyjaśnij karty Shewharta - co oznacza UCL, LCL, CL.","a":"**Karty Shewharta** (Walter Shewhart, 1924, Bell Labs) - narzędzie SPC (Statystycznego Sterowania Procesem). Wykres punktów pomiarowych w czasie z 3 liniami: **CL** (Central Line) - **linia centralna**, średnia procesu (μ). **UCL** (Upper Control Limit) - **górna granica kontrolna**, zwykle μ + 3σ. **LCL** (Lower Control Limit) - **dolna granica kontrolna**, zwykle μ - 3σ. **Interpretacja**: punkty wewnątrz UCL-LCL = proces **statystycznie stabilny** (variation losowa). Punkt poza granicami lub trend = **specjalna przyczyna** (special cause), wymaga interwencji. Reguły Western Electric definiują dodatkowe sygnały (8 reguł Nelsona)."},{"q":"Czym jest RPN w FMEA i jak się liczy?","a":"**RPN** (Risk Priority Number) - wskaźnik priorytetu ryzyka w **FMEA** (Failure Mode and Effects Analysis). Wzór: **RPN = S × O × D**, gdzie: **S** (Severity) - dotkliwość skutku awarii (1-10, 10=katastrofa); **O** (Occurrence) - prawdopodobieństwo wystąpienia (1-10, 10=pewne); **D** (Detection) - **trudność wykrycia** (1-10, **10 = nie da się wykryć**! - uwaga: skala odwrotna). Max RPN = 1000. **Priorytetyzacja**: wyższe RPN = wyższy priorytet działań prewencyjnych. **Standardy automotive** (IATF 16949): RPN >100 wymaga działań, >200 - akcje krytyczne. **Nowy AIAG-VDA FMEA** (2019) zastępuje RPN przez AP (Action Priority - macierz S×O+D)."},{"q":"Co to jest CLV i jak się liczy?","a":"**CLV** (Customer Lifetime Value) - przewidywane przychody/zyski od klienta w **całym okresie relacji**. **Prosty wzór**: CLV = (średnia wartość zakupu) × (częstotliwość zakupów rocznych) × (lata jako klient). **Z marżą**: CLV = (przychód × marża - koszt obsługi) × lifetime. **Pełny wzór z dyskontowaniem**: CLV = Σ(CFt/(1+r)^t). **Przykład Netflix**: 50 zł/mies × 12 × 4 lata × 30% marża = 720 zł CLV. **Dlaczego ważne**: pozwala określić **maksymalny CAC** (Customer Acquisition Cost). **Zasada zdrowego biznesu**: **LTV/CAC > 3**. Stosowane głównie w SaaS, e-commerce, subskrypcjach, bankach."},{"q":"Wymień filary marketingu relacji wg Berry'ego.","a":"**Leonard Berry** (1983) - twórca terminu 'relationship marketing'. **Główne filary**: **(1) Długoterminowa relacja** > pojedyncza transakcja. **(2) Retencja klientów** > akwizycja (pozyskanie kosztuje 5-7× więcej). **(3) Customer Lifetime Value** (CLV) jako kluczowy wskaźnik. **(4) Personalizacja** komunikacji i ofert. **(5) Lojalność** budowana przez doświadczenie, nie program rabatowy. **(6) Two-way communication** - słuchanie klienta, nie tylko nadawanie. **(7) Trust & commitment** - zaufanie jako fundament. **Narzędzia praktyczne**: CRM, programy lojalnościowe, NPS, customer success, content marketing. **Trend**: większość branż przesuwa się od transakcyjnego do relacyjnego (dane, AI, personalizacja)."},{"q":"Wymień 3 strategie generyczne Portera.","a":"**Michael Porter** ('Competitive Strategy' 1980): **(1) Przywództwo kosztowe** (cost leadership) - być **najtańszym** w branży przez ekonomię skali, krzywa doświadczenia, niskie koszty stałe. Przykład: Ryanair, IKEA, Walmart. **(2) Różnicowanie** (differentiation) - unikalny produkt, za który klient zapłaci premium. Przykład: Apple, Tesla, Rolex. **(3) Koncentracja** (focus) - niszowy rynek z jedną z dwóch powyższych (focus cost lub focus differentiation). Przykład: Ferrari (luksusowe niszowe). Porter ostrzegał przed **'stuck in the middle'** - próbą bycia wszystkim dla wszystkich = śmiercią strategiczną."},{"q":"Co to jest 5 sił Portera?","a":"Model Michaela Portera (1979) - 5 sił określa **atrakcyjność branży**: **(1) Rywalizacja między konkurentami** - intensywność walki (dużo firm, wolny wzrost → silna). **(2) Zagrożenie nowymi wejściami** - bariery wejścia (kapitał, regulacje, marka). **(3) Siła przetargowa dostawców** - czy dyktują ceny (mało dostawców, unikalne produkty → silna). **(4) Siła przetargowa nabywców** - czy klienci dyktują warunki (duzi klienci, łatwa zmiana → silna). **(5) Zagrożenie substytutami** - alternatywne rozwiązania (Netflix → kino, Uber → taksówki). **Im więcej silnych sił, tym niższa rentowność branży**. Stosowane do analizy strategicznej i decyzji o wejściu na rynek."},{"q":"Opisz 9 bloków Business Model Canvas.","a":"**BMC** (Osterwalder & Pigneur 2010) - 9 bloków na 1 stronie A4: **(1) Customer Segments** - dla kogo (B2C, B2B, niche). **(2) Value Proposition** - jaką wartość dostarczamy (produkt, usługa, korzyść). **(3) Channels** - jak docieramy do klientów (online, retail, partnerzy). **(4) Customer Relationships** - typ relacji (osobista, automatyczna, społeczność). **(5) Revenue Streams** - jak zarabiamy (sprzedaż, subskrypcja, prowizja). **(6) Key Resources** - czego potrzebujemy (ludzie, technologia, marka). **(7) Key Activities** - co musimy robić (produkcja, problem-solving, platforma). **(8) Key Partners** - z kim współpracujemy (dostawcy, alianse). **(9) Cost Structure** - koszty (stałe, zmienne, ekonomia skali)."},{"q":"Wymień rodzaje ryzyka w przedsiębiorstwie.","a":"**(1) Rynkowe** - zmiany cen, kursów walut, stóp procentowych. **(2) Operacyjne** - awarie, błędy ludzkie, zakłócenia procesów. **(3) Finansowe** - płynności, kredytowe, walutowe. **(4) Prawne i regulacyjne** - zmiany przepisów, kary, procesy. **(5) Reputacyjne** - utrata zaufania, kryzysy PR. **(6) Strategiczne** - złe decyzje strategiczne, zmiany konkurencji. **(7) IT/cyberzagrożenia** - hakerstwo, RODO, awarie systemów. **(8) ESG/klimatyczne** - kryzysy klimatyczne, transformacja energetyczna, zmiany konsumenckie. **Podział wg natury**: **czyste** (tylko strata - pożar) vs **spekulacyjne** (strata lub zysk - inwestycja). Standard zarządzania: **ISO 31000**."},{"q":"Co to są 4T w zarządzaniu ryzykiem?","a":"**4T** - strategie reakcji na ryzyko (Risk Response Strategies): **(1) Tolerate** (akceptuj) - dla małych ryzyk lub gdy koszt mitygacji > potencjalna strata. **(2) Treat** (mityguj/redukuj) - zmniejszanie prawdopodobieństwa lub skutku (procedury, szkolenia, redundancje). **(3) Transfer** (przenieś) - ubezpieczenia, outsourcing, hedging, klauzule umowne. **(4) Terminate** (unikaj) - eliminacja źródła ryzyka (np. wyjście z rynku, rezygnacja z projektu). Wybór strategii zależy od miejsca ryzyka w **matrycy ryzyka** (prawdopodobieństwo × skutek). Dla krytycznych ryzyk często łączy się strategie (treat + transfer)."},{"q":"Wyjaśnij model 70-20-10 rozwoju pracowników.","a":"Model **Charlesa Jenningsa** (Center for Creative Leadership) - ramy uczenia się w pracy. **70%** wiedzy przychodzi z **doświadczenia** (on-the-job): wyzwania, nowe projekty, rotacje, błędy. **20%** z **interakcji z innymi**: feedback szefa, mentoring, coaching, obserwacja kolegów. **10%** z **formalnych szkoleń**: kursy, książki, certyfikaty. **Wniosek**: tradycyjne szkolenia są mniej skuteczne niż firmy myślą. **Implikacje HR**: mniej budżetu na szkolenia, więcej na stretch assignments, programy mentoringowe, kulturę feedbacku. **Krytyka**: liczby przybliżone (różne dla różnych zawodów - chirurg 50-30-20). Stosowane w korporacjach (Microsoft, Google)."},{"q":"Czym różni się reskilling od upskillingu?","a":"**Upskilling** (podnoszenie kwalifikacji) - rozwijanie istniejących kompetencji pracownika **w tej samej roli/dziedzinie**. Przykład: programista Java uczy się Pythona, marketer poznaje AI tools. **Cel**: pozostanie konkurencyjnym w obecnym zawodzie. **Reskilling** (przekwalifikowanie) - nauka **zupełnie nowych** kompetencji do nowej roli. Przykład: kasjerka uczy się obsługi klienta online, monter staje się programistą PLC. **Cel**: zmiana zawodu z powodu automatyzacji lub potrzeby firmy. **WEF**: do 2027 r. **44% pracowników** musi być reskilled. Bootcamps, online learning (Coursera, Pluralsight), współpraca z uczelniami. **Trend**: 'lifelong learning' staje się standardem."},{"q":"Wyjaśnij cykl PDCA/PDSA.","a":"**PDCA** (Plan-Do-Check-Act) - cykl ciągłego doskonalenia (Shewhart, spopularyzowany przez Deminga w Japonii po 1950 r.). **Plan**: zdefiniuj problem, postaw hipotezę, zaplanuj rozwiązanie. **Do**: wdroż na małą skalę (pilot), zbierz dane. **Check** (Study w wersji PDSA): porównaj wyniki z oczekiwaniami. **Act** (Adjust): jeśli zadziałało - wdroż globalnie i standaryzuj; jeśli nie - wróć do Plan. **Cykl się powtarza** - continuous improvement. **PDSA** to wariant Deminga (Study zamiast Check - bardziej naukowy). **Fundament TQM, Six Sigma, Lean, Toyota Production System. Przykład Toyota: setki małych PDCA dziennie**."},{"q":"Wymień koszty jakości wg Crosby'ego.","a":"**Philip Crosby** ('Quality is Free' 1979) - **'jakość jest darmowa'**, koszty słabej jakości są wyższe niż koszty zapobiegania. **4 kategorie kosztów jakości** (CoQ - Cost of Quality): **(1) Koszty prewencji** (prevention) - szkolenia, audyty, planowanie jakości, QA przed produkcją. **(2) Koszty oceny** (appraisal) - inspekcje, testy, kontrola jakości w procesie. **(3) Koszty wewnętrznych błędów** (internal failure) - braki, poprawki, scrap **wykryte przed wysyłką**. **(4) Koszty zewnętrznych błędów** (external failure) - reklamacje, gwarancje, utrata klientów, sądowe **wykryte po wysyłce**. **Zasada Crosby'ego**: 1 dolar w prewencji = 10 dolarów w detekcji = 100 dolarów w naprawie błędu."},{"q":"Czym różni się orientacja funkcjonalna od procesowej?","a":"**Funkcjonalna** (klasyczna, Taylorowska): podział **pionowy** organizacji na **działy/funkcje** (marketing, produkcja, finanse, HR, IT). Specjalizacja, hierarchia, każdy dział ma swojego kierownika, KPI, budżet. **Zalety**: głęboka specjalizacja, jasne ścieżki kariery, ekonomia skali w funkcjach. **Wady**: silosy, suboptymalizacja, opóźnione decyzje. **Procesowa**: podział **poziomy** na **procesy end-to-end**. Proces 'order-to-cash' przekracza działy: sprzedaż → produkcja → logistyka → księgowość. Każdy proces ma **właściciela** (process owner), cele, KPI. **Zalety**: orientacja na klienta, krótszy czas. **Wady**: konflikty z funkcjami. W praktyce: **macierz/hybryda**."},{"q":"Wymień 4 poziomy piramidy Carrolla CSR.","a":"**Archie B. Carroll** (1979 - definicja, 1991 - piramida) - **piramida CSR** od podstawy do szczytu: **(1) Odpowiedzialność ekonomiczna** (fundament) - być rentownym, generować zysk. To podstawowy obowiązek wobec właścicieli i społeczeństwa. **(2) Odpowiedzialność prawna** - przestrzegać prawa, regulacji, podatków. **(3) Odpowiedzialność etyczna** - robić to, co dobre, sprawiedliwe, ponad obowiązki prawne (np. wycofać produkt mimo, że prawo nie wymaga). **(4) Odpowiedzialność filantropijna/dyskrecjonalna** (szczyt) - dobrowolne działania na rzecz społeczeństwa (donacje, wolontariat, fundacje). Im wyższy poziom, tym mniejsza presja, większa swoboda. Krytyka: hierarchia nie zawsze jest taka prosta - etyka czasem ważniejsza niż zysk."},{"q":"Czym różni się CSR od ESG?","a":"**CSR** (Corporate Social Responsibility) - **dobrowolna** odpowiedzialność biznesu od lat 70. Działania filantropijne, etyczne, ekologiczne. Cechy: **nieobowiązkowe, narracyjne** (raporty pełne zdjęć), wizerunkowe, oddzielne od głównego biznesu ('CSR Day' raz w roku). Krytyka: greenwashing. **ESG** (Environmental, Social, Governance) - **mierzalne** kryteria dla inwestorów (od 2005). Cechy: **konkretne KPI** (emisje CO2, kobiety w zarządzie, niezależność audytora), wpływ na **cenę akcji i koszt kapitału**, **obowiązek raportowania** (CSRD od 2024 w UE dla dużych firm). **Skrót**: CSR = 'jesteśmy dobrzy' (PR); ESG = 'oto twarde liczby' (inwestorzy, regulatorzy)."},{"q":"Jakie są elementy biznesplanu?","a":"Klasyczna struktura biznesplanu: **(1) Streszczenie wykonawcze** (Executive Summary) - 1-2 strony, najważniejsze, czyta się jako pierwsze. **(2) Opis firmy** - misja, wizja, forma prawna, właściciele. **(3) Produkt/usługa** - co oferujemy, USP, własność intelektualna. **(4) Analiza rynku** - TAM/SAM/SOM, segmenty, trendy, konkurencja. **(5) Strategia marketingowa** - 4P, kanały, ceny, promocja. **(6) Plan operacyjny** - produkcja, logistyka, technologie. **(7) Organizacja i zarządzanie** - struktura, kompetencje zespołu. **(8) Plan finansowy** - prognozy 3-5 lat, NPV, IRR, BEP, źródła finansowania. **(9) Analiza ryzyka**. **(10) Załączniki** - CV, kontrakty, badania."},{"q":"Co to jest MVP i lean startup (Ries)?","a":"**Lean Startup** (Eric Ries 2011) - metodologia budowania firmy w niepewności: 'Buduj-Mierz-Ucz się' w krótkich cyklach. Zamiast 2-letniego biznesplanu - **szybkie iteracje**. **MVP** (Minimum Viable Product) - **najprostsza wersja produktu**, która rozwiązuje problem klienta i pozwala uczyć się. NIE 'gotowy produkt z brakami', ale 'najmniejszy eksperyment, który daje walidację'. **Przykłady MVP**: **Dropbox** = 3-min wideo (75 tys. zapisów przed napisaniem kodu); **Zappos** = założyciel kupował buty w sklepach i wysyłał klientom; **Airbnb** = strona ze zdjęciami mieszkania założycieli. **Decyzja po MVP**: **persevere** (kontynuuj) lub **pivot** (zmień kierunek)."},{"q":"Wymień klasyczne style przywództwa Lewina.","a":"**Kurt Lewin** (1939, eksperyment z chłopcami w Iowa) - 3 klasyczne style: **(1) Autokratyczny** (autorytarny) - lider sam decyduje, daje rozkazy, kontroluje. **Plusy**: szybkość, jasność, kryzys. **Minusy**: brak inicjatywy, demotywacja, odejścia. **(2) Demokratyczny** (partycypacyjny) - lider angażuje zespół w decyzje, dyskusje, głosowania. **Plusy**: zaangażowanie, kreatywność, jakość decyzji. **Minusy**: wolniejsze decyzje, paraliż w kryzysie. **(3) Liberalny** (laissez-faire) - lider nie ingeruje, daje pełną swobodę. **Plusy**: rozwija eksperckie zespoły, kreatywność. **Minusy**: chaos, brak kierunku, brak rozliczalności. W praktyce dobry lider **dopasowuje styl do sytuacji** (przywództwo sytuacyjne)."},{"q":"Wyjaśnij model sytuacyjny Hersey-Blanchard (4 style, 4 dojrzałości).","a":"**Paul Hersey & Ken Blanchard** (1969) - **Situational Leadership**. Założenie: nie ma jednego dobrego stylu, **zależy od dojrzałości pracownika**. **4 poziomy dojrzałości** (M1-M4): **M1** - niska kompetencja + niska motywacja (nowicjusz); **M2** - niska kompetencja + wysoka motywacja (entuzjasta); **M3** - wysoka kompetencja + zmienna motywacja; **M4** - wysoka kompetencja + wysoka motywacja (ekspert). **4 style lidera**: **S1 Directing** (instruowanie) dla M1; **S2 Coaching** (sprzedawanie, wyjaśnianie) dla M2; **S3 Supporting** (wspieranie, partycypacja) dla M3; **S4 Delegating** (delegowanie, autonomia) dla M4. Dobry lider **diagnozuje dojrzałość** i **adaptuje styl**."},{"q":"Czym różni się przywództwo transformacyjne od transakcyjnego?","a":"**Transakcyjne** (James MacGregor Burns 1978, rozwinięte przez Bassa 1985): wymiana 'praca za nagrodę'. Lider stawia cele, monitoruje, nagradza za sukces, karze za błędy. KPI, MBO, system bonusowy. Krótkoterminowe, stabilizujące. Dobre w prostych, powtarzalnych procesach. **Transformacyjne**: inspiruje pracowników do **przekraczania własnych oczekiwań** dla wizji i misji, nie dla nagrody. **4 wymiary Bassa**: (1) **Idealized Influence** (charyzma); (2) **Inspirational Motivation** (wizja); (3) **Intellectual Stimulation** (kreatywność, kwestionowanie); (4) **Individualized Consideration** (mentoring). Długoterminowe, zmieniające. Przykłady: Steve Jobs, Nelson Mandela. W praktyce dobry lider łączy oba."},{"q":"Opisz 4 pokolenia w pracy (Boomers, X, Y, Z).","a":"**Baby Boomers** (1946-1964, ok. 60-79 lat): lojalność wobec pracodawcy, hierarchia, etos pracy, ostrożność. Wartości: stabilność, status, awans wewnętrzny. **Pokolenie X** (1965-1980): niezależność, work-life balance, sceptycyzm wobec autorytetów. Wartości: rozwój, elastyczność, równowaga. **Pokolenie Y / Millennials** (1981-1996): pierwsi cyfrowi, oczekują **purpose** i częstego feedbacku. Wartości: rozwój, sens, work-life integration, technologia, DEI. **Pokolenie Z** (1997-2012, najmłodsi pracownicy): **digital natives** (smartfon od urodzenia), autentyczność, zdrowie psychiczne, aktywizm społeczny (klimat, równość). Wartości: elastyczność, sens, dobrostan, transparentność. Praca w grupie wielopokoleniowej wymaga **różnorodności podejść**."},{"q":"Co to jest reverse mentoring?","a":"**Reverse mentoring** - odwrotny mentoring: **młodszy pracownik mentoruje starszego** (zwykle szefa lub seniora). Wprowadzony przez **Jacka Welcha w GE** (1999) - kazał 500 top menedżerom uczyć się internetu od młodszych pracowników. **Cele**: (1) **Transfer wiedzy cyfrowej** - senior uczy się TikToka, AI, blockchaina od pokolenia Z; (2) **Zrozumienie młodszych pokoleń** - co ich motywuje, jak komunikują się klienci Z; (3) **Świeże perspektywy** - bez 'tak się tu zawsze robi'; (4) **Rozwój juniorów** - kontakt z top managementem, widoczność, networking; (5) Walka z **ageizmem**. Stosują: PwC, Coca-Cola, BMW, Microsoft. **Wyzwanie**: ego seniora - wymaga pokory i otwartości."},{"q":"Wymień 3 grupy kompetencji menedżerskich wg Katza.","a":"**Robert Katz** ('Skills of an Effective Administrator', HBR 1955) - 3 grupy kompetencji menedżerskich, których proporcje **zmieniają się wraz ze szczeblem**: **(1) Techniczne** (technical skills) - znajomość konkretnych metod, procesów, technologii. **Najważniejsze na niskim szczeblu** (brygadziści, kierownicy zmianowi). **(2) Społeczne/interpersonalne** (human skills) - praca z ludźmi, komunikacja, motywowanie, rozwiązywanie konfliktów. **Ważne na wszystkich szczeblach**, bo każdy zarządza ludźmi. **(3) Koncepcyjne** (conceptual skills) - myślenie systemowe, strategiczne, widzenie 'big picture', analiza złożonych problemów. **Najważniejsze na top management** (CEO, zarząd). Współczesne uzupełnienie: kompetencje **cyfrowe** i **EQ**."},{"q":"Co to jest EQ wg Golemana - 5 komponentów?","a":"**Emotional Intelligence** (EQ/EI) - Daniel Goleman ('Emotional Intelligence' 1995). **5 wymiarów**: **(1) Samoświadomość** (self-awareness) - znajomość własnych emocji, mocnych i słabych stron, wpływu na innych. **(2) Samoregulacja** (self-regulation) - kontrolowanie impulsów, opanowanie pod presją, integralność. **(3) Motywacja wewnętrzna** (motivation) - dążenie do celów, optymizm, inicjatywa. **(4) Empatia** - rozumienie emocji innych, słuchanie aktywne, świadomość kulturowa. **(5) Umiejętności społeczne** (social skills) - budowanie relacji, wpływanie, rozwiązywanie konfliktów, praca w zespole. **Badania Golemana**: EQ odpowiada za **60-80% różnicy** między średnimi a wybitnymi liderami. IQ to bilet wstępu, EQ - dotarcie na szczyt. **Można rozwijać** przez mindfulness, terapię, coaching."},{"q":"Wyjaśnij 3 motywatory Pinka.","a":"**Daniel Pink** ('Drive', 2009) - **3 motywatory wewnętrzne** dla zadań kreatywnych/poznawczych (nie rutynowych): **(1) Autonomy** (autonomia) - kontrola nad: zadaniem (CO), czasem (KIEDY), techniką (JAK), zespołem (Z KIM). Przykład Google: 20% time (1 dzień w tygodniu na własne projekty - tak powstał Gmail). **(2) Mastery** (mistrzostwo) - chęć **stawania się coraz lepszym** w czymś, co ma znaczenie. Wymaga: jasnych celów, natychmiastowego feedbacku, balansowania trudności (flow Csikszentmihalyi). **(3) Purpose** (cel/sens) - praca **dla czegoś większego** niż siebie (misja firmy, wpływ społeczny). **Wniosek**: dla kreatywnej pracy **'carrot and stick' (bonusy/kary) NIE DZIAŁA** - motywacja wewnętrzna jest silniejsza. Pieniądze tylko 'usuń z równania' (płać sprawiedliwie)."},{"q":"Czym różnią się higienotwórcze od motywatorów Herzberga?","a":"**Frederick Herzberg** (1959, 'The Motivation to Work') - teoria dwuczynnikowa motywacji. **Czynniki higieny** (hygiene factors, dissatisfiers): wynagrodzenie, warunki pracy, polityka firmy, relacje z szefem, bezpieczeństwo zatrudnienia. **Brak ich = niezadowolenie**, ale **obecność = neutralność** (NIE motywują). To 'minimum egzystencjalne'. **Motywatory** (motivators, satisfiers): osiągnięcia, uznanie, sama interesująca praca, odpowiedzialność, możliwości rozwoju, awans. **Brak = neutralność, obecność = motywacja**. **Kluczowy wniosek**: podwyżka NIE motywuje na dłużej (efekt znika po 3-6 miesiącach), to higiena. Prawdziwa motywacja to **wzbogacanie pracy** (job enrichment) - odpowiedzialność, sens, samodzielność."},{"q":"Co to jest teoria interesariuszy Freemana?","a":"**Stakeholder Theory** - **R. Edward Freeman** ('Strategic Management: A Stakeholder Approach', 1984). Przeciwwaga dla **doktryny Friedmana** (1970), że jedyną odpowiedzialnością firmy jest zysk dla akcjonariuszy. Freeman: firma ma **zobowiązania wobec wszystkich interesariuszy** - akcjonariuszy, pracowników, klientów, dostawców, społeczności, państwa, środowiska. Sukces długoterminowy wymaga **równoważenia interesów**. **Kategorie interesariuszy**: wewnętrzni (właściciele, pracownicy) vs zewnętrzni (klienci, dostawcy, NGO, państwo). Pierwotni (z bezpośrednim wpływem) vs wtórni. **Punkt zwrotny**: 2019 - Business Roundtable porzuca shareholder primacy. Współczesne: ESG, B Corp, stakeholder capitalism."},{"q":"Wyjaśnij matrycę Mendelowa (4 pola).","a":"**Matryca Mendelowa** (Aubrey Mendelow, 1991) - narzędzie analizy interesariuszy. **2 wymiary**: oś X = **Zainteresowanie** (interest, low/high); oś Y = **Wpływ/Władza** (power, low/high). **4 kwadranty** = strategie zarządzania: **(1) Niskie zainteresowanie + niski wpływ → Minimum effort** (d
